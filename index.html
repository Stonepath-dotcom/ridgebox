// ===== SMART CATEGORIES / AUTO-GROUP =====
function getFileCategory(name, mime) {
    const ext = (name || '').split('.').pop().toLowerCase();
    const docExts = ['pdf','doc','docx','txt','xls','xlsx','ppt','pptx'];
    const photoExts = ['jpg','jpeg','png','gif','webp','svg','bmp'];
    const videoExts = ['mp4','avi','mov','mkv','webm','flv'];
    const audioExts = ['mp3','wav','ogg','flac','aac','m4a'];
    const archiveExts = ['zip','rar','7z','tar','gz'];
    const codeExts = ['js','py','html','css','json','xml','ts','jsx','tsx','yaml','yml','md','sh','sql','go','rs','rb','php','java','c','cpp','h'];
    if (docExts.includes(ext)) return 'documents';
    if (photoExts.includes(ext)) return 'photos';
    if (videoExts.includes(ext)) return 'videos';
    if (audioExts.includes(ext)) return 'audio';
    if (archiveExts.includes(ext)) return 'archives';
    if (codeExts.includes(ext)) return 'code';
    return 'others';
}

function getCategoryInfo(cat) {
    const map = {
        documents: { icon: '📄', name: APP.lang==='id'?'Dokumen':'Documents', css: 'cat-docs' },
        photos:    { icon: '🖼️', name: APP.lang==='id'?'Foto':'Photos', css: 'cat-photos' },
        videos:    { icon: '🎬', name: APP.lang==='id'?'Video':'Videos', css: 'cat-videos' },
        audio:     { icon: '🎵', name: APP.lang==='id'?'Audio':'Audio', css: 'cat-audio' },
        archives:  { icon: '📦', name: APP.lang==='id'?'Arsip':'Archives', css: 'cat-archives' },
        code:      { icon: '📝', name: APP.lang==='id'?'Kode':'Code', css: 'cat-code' },
        others:    { icon: '📁', name: APP.lang==='id'?'Lainnya':'Others', css: 'cat-others' }
    };
    return map[cat] || map.others;
}

function renderCategoriesView() {
    const files = APP.files.filter(f => !f.trashed);

    files.forEach(f => {

// ===== PULL-TO-REFRESH =====
let _ptrActive = false, _ptrStartY = 0, _ptrPulling = false;
function setupPullToRefresh() {
    const container = document.getElementById('file-list-container');
    if (!container || container._ptrInit) return;
    container._ptrInit = true;
    container.addEventListener('touchstart', (e) => {
        if (container.scrollTop > 0) return;
        _ptrStartY = e.touches[0].clientY;
        _ptrPulling = true;
    }, { passive: true });
    container.addEventListener('touchmove', (e) => {
        if (!_ptrPulling || _ptrActive) return;
        const dy = e.touches[0].clientY - _ptrStartY;
        if (dy < 0 || container.scrollTop > 0) { _ptrPulling = false; return; }
        const ptr = document.getElementById('ptr-indicator');
        const arrow = document.getElementById('ptr-arrow');
        if (!ptr) return;
        const h = Math.min(dy * 0.5, 80);
        ptr.style.height = h + 'px';
        if (arrow) arrow.style.transform = dy > 60 ? 'rotate(180deg)' : 'rotate(0deg)';
    }, { passive: true });
    container.addEventListener('touchend', async () => {
        if (!_ptrPulling) return;
        _ptrPulling = false;
        const ptr = document.getElementById('ptr-indicator');
        const arrow = document.getElementById('ptr-arrow');
        if (!ptr) return;
        const h = parseInt(ptr.style.height) || 0;
        if (h >= 60 && !_ptrActive) {
            _ptrActive = true;
            ptr.style.height = '40px';
            if (arrow) { arrow.style.transform = 'rotate(360deg)'; arrow.style.animation = 'ptrRotate .6s linear infinite'; arrow.className = 'fas fa-spinner'; }
            await refreshUI();
            if (arrow) { arrow.style.animation = ''; arrow.className = 'fas fa-arrow-down'; arrow.style.transform = 'rotate(0deg)'; }
            ptr.style.height = '0';
            _ptrActive = false;
            showToast(APP.lang === 'id' ? 'Diperbarui' : 'Refreshed', 'success', 2000);
        } else {
            ptr.style.height = '0';
            if (arrow) arrow.style.transform = 'rotate(0deg)';
        }
    }, { passive: true });
}

// ===== FILE DUPLICATE CHECKER =====
function findDuplicates() {
    const files = APP.files.filter(f => !f.trashed);
    const map = {};
    files.forEach(f => {
        const key = f.name + '::' + f.size;
        if (!map[key]) map[key] = [];
        map[key].push(f);
    });
    return Object.entries(map).filter(([, arr]) => arr.length > 1).map(([key, arr]) => {
        arr.sort((a, b) => (b.uploadedAt || 0) - (a.uploadedAt || 0));
        return { key, files: arr, newest: arr[0], duplicates: arr.slice(1), savings: arr.slice(1).reduce((s, f) => s + (f.size || 0), 0) };
    });
}

// ===== REAL STORAGE QUOTA =====
let _quotaCache = null, _quotaCacheTime = 0;
async function getStorageQuota() {
    const now = Date.now();
    if (_quotaCache && (now - _quotaCacheTime) < 300000) return _quotaCache;
    try {
        const allFiles = await dbGetAll('files');
        const totalUsed = allFiles.reduce((sum, f) => sum + (f.size || 0), 0);
        const botCount = Math.max(APP.bots.length || 1, 1);
        const totalQuota = botCount * 2 * 1024 * 1024 * 1024;
        _quotaCache = { totalUsed, totalQuota, botCount };
        _quotaCacheTime = now;
        return _quotaCache;
    } catch (e) {
        const totalUsed = APP.files.reduce((sum, f) => sum + (f.size || 0), 0);
        const botCount = Math.max(APP.bots.length || 1, 1);
        const totalQuota = botCount * 2 * 1024 * 1024 * 1024;
        return { totalUsed, totalQuota, botCount };
    }
}

function getStorageLimitBytes() {
    const botCount = Math.max(APP.bots.length || 1, 1);
    const customLimit = parseInt(localStorage.getItem('rb_storage_limit_gb'));
    return (customLimit > 0 ? customLimit : botCount * 2) * 1024 * 1024 * 1024;
}

// ===== WEBHOOK INTEGRATION =====
const _webhookRateLimit = {};
function triggerWebhook(event, data) {
    if (!APP.settings.webhookUrl) return;
    const now = Date.now();
    const key = event;
    if (_webhookRateLimit[key] && (now - _webhookRateLimit[key]) < 5000) return;
    _webhookRateLimit[key] = now;
    const payload = { event, timestamp: new Date().toISOString(), data };
    fetch(APP.settings.webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }).then(() => showToast(APP.lang==='id'?'Webhook terkirim':'Webhook sent', 'success'))
      .catch(() => showToast(APP.lang==='id'?'Webhook gagal':'Webhook failed', 'error'));
}

    if (!url) { showToast(APP.lang==='id'?'Masukkan URL webhook':'Enter webhook URL', 'warning'); return; }
    await updateSetting('webhookUrl', url);
    triggerWebhook('test', { message: 'Test webhook from Ridgebox' });
}
async function checkStorageWarning() {
    try {
        const q = await getStorageQuota();
        const pct = q.totalUsed / q.totalQuota;
        if (pct > 0.75) triggerWebhook('storage.warning', { usedBytes: q.totalUsed, totalBytes: q.totalQuota, percentage: Math.round(pct*100) });
    } catch(e) {}
}

function showClipboardIndicator() {
    let el = document.getElementById('clipboard-indicator');
    if (!el) {
        el = document.createElement('div');
        el.id = 'clipboard-indicator';
        el.style.cssText = 'position:fixed;bottom:80px;right:24px;background:var(--accent);color:#fff;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transform:scale(0);transition:all .3s ease';
        el.innerHTML = '<i class="fas fa-camera" style="font-size:18px"></i>';
        document.body.appendChild(el);
    }
    requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'scale(1)'; });
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'scale(0)'; }, 2000);
}
document.addEventListener('paste', function(e) {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) return;
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
        if (item.type.startsWith('image/')) {
            e.preventDefault();
            const blob = item.getAsFile();
            const ts = new Date().toISOString().replace(/[:.]/g, '-');
            const fileName = `screenshot_${ts}.png`;
            showClipboardIndicator();
            handleClipboardImage(blob, fileName);
            return;
        }
    }
    const text = e.clipboardData?.getData('text');
    if (text && /^https?:\/\/.+\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i.test(text.trim())) {
        e.preventDefault();
        fetch(text.trim()).then(r => r.blob()).then(blob => {
            const ts = new Date().toISOString().replace(/[:.]/g, '-');
            const ext = text.trim().split('.').pop().split('?')[0].toLowerCase();
            const fileName = `screenshot_${ts}.${ext}`;
            showClipboardIndicator();
            handleClipboardImage(blob, fileName);
        }).catch(() => {});
    }
});

// ===== VIDEO/AUDIO PLAYER =====
function getMediaType(name, mime) {
    const ext = (name||'').split('.').pop().toLowerCase();
    const vidExts = ['mp4','webm','mov','avi','mkv'];
    const audExts = ['mp3','wav','ogg','flac','aac','m4a'];
    if (mime) {
        if (mime.startsWith('video/')) return 'video';
        if (mime.startsWith('audio/')) return 'audio';
    }
    if (vidExts.includes(ext)) return 'video';
    if (audExts.includes(ext)) return 'audio';
    return null;
}
function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
}

                '<div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1">' +

                '<button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="fas fa-times"></i></button>' +
            '</div>' +
            '<div style="position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:12px;overflow:hidden;margin-bottom:8px">' +
                '<video id="media-video" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain" src="' + downloadUrl + '" controls playsinline>' +
                    (APP.lang==='id'?'Browser tidak mendukung video ini':'Browser cannot play this video') +
                '</video>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary)">' +
                '<span>' + formatSize(file.size) + ' · ' + file.name.split('.').pop().toUpperCase() + '</span>' +
                '<span>' + formatDate(file.uploadedAt) + '</span>' +
            '</div>' +
            '<div style="margin-top:8px" id="video-fallback"></div>' +
        '</div>');
        // Setup video fallback after modal is rendered
        requestAnimationFrame(function() {
            var v = document.getElementById('media-video');
            if (v) {
                v.onerror = function() {
                    var fb = document.getElementById('video-fallback');
                    if (fb) fb.innerHTML = '<button class="btn btn-primary" style="width:100%" onclick="downloadFile(\'' + fileId + '\');closeModal()"><i class="fas fa-download"></i> ' + (APP.lang==='id'?'Download untuk memutar':'Download to play') + '</button>';
                };
            }
        });
    } else if (type === 'audio') {
        var pid = 'ap-' + Date.now();
        openModal('<div style="padding:20px">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
                '<div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1">' +
                    '<i class="fas fa-music" style="color:#f59e0b"></i>' +
                    '<span style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + file.name + '</span>' +
                '</div>' +
                '<button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="fas fa-times"></i></button>' +
            '</div>' +
            '<div style="text-align:center;margin-bottom:20px">' +
                '<div style="width:120px;height:120px;border-radius:20px;background:linear-gradient(135deg,#f59e0b20,#8b5cf620);display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 8px 32px rgba(245,158,11,.15)">' +
                    '<i class="fas fa-music" style="font-size:48px;color:#f59e0b"></i>' +
                '</div>' +
            '</div>' +
            '<div style="margin-bottom:8px">' +
                '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:4px">' +
                    '<span id="' + pid + '-cur">0:00</span>' +
                    '<span id="' + pid + '-dur">0:00</span>' +
                '</div>' +
                '<div style="position:relative;height:6px;background:var(--border);border-radius:3px;cursor:pointer" id="' + pid + '-bar">' +
                    '<div id="' + pid + '-prog" style="height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .1s linear"></div>' +
                '</div>' +
            '</div>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px">' +
                '<button id="' + pid + '-skip-back" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px"><i class="fas fa-backward"></i></button>' +
                '<button id="' + pid + '-play" style="width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(59,130,246,.3)"><i class="fas fa-play"></i></button>' +
                '<button id="' + pid + '-skip-fwd" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px"><i class="fas fa-forward"></i></button>' +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px">' +
                '<i class="fas fa-volume-down" style="color:var(--text-secondary);font-size:13px"></i>' +
                '<input type="range" min="0" max="1" step="0.05" value="1" id="' + pid + '-vol" style="width:100px;accent-color:var(--accent)">' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary)">' +
                '<span>' + formatSize(file.size) + ' · ' + file.name.split('.').pop().toUpperCase() + '</span>' +
                '<span>' + formatDate(file.uploadedAt) + '</span>' +
            '</div>' +
            '<div id="' + pid + '-fallback" style="margin-top:8px"></div>' +
            '<audio id="' + pid + '" src="' + downloadUrl + '" preload="metadata"></audio>' +
        '</div>');
        // Setup audio player after modal is rendered
        requestAnimationFrame(function() {
            var a = document.getElementById(pid);
            var playBtn = document.getElementById(pid + '-play');
            var progBar = document.getElementById(pid + '-prog');
            var curEl = document.getElementById(pid + '-cur');
            var durEl = document.getElementById(pid + '-dur');
            var barEl = document.getElementById(pid + '-bar');
            var volEl = document.getElementById(pid + '-vol');
            var skipBack = document.getElementById(pid + '-skip-back');
            var skipFwd = document.getElementById(pid + '-skip-fwd');
            if (!a) return;
            var playing = false;
            a.addEventListener('timeupdate', function() {
                if (a.duration) { progBar.style.width = (a.currentTime / a.duration * 100) + '%'; curEl.textContent = formatTime(a.currentTime); }
            });
            a.addEventListener('loadedmetadata', function() { durEl.textContent = formatTime(a.duration); });
            a.addEventListener('ended', function() { playing = false; playBtn.innerHTML = '<i class="fas fa-play"></i>'; });
            a.onerror = function() {
                var fb = document.getElementById(pid + '-fallback');
                if (fb) fb.innerHTML = '<button class="btn btn-primary" style="width:100%" onclick="downloadFile(\'' + fileId + '\');closeModal()"><i class="fas fa-download"></i> ' + (APP.lang==='id'?'Download untuk memutar':'Download to play') + '</button>';
            };
            playBtn.onclick = function() {
                if (playing) { a.pause(); playing = false; playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
                else { a.play().catch(function(){}); playing = true; playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            };
            skipBack.onclick = function() { a.currentTime = Math.max(0, a.currentTime - 10); };
            skipFwd.onclick = function() { a.currentTime = Math.min(a.duration || 0, a.currentTime + 10); };
            volEl.oninput = function() { a.volume = this.value; };
            barEl.onclick = function(e) {
                var rect = barEl.getBoundingClientRect();
                var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                if (a.duration) a.currentTime = pct * a.duration;
            };
        });
    }
}

</script>
</body>
</html>
