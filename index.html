        </div>
        <h2 style="margin-bottom:4px;color:#f1f5f9">${title}</h2>
        ${subtitle ? `<p style="font-size:13px;color:#94a3b8;margin-bottom:12px">${subtitle}</p>` : ''}
        <div id="pin-dots" style="display:flex;gap:12px;justify-content:center;margin:20px 0">
            ${[0,1,2,3].map(i => `<div id="pin-dot-${i}" style="width:14px;height:14px;border-radius:50%;border:2px solid #475569;transition:all .15s ease"></div>`).join('')}
        </div>
        <p id="pin-error" style="color:#ef4444;font-size:13px;margin:0 0 8px;min-height:18px"></p>
        <div id="pin-lockout-msg" style="display:none;color:#ef4444;font-size:14px;font-weight:600;margin-bottom:8px"></div>
        <div id="pin-numpad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto">
            ${[1,2,3,4,5,6,7,8,9,'',0,'del'].map(k => {
                if (k === '') return '<div></div>';
                if (k === 'del') return `<button class="btn btn-ghost" style="font-size:18px;padding:14px;color:#94a3b8" onclick="pinBackspace()"><i class="fas fa-backspace"></i></button>`;
                return `<button style="width:56px;height:56px;border-radius:50%;border:1px solid #475569;background:rgba(30,41,59,.8);font-size:22px;font-weight:500;cursor:pointer;transition:all .1s;color:#e2e8f0" onmousedown="this.style.background='var(--accent)';this.style.color='#fff'" onmouseup="this.style.background='rgba(30,41,59,.8)';this.style.color='#e2e8f0'" onmouseleave="this.style.background='rgba(30,41,59,.8)';this.style.color='#e2e8f0'" onclick="pinDigit(${k})">${k}</button>`;
            }).join('')}
        </div>
        ${_pinCreateMode ? `<button class="btn btn-ghost" style="margin-top:16px;font-size:13px;color:#94a3b8" onclick="cancelPinCreate()">${t('cancel')}</button>` : ''}
        ${(!_pinCreateMode && localStorage.getItem('rb_biometric_id') && window.PublicKeyCredential) ? `<button style="margin-top:12px;width:56px;height:56px;border-radius:50%;border:2px solid #475569;background:rgba(30,41,59,.8);font-size:24px;cursor:pointer;transition:all .15s;color:#e2e8f0" onclick="verifyBiometric().then(ok=>{if(ok){hideLockScreen();const cb=document.getElementById('pin-lock-overlay')._callback;if(cb)cb()}else{showToast(t('wrongPin'),'error')}})" title="${t('biometricUnlock')}"><i class="fas fa-fingerprint"></i></button>` : ''}
    </div>`;
    overlay._pinValue = '';
    if (_pinLocked) showPinLockout();
}

let _pinValue = '';
function pinDigit(d) {
    if (_pinLocked) return;
    const overlay = document.getElementById('pin-lock-overlay');
    if (!overlay._pinValue) overlay._pinValue = '';
    if (overlay._pinValue.length >= 4) return;
    overlay._pinValue += d;
    updatePinDots(overlay._pinValue.length);
    if (overlay._pinValue.length === 4) {
        setTimeout(() => checkPin(overlay._pinValue), 150);
    }
}

function pinBackspace() {
    if (_pinLocked) return;
    const overlay = document.getElementById('pin-lock-overlay');
    if (!overlay._pinValue) return;
    overlay._pinValue = overlay._pinValue.slice(0, -1);
    updatePinDots(overlay._pinValue.length);
}

function updatePinDots(count) {
    for (let i = 0; i < 4; i++) {
        const dot = document.getElementById(`pin-dot-${i}`);
        if (!dot) continue;
        if (i < count) { dot.style.background = 'var(--accent)'; dot.style.borderColor = 'var(--accent)'; dot.style.transform = 'scale(1.2)'; }
        else { dot.style.background = 'transparent'; dot.style.borderColor = '#475569'; dot.style.transform = 'scale(1)'; }
    }
}

async function checkPin(input) {
    if (_pinCreateMode) {
        if (!_pinFirstInput) {
            _pinFirstInput = input;
            const overlay = document.getElementById('pin-lock-overlay');
            overlay._pinValue = '';
            renderPinPad(); // Re-render with confirm subtitle
        } else {
            if (input === _pinFirstInput) {
                APP.settings.pinLock = await hashPin(input);
                await saveSetting('pinLock', APP.settings.pinLock);
                _pinCreateMode = false;
                _pinFirstInput = '';
                hideLockScreen();
                const cb = document.getElementById('pin-lock-overlay')._callback;
                if (cb) cb();
                showToast(APP.lang==='id'?'PIN berhasil dibuat':'PIN created successfully', 'success');
            } else {
                _pinFirstInput = '';
                document.getElementById('pin-error').textContent = APP.lang==='id'?'PIN tidak cocok, coba lagi':'PINs do not match, try again';
                shakePinDots();
                const overlay = document.getElementById('pin-lock-overlay');
                overlay._pinValue = '';
                setTimeout(() => renderPinPad(), 800);
            }
        }
        return;
    }
    const hashed = await hashPin(input);
    if (hashed === APP.settings.pinLock) {
        _pinAttempts = 0;
        hideLockScreen();
        const cb = document.getElementById('pin-lock-overlay')._callback;
        if (cb) cb();
    } else {
        _pinAttempts++;
        const errEl = document.getElementById('pin-error');
        if (errEl) errEl.textContent = t('wrongPin') + ` (${_pinAttempts}/5)`;
        shakePinDots();
        const overlay = document.getElementById('pin-lock-overlay');
        overlay._pinValue = '';
        updatePinDots(0);
        if (_pinAttempts >= 5) {
            _pinLocked = true;
            _pinLockTimer = Date.now() + 30000;
            showPinLockout();
        }
    }
}

function shakePinDots() {
    const dots = document.getElementById('pin-dots');
    if (!dots) return;
    dots.style.animation = 'none'; dots.offsetHeight;
    dots.style.animation = 'pinShake .4s ease';
}

function showPinLockout() {
    const numpad = document.getElementById('pin-numpad');
    const msg = document.getElementById('pin-lockout-msg');
    if (numpad) numpad.style.opacity = '0.3'; numpad && (numpad.style.pointerEvents = 'none');
    if (msg) msg.style.display = 'block';
    const tick = () => {
        const remain = Math.max(0, Math.ceil((_pinLockTimer - Date.now()) / 1000));
        if (msg) msg.textContent = (APP.lang==='id'?'Coba lagi dalam':'Try again in') + ` ${remain}s`;
        if (remain <= 0) {
            _pinLocked = false; _pinAttempts = 0;
            if (numpad) { numpad.style.opacity = '1'; numpad.style.pointerEvents = 'auto'; }
            if (msg) msg.style.display = 'none';
            const overlay = document.getElementById('pin-lock-overlay');
            overlay._pinValue = '';
            updatePinDots(0);
            const errEl = document.getElementById('pin-error');
            if (errEl) errEl.textContent = '';
            return;
        }
        requestAnimationFrame(tick);
    };
    tick();
}

function cancelPinCreate() {

// ===== FILE CARD HOVER PREVIEW =====
let _hoverTimer = null;
let _hoverVisible = false;
function initHoverPreview() {
    const preview = document.getElementById('hover-preview');
    if (!preview) return;
    document.addEventListener('mouseover', (e) => {
        const card = e.target.closest('.file-card-premium, .file-row-premium');
        if (!card) return;
        const fileId = card.dataset.fileId || card.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
        if (!fileId) return;
        clearTimeout(_hoverTimer);
        _hoverTimer = setTimeout(() => showHoverPreview(fileId, card), 800);
    });
    document.addEventListener('mouseout', (e) => {
        const card = e.target.closest('.file-card-premium, .file-row-premium');
        if (!card) return;
        const related = e.relatedTarget;
        if (related && (card.contains(related) || related.closest('.hover-preview'))) return;
        clearTimeout(_hoverTimer);
        hideHoverPreview();
    });
    preview.addEventListener('mouseleave', hideHoverPreview);
}
function showHoverPreview(fileId, cardEl) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) return;
    const preview = document.getElementById('hover-preview');
    if (!preview) return;
    const type = getFileType(file.name, file.mime);
    const icon = getFileIcon(type);

    let imgHtml = '';
    if (type === 'image' && file.thumbnailUrl) {
        imgHtml = `<img class="hover-preview-img" src="${file.thumbnailUrl}" alt="${file.name}" onerror="this.style.display='none'">`;
    } else if (type === 'image' && file.url) {
        imgHtml = `<img class="hover-preview-img" src="${file.url}" alt="${file.name}" onerror="this.style.display='none'">`;
    }

    preview.innerHTML = `
        ${imgHtml}
        <div class="hover-preview-name" title="${file.name}">${file.name}</div>
        <div class="hover-preview-meta">
            <span><i class="fas fa-weight-hanging" style="width:12px;font-size:9px"></i> ${formatSize(file.size)}</span>
            <span><i class="fas ${icon.icon}" style="width:12px;font-size:9px;color:${icon.color}"></i> ${type}</span>
            <span><i class="fas fa-clock" style="width:12px;font-size:9px"></i> ${formatDate(file.uploadedAt)}</span>
            ${file.caption ? `<span style="margin-top:2px;font-style:italic">"${file.caption.substring(0,40)}${file.caption.length > 40 ? '...' : ''}"</span>` : ''}
        </div>
        ${file.tag ? `<div class="hover-preview-tag"><span class="tag-dot" style="background:${file.tag};width:8px;height:8px"></span><span style="font-size:10px;color:var(--text-secondary)">Tagged</span></div>` : ''}
    `;

    // Position near the card, avoiding off-screen
    const rect = cardEl.getBoundingClientRect();
    const pw = 280, ph = preview.scrollHeight || 200;
    let px = rect.right + 8;
    let py = rect.top;
    if (px + pw > window.innerWidth - 8) px = rect.left - pw - 8;
    if (px < 8) px = 8;
    if (py + ph > window.innerHeight - 8) py = window.innerHeight - ph - 8;
    if (py < 8) py = 8;
    preview.style.left = px + 'px';
    preview.style.top = py + 'px';
    preview.classList.add('visible');
    _hoverVisible = true;
}
function hideHoverPreview() {
    const preview = document.getElementById('hover-preview');
    if (preview) preview.classList.remove('visible');
    _hoverVisible = false;
}

// ===== STORAGE WARNING SYSTEM =====
// getStorageLimitBytes() defined at end of file
function getStorageWarningLevel(usedBytes) {
    const limit = getStorageLimitBytes();
    const pct = limit > 0 ? (usedBytes / limit) * 100 : 0;
    if (pct > 90) return 'red';
    if (pct > 75) return 'orange';
    if (pct > 50) return 'yellow';
    return 'green';
}
function getStorageWarningPercent() {
    const files = APP.files.filter(f => !f.trashed);
    const totalUsed = files.reduce((sum, f) => sum + (f.size || 0), 0);
    const limit = getStorageLimitBytes();
    return limit > 0 ? Math.min((totalUsed / limit) * 100, 100) : 0;
}
function renderStorageWarningBanner() {
    const dismissed = localStorage.getItem('rb_storage_warning_dismissed');
    if (dismissed) return '';
    const pct = getStorageWarningPercent();
    if (pct < 75) return '';
    const files = APP.files.filter(f => !f.trashed);
    const totalUsed = files.reduce((sum, f) => sum + (f.size || 0), 0);
    const limit = getStorageLimitBytes();
    const level = getStorageWarningLevel(totalUsed);
    const levelClass = level === 'red' ? 'warning-red' : 'warning-orange';
    const icon = level === 'red' ? 'fa-exclamation-triangle' : 'fa-exclamation-circle';
    const isId = APP.lang === 'id';
    const msg = level === 'red'
        ? (isId ? `Penyimpanan hampir penuh! ${pct.toFixed(1)}% terpakai (${formatSize(totalUsed)} / ${formatSize(limit)})` : `Storage almost full! ${pct.toFixed(1)}% used (${formatSize(totalUsed)} / ${formatSize(limit)})`)
        : (isId ? `Penyimpanan tinggi: ${pct.toFixed(1)}% terpakai (${formatSize(totalUsed)} / ${formatSize(limit)})` : `Storage usage high: ${pct.toFixed(1)}% used (${formatSize(totalUsed)} / ${formatSize(limit)})`);
    if (!localStorage.getItem('rb_storage_notif_sent')) { sendNotification('Ridgebox', isId ? `Peringatan penyimpanan: ${pct.toFixed(1)}% terpakai` : `Storage warning: ${pct.toFixed(1)}% used`); localStorage.setItem('rb_storage_notif_sent', '1'); }
    return `<div class="storage-warning-banner ${levelClass}">
        <i class="fas ${icon}"></i>
        <span>${msg}</span>
        <button class="storage-warning-dismiss" onclick="dismissStorageWarning()">${isId ? 'Jangan tampilkan lagi' : "Don't show again"}</button>
    </div>`;
}
function dismissStorageWarning() {
    localStorage.setItem('rb_storage_warning_dismissed', '1');
    const banner = document.querySelector('.storage-warning-banner');
    if (banner) { banner.style.opacity = '0'; banner.style.transform = 'translateY(-100%)'; setTimeout(() => banner.remove(), 300); }
}
function checkStorageWarningToast() {
    const files = APP.files.filter(f => !f.trashed);
    const totalUsed = files.reduce((sum, f) => sum + (f.size || 0), 0);
    const level = getStorageWarningLevel(totalUsed);
    if (level === 'red') {
        const limit = getStorageLimitBytes();
        const pct = getStorageWarningPercent();
        const isId = APP.lang === 'id';
        showToast(isId ? `⚠️ Penyimpanan kritis: ${pct.toFixed(1)}% terpakai!` : `⚠️ Critical storage: ${pct.toFixed(1)}% used!`, 'warning', 8000);
    }
}
function getStorageIndicatorHtml() {
    const pct = getStorageWarningPercent();
    const level = pct > 90 ? 'red' : pct > 75 ? 'orange' : pct > 50 ? 'yellow' : 'green';
    return `<span class="storage-indicator"><span class="storage-indicator-dot ${level}"></span><span style="font-size:11px;color:var(--text-secondary)">${pct.toFixed(1)}%</span></span>`;
}

// ===== USAGE TREND CHART WIDGET =====
function renderUsageTrendCard() {
    const files = APP.files.filter(f => !f.trashed);
    const now = Date.now();
    const dayNames = APP.lang === 'id'
        ? ['Sen','Sel','Rab','Kam','Jum','Sab','Min']
        : ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    // Calculate uploads per day for last 7 days
    const days = [];
    const counts = [];
    for (let i = 6; i >= 0; i--) {
        const dayStart = new Date(now - i * 86400000);
        dayStart.setHours(0, 0, 0, 0);
        const dayEnd = new Date(dayStart); dayEnd.setDate(dayEnd.getDate() + 1);
        const dayIdx = dayStart.getDay();
        const adjustedIdx = dayIdx === 0 ? 6 : dayIdx - 1; // Mon=0
        const count = files.filter(f => f.uploadedAt >= dayStart.getTime() && f.uploadedAt < dayEnd.getTime()).length;
        days.push(dayNames[adjustedIdx]);
        counts.push(count);
    }
    const maxCount = Math.max(...counts, 1);
    const chartHeight = 80; // px for bars
    // Build SVG line path for trend line
    const svgWidth = 100; // percentage-based
    const svgHeight = chartHeight;
    const stepX = svgWidth / (counts.length - 1 || 1);
    let linePoints = counts.map((c, i) => {
        const x = i * stepX;
        const y = svgHeight - (c / maxCount) * (svgHeight - 8) - 4;
        return `${x},${y}`;
    });
    const linePath = 'M' + linePoints.join(' L');
    const areaPath = linePath + ` L${svgWidth},${svgHeight} L0,${svgHeight} Z`;

    const hasData = counts.some(c => c > 0);

    let barsHtml = counts.map((c, i) => {
        const barH = hasData ? Math.max(2, (c / maxCount) * chartHeight) : 2;
        return `<div class="usage-trend-bar-group">
            <div class="usage-trend-tooltip">${c} ${APP.lang==='id'?'file':'files'}</div>
            <div class="usage-trend-bar usage-trend-bar-gradient" style="height:${barH}px;${!hasData ? 'opacity:.2' : ''}"></div>
            <span class="usage-trend-label">${days[i]}</span>
        </div>`;
    }).join('');

    return `<div class="dash-card-title"><i class="fas fa-chart-line"></i> ${APP.lang==='id'?'Tren Unggah':'Upload Trend'}</div>
        <div class="usage-trend-chart">
            ${barsHtml}
        </div>`;
}

// ===== STORAGE BREAKDOWN WIDGET =====
function renderStorageBreakdownCard() {
    const files = APP.files.filter(f => !f.trashed);
    const totalUsed = files.reduce((sum, f) => sum + (f.size || 0), 0);
    const limit = getStorageLimitBytes();
    const docTypes = ['document','pdf','spreadsheet','presentation','text','code'];
    const typeConfig = [
        { key: 'image', label: APP.lang==='id'?'Foto':'Photos', color: '#10b981', icon: 'fa-image' },
        { key: 'video', label: APP.lang==='id'?'Video':'Videos', color: '#ef4444', icon: 'fa-film' },
        { key: 'audio', label: APP.lang==='id'?'Audio':'Audio', color: '#8b5cf6', icon: 'fa-music' },
        { key: 'document', label: APP.lang==='id'?'Dokumen':'Documents', color: '#3b82f6', icon: 'fa-file-word' },
        { key: 'other', label: APP.lang==='id'?'Lainnya':'Others', color: '#64748b', icon: 'fa-file' }
    ];
    const sizes = {};
    typeConfig.forEach(t => sizes[t.key] = 0);
    files.forEach(f => {
        const fType = getFileType(f.name, f.mime);
        if (fType === 'image') sizes.image += (f.size || 0);
        else if (fType === 'video') sizes.video += (f.size || 0);
        else if (fType === 'audio') sizes.audio += (f.size || 0);
        else if (docTypes.includes(fType)) sizes.document += (f.size || 0);
        else sizes.other += (f.size || 0);
    });
    // Sort by size desc, take top 5
    const sorted = typeConfig.map(t => ({...t, size: sizes[t.key]})).sort((a, b) => b.size - a.size);
    const maxSize = Math.max(...sorted.map(s => s.size), 1);
    const overallPct = limit > 0 ? Math.min((totalUsed / limit) * 100, 100) : 0;

    let barsHtml = sorted.filter(t => t.size > 0).map(t => {
        const pct = (t.size / maxSize * 100).toFixed(1);
        return `<div class="storage-breakdown-bar-item">
            <div class="storage-breakdown-bar-label"><i class="fas ${t.icon}" style="color:${t.color}"></i> ${t.label}</div>
            <div class="storage-breakdown-bar-track"><div class="storage-breakdown-bar-fill" style="width:${pct}%;background:${t.color}"></div></div>
            <div class="storage-breakdown-bar-size">${formatSize(t.size)}</div>
        </div>`;
    }).join('');

    if (!barsHtml) {
        barsHtml = `<div style="text-align:center;padding:16px 0;color:var(--text-secondary);font-size:12px">${APP.lang==='id'?'Belum ada file':'No files yet'}</div>`;
    }

    const levelColor = overallPct > 90 ? '#ef4444' : overallPct > 75 ? '#f97316' : overallPct > 50 ? '#f59e0b' : '#10b981';

    return `<div class="dash-card-title"><i class="fas fa-chart-bar"></i> ${APP.lang==='id'?'Rincian Penyimpanan':'Storage Breakdown'}</div>
        <div class="storage-breakdown-bar-wrap">
            ${barsHtml}
            <div class="storage-breakdown-bar-total">
                <div class="storage-breakdown-bar-label">${APP.lang==='id'?'Total':'Total'}</div>
                <div class="storage-breakdown-bar-track"><div class="storage-breakdown-bar-fill" style="width:${overallPct}%;background:${levelColor}"></div></div>
                <div class="storage-breakdown-bar-size">${formatSize(totalUsed)}</div>
            </div>
            <div style="font-size:11px;color:var(--text-secondary);text-align:center;margin-top:4px">${overallPct.toFixed(1)}% ${APP.lang==='id'?'dari':'of'} ${formatSize(limit)} ${APP.lang==='id'?'digunakan':'used'}</div>
        </div>`;
}

// ===== REFRESH UI - Complete refresh after file changes =====
async function refreshUI() {
    // If we're on a file detail page (#/file/xxx), redirect to dashboard
    const hash = location.hash || '#/';
    if (hash.startsWith('#/file/')) {
        location.hash = '#/dashboard';
        return;
    }
    // Use in-memory data directly (already updated by save/delete functions)
    // Re-fetching from IndexedDB causes race conditions where stale data overwrites fresh changes
    try {
        const customFolders = await dbGetAll('folders');
        APP.folders = [
            { id: 'all', name: t('allFiles'), icon: 'fa-folder', system: true },
            { id: 'recent', name: t('recent'), icon: 'fa-clock', system: true },
            { id: 'favorites', name: t('favorites'), icon: 'fa-star', system: true },
            { id: 'trash', name: t('trash'), icon: 'fa-trash', system: true },
            ...customFolders
        ];
    } catch(e) { console.warn('refreshUI reload error:', e); }
    // Safety check: sync non-trashed files from IndexedDB that might be missing from memory
    // (e.g., files added from another tab). Skip trashed files — they're handled by trash view.
    // Also update trash count cache for sidebar.
    try {
        const dbFiles = await dbGetAll('files');
        APP._trashFiles = dbFiles.filter(f => f.trashed);
        for (const dbFile of dbFiles) {
            if (!dbFile.trashed && !APP.files.find(f => f.id === dbFile.id)) {
                console.warn(`refreshUI: adding missing non-trashed file from DB: ${dbFile.id}`);
                APP.files.push(dbFile);
            }
        }
    } catch(e) { console.warn('refreshUI sync error:', e); }
    // Update sidebar counts
    const sidebar = document.getElementById('sidebar-panel');
    if (sidebar) sidebar.innerHTML = renderSidebarHTML();
    // Update file list
    renderFileList();
    // Update breadcrumb
    renderBreadcrumb();
    // Update tag filter bar
    renderTagFilterBar();
    // Update carousel
    const carouselSection = document.getElementById('carousel-section');
    if (carouselSection) carouselSection.innerHTML = renderCarousel();
}

// ===== LUXURY ANIMATION INIT FUNCTIONS =====
function initHeroSpotlight() {
    const section = document.getElementById('hero-section');
    const glow = document.getElementById('hero-glow');
    if (!section || !glow) return;
    // Skip on mobile/touch — too expensive
    if (window.innerWidth < 768 || 'ontouchstart' in window) {
        glow.style.display = 'none';
        return;
    }
    let _spotTick = false;
    const handler = (e) => {
        if (_spotTick) return;
        _spotTick = true;
        requestAnimationFrame(() => {
            const rect = section.getBoundingClientRect();
            glow.style.left = (e.clientX - rect.left) + 'px';
            glow.style.top = (e.clientY - rect.top) + 'px';
            glow.classList.add('active');
            _spotTick = false;
        });
    };
    section.addEventListener('mousemove', handler, { passive: true });
    section.addEventListener('mouseleave', () => glow.classList.remove('active'));
    if (window._spotlightCleanup) window._spotlightCleanup();
    window._spotlightCleanup = () => {
        section.removeEventListener('mousemove', handler);
    };
}

function initMagneticButtons() {
    // Skip on mobile/touch — causes jank
    if (window.innerWidth < 768 || 'ontouchstart' in window) return;
    document.querySelectorAll('.magnetic-btn').forEach(btn => {
        const handler = (e) => {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            btn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px)`;
        };
        const reset = () => { btn.style.transform = ''; };
        btn.addEventListener('mousemove', handler);
        btn.addEventListener('mouseleave', reset);
        btn.addEventListener('click', (e) => {
            const ripple = document.createElement('span');
            ripple.className = 'btn-ripple';
            const rect = btn.getBoundingClientRect();
            ripple.style.left = (e.clientX - rect.left) + 'px';
            ripple.style.top = (e.clientY - rect.top) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    });
}

function initWordReveal() {
    setTimeout(() => {
        document.querySelectorAll('.word-reveal').forEach((el, i) => {
            setTimeout(() => el.classList.add('revealed'), i * 200 + 300);

}

function initParallaxLayers() {
    const section = document.getElementById('hero-section');
    if (!section) return;
    // Skip on mobile/touch — expensive transform recalculations
    if (window.innerWidth < 768 || 'ontouchstart' in window) return;
    const layers = section.querySelectorAll('.parallax-layer');
    const handler = (e) => {
        const rect = section.getBoundingClientRect();
        const x = (e.clientX - rect.left - rect.width / 2) / rect.width;
        const y = (e.clientY - rect.top - rect.height / 2) / rect.height;
        layers.forEach(layer => {
            const depth = parseFloat(layer.dataset.depth || 0.02);
            const moveX = x * depth * 100;
            const moveY = y * depth * 100;
            layer.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    };
    section.addEventListener('mousemove', handler);
    if (window._parallaxCleanup) window._parallaxCleanup();
    window._parallaxCleanup = () => section.removeEventListener('mousemove', handler);
}

function initMockup3D() {
    const mockup = document.getElementById('mockup-3d');
    if (!mockup) return;
    // Skip on mobile/touch — 3D transforms are expensive
    if (window.innerWidth < 768 || 'ontouchstart' in window) return;
    const parent = mockup.parentElement;
    const handler = (e) => {
        const rect = parent.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        mockup.style.transform = `perspective(1200px) rotateX(${-y * 6}deg) rotateY(${x * 6}deg)`;
    };
    const reset = () => { mockup.style.transform = 'perspective(1200px) rotateX(2deg)'; };
    parent.addEventListener('mousemove', handler);
    parent.addEventListener('mouseleave', reset);
    if (window._mockup3DCleanup) window._mockup3DCleanup();
    window._mockup3DCleanup = () => {
        parent.removeEventListener('mousemove', handler);
        parent.removeEventListener('mouseleave', reset);
    };
}

function initSectionOrchestrator() {
    const sections = document.querySelectorAll('.section-orchestrated');
    if (!sections.length || !('IntersectionObserver' in window)) {
        sections.forEach(s => s.classList.add('in-view'));
        return;
    }
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('in-view');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
    sections.forEach(s => observer.observe(s));
    // Also init scale-entrance
    document.querySelectorAll('.scale-entrance').forEach(el => {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('in-view'); obs.unobserve(entry.target); }
            });
        }, { threshold: 0.1 });
        obs.observe(el);
    });
}

// ===== HERO PARTICLE CANVAS =====
function initHeroParticles() {
    const canvas = document.getElementById('hero-particles');
    if (!canvas) return;
    // Skip canvas particles on mobile for performance
    if (window.innerWidth < 768) { canvas.style.display = 'none'; return; }
    const ctx = canvas.getContext('2d');
    let w, h, particles = [], animId;
    function resize() {
        const parent = canvas.parentElement;
        if (!parent) return;
        w = canvas.width = parent.offsetWidth;
        h = canvas.height = parent.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    // Reduced particles for performance
    const count = Math.min(25, Math.floor(w * h / 40000));
    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.5 + 0.5,
            dx: (Math.random() - 0.5) * 0.3,
            dy: (Math.random() - 0.5) * 0.3,
            opacity: Math.random() * 0.25 + 0.05
        });
    }
    function draw() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
            p.x += p.dx;
            p.y += p.dy;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
            ctx.fill();
        });
        // Draw connections (reduced distance check)
        const maxDist = 80;
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distSq = dx * dx + dy * dy;
                if (distSq < maxDist * maxDist) {
                    const dist = Math.sqrt(distSq);
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(255,255,255,${0.04 * (1 - dist / maxDist)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
        animId = requestAnimationFrame(draw);
    }
    draw();
    // Cleanup on page change
    const origRoute = window._routeHandler;
    const cleanup = () => {
        cancelAnimationFrame(animId);
        window.removeEventListener('resize', resize);
    };
    // Store cleanup for next route
    if (window._particleCleanup) window._particleCleanup();
    window._particleCleanup = cleanup;
}

function animateCounters() { // F69
    const counters = document.querySelectorAll('[data-count]');
    counters.forEach(el => {
        const target = el.dataset.count;
        if (target === 'unlimited') return;
        const targetNum = parseInt(target);
        const duration = 1000;
        const start = performance.now();
        function update(now) {
            const elapsed = now - start;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.round(targetNum * eased).toLocaleString();
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    });
}

// ===== TYPING EFFECT =====
function initTypingEffect() {
    const el = document.getElementById('typing-text');
    if (!el) return;
    const phrases = [
        'Cloud Storage. Tanpa Batas.',
        'Powered by Telegram.',
        'Gratis. Aman. Cepat.'
    ];
    let phraseIdx = 0, charIdx = 0, deleting = false;
    let typeSpeed = 80, deleteSpeed = 40, pauseEnd = 2000, pauseStart = 500;

    function type() {
        const currentPhrase = phrases[phraseIdx];
        if (!deleting) {
            el.textContent = currentPhrase.substring(0, charIdx + 1);
            charIdx++;
            if (charIdx === currentPhrase.length) {
                deleting = true;
                setTimeout(type, pauseEnd);
                return;
            }
            setTimeout(type, typeSpeed);
        } else {
            el.textContent = currentPhrase.substring(0, charIdx - 1);
            charIdx--;
            if (charIdx === 0) {
                deleting = false;
                phraseIdx = (phraseIdx + 1) % phrases.length;
                setTimeout(type, pauseStart);
                return;
            }
            setTimeout(type, deleteSpeed);
        }
    }
    setTimeout(type, 1000);
}

// ===== ANIMATED HERO COUNTER (IntersectionObserver) =====
function initHeroCounterAnimation() {
    const counters = document.querySelectorAll('.hero-counter-num[data-count]');
    if (!counters.length) return;
    if (!('IntersectionObserver' in window)) {
        counters.forEach(el => {
            const target = parseInt(el.dataset.count);
            const suffix = el.dataset.suffix || '';
            el.textContent = target.toLocaleString() + suffix;
        });
        return;
    }
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const el = entry.target;
                const target = parseInt(el.dataset.count);
                const suffix = el.dataset.suffix || '';
                const duration = 1500;
                const start = performance.now();
                function update(now) {
                    const elapsed = now - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    el.textContent = Math.round(target * eased).toLocaleString() + suffix;
                    if (progress < 1) requestAnimationFrame(update);
                }
                requestAnimationFrame(update);
                observer.unobserve(el);
            }
        });
    }, { threshold: 0.1 });
    counters.forEach(el => observer.observe(el));
}

// ===== FEATURE CAROUSEL =====
let _carouselInterval = null;
let _carouselSlide = 0;
function initFeatureCarousel() {
    const track = document.getElementById('carousel-track');
    const dots = document.querySelectorAll('#carousel-dots .carousel-dot');
    if (!track || !dots.length) return;
    _carouselSlide = 0;
    updateCarouselPosition();
    _carouselInterval = setInterval(() => {
        _carouselSlide = (_carouselSlide + 1) % dots.length;
        updateCarouselPosition();
    }, 4000);
}
function updateCarouselPosition() {
    const track = document.getElementById('carousel-track');
    const dots = document.querySelectorAll('#carousel-dots .carousel-dot');
    if (!track || !dots.length) return;
    const cards = track.querySelectorAll('.feature-carousel-card');
    if (!cards.length) return;
    const cardWidth = cards[0].offsetWidth + 12; // margin
    const isMobile = window.innerWidth <= 768;
    const isSmallMobile = window.innerWidth <= 480;
    let offset;
    if (isSmallMobile) {
        offset = -(_carouselSlide * cardWidth);
    } else if (isMobile) {
        offset = -(_carouselSlide * cardWidth);
    } else {
        // Desktop: show 3 cards, shift by 1 card per slide
        offset = -(_carouselSlide * cardWidth);
    }
    track.style.transform = `translateX(${offset}px)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === _carouselSlide));
}
function goToCarouselSlide(idx) {
    _carouselSlide = idx;
    updateCarouselPosition();
    if (_carouselInterval) clearInterval(_carouselInterval);
    _carouselInterval = setInterval(() => {
        _carouselSlide = (_carouselSlide + 1) % document.querySelectorAll('#carousel-dots .carousel-dot').length;
        updateCarouselPosition();
    }, 4000);
}
function pauseCarousel() { if (_carouselInterval) clearInterval(_carouselInterval); }
function resumeCarousel() {
    if (_carouselInterval) clearInterval(_carouselInterval);
    _carouselInterval = setInterval(() => {
        const dots = document.querySelectorAll('#carousel-dots .carousel-dot');
        _carouselSlide = (_carouselSlide + 1) % dots.length;
        updateCarouselPosition();
    }, 4000);
}

function initParallaxOrbs() {
    const container = document.getElementById('parallax-orbs');
    if (!container) return;
    // Create orbs
    const orbData = [
        { w: 400, h: 400, bg: '#3b82f6', top: '10%', left: '5%', speed: 0.02 },
        { w: 350, h: 350, bg: '#8b5cf6', top: '50%', left: '70%', speed: 0.03 },
        { w: 300, h: 300, bg: '#ec4899', top: '70%', left: '20%', speed: 0.015 },
        { w: 250, h: 250, bg: '#06b6d4', top: '20%', left: '60%', speed: 0.025 }
    ];
    container.innerHTML = '';
    orbData.forEach(o => {
        const orb = document.createElement('div');
        orb.className = 'parallax-orb';
        orb.style.width = o.w + 'px';
        orb.style.height = o.h + 'px';
        orb.style.background = o.bg;
        orb.style.top = o.top;
        orb.style.left = o.left;
        orb.dataset.speed = o.speed;
        container.appendChild(orb);
    });

    // Throttled scroll handler
    let ticking = false;
    const handler = () => {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
            const scrollY = window.scrollY;
            container.querySelectorAll('.parallax-orb').forEach(orb => {
                const speed = parseFloat(orb.dataset.speed || 0.02);
                orb.style.transform = `translateY(${scrollY * speed}px)`;
            });
            ticking = false;
        });
    };
    window.addEventListener('scroll', handler, { passive: true });
}

function initScrollRevealEnhanced() {
    const elements = document.querySelectorAll('.scroll-reveal');
    if (!elements.length) return;
    if (!('IntersectionObserver' in window)) {
        elements.forEach(el => el.classList.add('visible'));
        return;
    }
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    elements.forEach(el => observer.observe(el));
}

function initScrollReveal() {

    if (!('IntersectionObserver' in window)) { elements.forEach(el => el.classList.add('revealed')); return; }

        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('revealed');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

}

            const target = parseInt(el.getAttribute('data-target'));
            if (isNaN(target) || target === 0) return;
            let current = 0;
            const step = Math.max(1, Math.ceil(target / 30));
            const timer = setInterval(() => {
                current += step;
                if (current >= target) { current = target; clearInterval(timer); }
                el.textContent = current;
            }, 25);
        });
    }, 100);

// ===== DASHBOARD STATS BAR =====
function renderDashboardStatsBar() {
    const isId = APP.lang === 'id';
    const totalFiles = APP.files.filter(f => !f.trashed).length;
    const totalDownloads = APP.shares.reduce((s, sh) => s + (sh.downloadCount || 0), 0);
    const totalShares = APP.shares.length;
    const totalBytes = APP.files.filter(f => !f.trashed).reduce((sum, f) => sum + (f.size || 0), 0);
    const limit = getStorageLimitBytes();
    const pct = limit > 0 ? Math.min(Math.round((totalBytes / limit) * 100), 100) : 0;

    return `<div class="dash-stats-bar">
        <div class="dash-stat-card">
            <div class="stat-icon" style="background:rgba(59,130,246,.1);color:#3b82f6"><i class="fas fa-file"></i></div>
            <div class="stat-value">${totalFiles}</div>
            <div class="stat-label">${isId ? 'Total File' : 'Total Files'}</div>
            <div class="stat-bg"><i class="fas fa-file"></i></div>
        </div>
        <div class="dash-stat-card">
            <div class="stat-icon" style="background:rgba(16,185,129,.1);color:#10b981"><i class="fas fa-download"></i></div>
            <div class="stat-value">${totalDownloads}</div>
            <div class="stat-label">${isId ? 'Total Unduhan' : 'Total Downloads'}</div>
            <div class="stat-bg"><i class="fas fa-download"></i></div>
        </div>
        <div class="dash-stat-card">
            <div class="stat-icon" style="background:rgba(139,92,246,.1);color:#8b5cf6"><i class="fas fa-share-alt"></i></div>
            <div class="stat-value">${totalShares}</div>
            <div class="stat-label">${isId ? 'Total Tautan' : 'Total Shares'}</div>
            <div class="stat-bg"><i class="fas fa-share-alt"></i></div>
        </div>
        <div class="dash-stat-card">
            <div class="stat-icon" style="background:rgba(245,158,11,.1);color:#f59e0b"><i class="fas fa-database"></i></div>
            <div class="stat-value">${formatSize(totalBytes)}</div>
            <div class="stat-label">${isId ? 'Penyimpanan' : 'Storage Used'} · ${pct}%</div>
            <div class="stat-bg"><i class="fas fa-database"></i></div>
        </div>
        <div class="dash-stat-card" onclick="location.hash='#/storage'" style="cursor:pointer">
            <div class="stat-icon" style="background:${APP.gdriveConfig.configured ? 'rgba(66,133,244,.1)' : 'rgba(239,68,68,.08)'};color:${APP.gdriveConfig.configured ? '#4285f4' : '#ef4444'}"><i class="fab fa-google"></i></div>
            <div class="stat-value">${APP.gdriveConfig.configured ? APP.gdriveAccounts.filter(a=>a.status==='connected').length : '—'}</div>
            <div class="stat-label">${APP.gdriveConfig.configured ? (isId ? 'Google Drive Aktif' : 'Google Drive Active') : (isId ? 'GDrive Belum Setup' : 'GDrive Not Setup')}</div>
            <div class="stat-bg"><i class="fab fa-google"></i></div>
        </div>
    </div>`;
}

// ===== RECENT ACTIVITY WIDGET =====
function renderRecentActivity() {
    const isId = APP.lang === 'id';
    const log = APP._activityCache || [];
    const last5 = log.slice(0, 5);
    const typeConfig = {
        upload: { icon: 'fa-cloud-arrow-up', color: '#10b981', bg: 'rgba(16,185,129,.1)' },
        download: { icon: 'fa-download', color: '#3b82f6', bg: 'rgba(59,130,246,.1)' },
        share: { icon: 'fa-share-alt', color: '#8b5cf6', bg: 'rgba(139,92,246,.1)' },
        delete: { icon: 'fa-trash', color: '#ef4444', bg: 'rgba(239,68,68,.1)' },
        rename: { icon: 'fa-pen', color: '#f59e0b', bg: 'rgba(245,158,11,.1)' },
        move: { icon: 'fa-arrows-alt', color: '#06b6d4', bg: 'rgba(6,182,212,.1)' }
    };
    let items = '';
    if (last5.length === 0) {
        items = `<div style="text-align:center;padding:16px 0;color:var(--text-secondary);font-size:12px">${isId ? 'Belum ada aktivitas' : 'No activity yet'}</div>`;
    } else {
        items = last5.map(a => {
            const cfg = typeConfig[a.type] || typeConfig.move;
            return `<div class="recent-item">
                <div class="recent-item-icon" style="background:${cfg.bg};color:${cfg.color}"><i class="fas ${cfg.icon}"></i></div>
                <div class="recent-item-info">
                    <div class="recent-item-name">${a.description || a.type}</div>
                    <div class="recent-item-meta">${a.type}</div>
                </div>
                <div class="recent-item-time">${timeAgo(a.timestamp)}</div>
            </div>`;
        }).join('');
    }
    return `<div class="recent-widget">
        <div class="recent-widget-header">
            <div class="recent-widget-title"><i class="fas fa-clock-rotate-left"></i> ${isId ? 'Aktivitas Terbaru' : 'Recent Activity'}</div>
            <div class="recent-widget-link" onclick="document.getElementById('activity-card')&&document.getElementById('activity-card').scrollIntoView({behavior:'smooth'})">${isId ? 'Lihat semua' : 'View all'}</div>
        </div>
        ${items}
    </div>`;
}

    const isId = APP.lang === 'id';

    let items = '';
    if (last3.length === 0) {
        items = `<div style="text-align:center;padding:16px 0;color:var(--text-secondary);font-size:12px">${isId ? 'Belum ada tautan' : 'No shares yet'}</div>`;
    } else {
        items = last3.map(s => {
            const file = APP.files.find(f => f.id === s.fileId);

// ===== SELECT FOLDER (integrated) =====
function selectFolder(folderId) {
    APP.currentFolder = folderId;
    APP.quickFilter = null;
    APP.tagFilter = null;
    APP.providerFilter = null;
    APP.selectedFiles.clear();
    APP.batchMode = false;
    // Update sidebar
    const sidebar = document.getElementById('sidebar-panel');
    if (sidebar) sidebar.innerHTML = renderSidebarHTML();
    renderBreadcrumb();
    renderQuickFilter();
    renderTagFilterBar();
    // Folder switch animation
    const container = document.getElementById('file-list-container');
    if (container) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(8px)';
        setTimeout(() => {
            renderFileList();
            container.style.transition = 'opacity .25s ease, transform .25s ease';
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 150);
    } else {
        renderFileList();
    }
    // Close mobile sidebar after selection
    if (APP.viewMode === 'mobile') toggleMobileSidebar(false);
}

// ===== FILE LIST (integrated with ALL enhancements) =====
async function renderFileList() {
    const container = document.getElementById('file-list-container');
    if (!container) return;

    // For trash view, we need to load trashed files from IndexedDB
    // because they are removed from APP.files when trashed
    if (APP.currentFolder === 'trash') {
        try {
            const allDbFiles = await dbGetAll('files');
            APP._trashFiles = allDbFiles.filter(f => f.trashed);
        } catch(e) {
            console.warn('Failed to load trash files:', e);
            APP._trashFiles = [];
        }
    }

    let files = getFilteredFiles();
    // Debug: log trashed state
    const trashedCount = APP.files.filter(f => f.trashed).length;
    const totalCount = APP.files.length;
    console.log(`renderFileList: total=${totalCount}, trashed=${trashedCount}, visible=${files.length}, folder=${APP.currentFolder}`);

    // Sort
    files.sort((a, b) => {
        // Pinned first
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        // Custom order
        const orderA = APP.customOrder[a.id] ?? 99999;
        const orderB = APP.customOrder[b.id] ?? 99999;
        if (orderA !== orderB) return orderA - orderB;
        // Sort field
        let cmp = 0;
        if (APP.sortBy === 'date') cmp = (b.uploadedAt || 0) - (a.uploadedAt || 0);
        else if (APP.sortBy === 'name') cmp = (a.name || '').localeCompare(b.name || '');
        else if (APP.sortBy === 'size') cmp = (b.size || 0) - (a.size || 0);
        return APP.sortOrder === 'asc' ? -cmp : cmp;
    });

    if (files.length === 0) {
        container.innerHTML = renderEmptyState();
        return;
    }

    // Clear history / empty trash buttons
    let actionBtns = '';
    if (APP.currentFolder === 'trash' && files.length > 0) {
        const isId = APP.lang === 'id';
        const purgeDays = APP.settings.trashPurgeDays;
        const now = Date.now();
        actionBtns = `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <button class="clear-history-btn" onclick="emptyTrash()"><i class="fas fa-trash-alt"></i> ${isId?'Kosongkan Sampah':'Empty Trash'}</button>
            <button class="clear-history-btn" style="background:rgba(16,185,129,.08);color:#10b981;border-color:rgba(16,185,129,.2)" onclick="restoreAllTrash()"><i class="fas fa-undo"></i> ${isId?'Pulihkan Semua':'Restore All'}</button>
        </div>`;
        if (purgeDays > 0) {
            const urgentFiles = files.filter(f => {
                const daysLeft = Math.max(0, purgeDays - Math.floor((now - (f.trashedAt || 0)) / 86400000));
                return daysLeft < 3;
            });
            if (urgentFiles.length > 0) {
                const minDays = files.reduce((min, f) => {
                    const d = Math.max(0, purgeDays - Math.floor((now - (f.trashedAt || 0)) / 86400000));
                    return d < min ? d : min;
                }, Infinity);
                actionBtns = `<div style="padding:10px 14px;background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(249,115,22,.08));border:1px solid rgba(239,68,68,.2);border-radius:10px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
                    <i class="fas fa-exclamation-triangle" style="color:#ef4444"></i>
                    <span style="font-size:13px;color:#ef4444;font-weight:500">${urgentFiles.length} ${isId?'file akan dihapus permanen dalam':'file(s) will be permanently deleted in'} ${minDays} ${isId?'hari':'day(s)'}</span>
                </div>` + actionBtns;
            }
        }
    } else if (APP.currentFolder === 'recent' && files.length > 0) {
        actionBtns = `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <button class="clear-history-btn" onclick="clearRecentHistory()"><i class="fas fa-broom"></i> ${APP.lang==='id'?'Hapus Riwayat':'Clear History'}</button>
        </div>`;
    }

    if (APP.currentView === 'categories') {
        container.innerHTML = `${actionBtns}${renderCategoriesView()}`;
    } else if (APP.currentView === 'grid') {
        container.innerHTML = `${actionBtns}<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px">
            ${files.map((f, i) => renderFileGridItem(f, i)).join('')}
        </div>`;
    } else {
        container.innerHTML = `${actionBtns}<div style="border:1px solid var(--border);border-radius:14px;overflow:hidden">
            ${files.map((f, i) => renderFileListRow(f, i)).join('')}
        </div>`;
    }
    updateQuickActions();
    initSwipeGestures();
    initLongPressGestures();
    loadThumbnailsForVisibleFiles(files);
}

function getFilteredFiles() {
    let files;
    // Folder filter
    if (APP.currentFolder === 'trash') {
        // Trash view uses files loaded from IndexedDB (they're removed from APP.files when trashed)
        files = [...(APP._trashFiles || [])];
    } else {
        files = [...APP.files];
        // For non-trash views, filter out any trashed files that might still be in memory
        files = files.filter(f => !f.trashed);
    }

    if (APP.currentFolder === 'recent') {
        files = files.sort((a, b) => (b.uploadedAt || 0) - (a.uploadedAt || 0)).slice(0, 20);
    } else if (APP.currentFolder === 'favorites') {
        files = files.filter(f => f.starred);
    } else if (APP.currentFolder === 'shared') {
        files = files.filter(f => APP.shares.some(s => s.fileId === f.id));
    } else if (APP.currentFolder === 'encrypted') {
        files = files.filter(f => f.encrypted);
    } else if (APP.currentFolder !== 'all' && APP.currentFolder !== 'trash') {
        files = files.filter(f => f.folderId === APP.currentFolder);
    }

    // Quick filter (F65)
    if (APP.quickFilter === 'today') files = files.filter(f => isToday(f.uploadedAt));
    else if (APP.quickFilter === 'thisWeek') files = files.filter(f => isThisWeek(f.uploadedAt));
    else if (APP.quickFilter === 'large') files = files.filter(f => f.size > 10 * 1024 * 1024);
    else if (APP.quickFilter === 'pinned') files = files.filter(f => f.pinned);
    else if (APP.quickFilter === 'encrypted') files = files.filter(f => f.encrypted);

    // Type filter
    if (APP.filterType !== 'all') {
        files = files.filter(f => getFileType(f.name, f.mime) === APP.filterType);
    }

    // Deep search (F54)
    if (APP.searchQuery) {
        const q = APP.searchQuery.toLowerCase();
        files = files.filter(f =>
            (f.name || '').toLowerCase().includes(q) ||
            (f.caption || '').toLowerCase().includes(q) ||
            (f.notes || '').toLowerCase().includes(q) ||
            (f.folderId || '').toLowerCase().includes(q) ||
            getFileType(f.name, f.mime).includes(q)
        );
    }

    // Tag filter
    if (APP.tagFilter) {
        files = files.filter(f => f.tag === APP.tagFilter);
    }

    // Storage provider filter
    if (APP.providerFilter) {
        if (APP.providerFilter === 'gdrive') {
            files = files.filter(f => f.storageProvider === 'gdrive');
        } else if (APP.providerFilter === 'telegram') {
            files = files.filter(f => !f.storageProvider || f.storageProvider === 'telegram');
        }
    }

    // Feature 7: Advanced search filter
    files = applyAdvancedSearchFilter(files);

    return files;
}

// Immediately remove a file element from the DOM (visual feedback before IndexedDB save)
function removeFileElement(fileId) {
    // Remove grid card
    const gridCard = document.querySelector(`[data-file-id="${fileId}"]`);
    if (gridCard) gridCard.remove();
    // Remove list row — it may not have data-file-id, so also check onclick attribute
    document.querySelectorAll('.file-row-premium').forEach(row => {
        if (row.getAttribute('onclick')?.includes(fileId)) row.remove();
    });
    // Also try by any element that references this file
    document.querySelectorAll(`[onclick*="${fileId}"]`).forEach(el => {
        if (el.classList.contains('file-row-premium') || el.classList.contains('file-card-premium')) el.remove();
    });
}

// Quick delete handler for inline delete button
async function quickDeleteFile(fileId) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) { console.warn('quickDelete: file not found', fileId); return; }
    // Immediately remove from DOM for instant visual feedback
    removeFileElement(fileId);
    // Set trashed flags
    file.trashed = true;
    file.trashedAt = Date.now();
    // Save to IndexedDB with trashed flag
    try {
        await saveFile(file);
        console.log('quickDelete: saved', fileId, 'trashed=', file.trashed);
    } catch(e) { console.error('quickDelete save error:', e); }
    // CRITICAL: Remove from APP.files IMMEDIATELY so it disappears from all non-trash views
    APP.files = APP.files.filter(f => f.id !== fileId);
    APP.selectedFiles.delete(fileId);
    closeDetailPanel();
    closeContextMenu();
    showUndoToast(t('movedToTrash'), async () => { await restoreFile(fileId); });
    await refreshUI();
}

// ===== GESTURES (Long-press for context menu) =====
function initSwipeGestures() { /* No longer using swipe - using inline delete buttons */ }
function initLongPressGestures() {
    const fileCards = document.querySelectorAll('.file-card-premium, .file-row-premium');
    fileCards.forEach(el => {
        if (el._longPressInit) return;
        el._longPressInit = true;
        let timer = null;
        const longPressDuration = 500;

        el.addEventListener('touchstart', (e) => {
            // Don't trigger long-press on delete/restore buttons
            if (e.target.closest('.mobile-delete-btn, .mobile-restore-btn, .grid-quick-delete')) return;
            timer = setTimeout(() => {
                if (navigator.vibrate) navigator.vibrate(30);
                const fileId = el.getAttribute('onclick')?.match(/'([^']+)'/)?.[1]
                    || el.closest('[data-file-id]')?.getAttribute('data-file-id');
                if (fileId) {
                    const rect = el.getBoundingClientRect();
                    const fakeEvent = {
                        preventDefault: () => {},
                        stopPropagation: () => {},
                        clientX: rect.left + rect.width / 2,
                        clientY: rect.top + rect.height / 2
                    };
                    showContextMenu(fakeEvent, fileId);
                }
            }, longPressDuration);
        }, { passive: true });

        el.addEventListener('touchmove', () => { clearTimeout(timer); }, { passive: true });
        el.addEventListener('touchend', () => { clearTimeout(timer); }, { passive: true });
        el.addEventListener('touchcancel', () => { clearTimeout(timer); }, { passive: true });
    });
}

// ===== CLEAR HISTORY / RESTORE ALL =====
async function clearRecentHistory() {
    showConfirm(
        APP.lang === 'id' ? 'Hapus Riwayat?' : 'Clear History?',
        APP.lang === 'id' ? 'File terbaru akan dipindahkan ke sampah.' : 'Recent files will be moved to trash.',
        async () => {
            const recentFiles = APP.files.filter(f => !f.trashed && isToday(f.uploadedAt));
            const trashedIds = new Set();
            for (const f of recentFiles) {
                f.trashed = true;
                f.trashedAt = Date.now();
                await saveFile(f);
                trashedIds.add(f.id);
            }
            // Remove trashed files from APP.files
            APP.files = APP.files.filter(f => !trashedIds.has(f.id));
            APP.selectedFiles.clear();
            closeDetailPanel();
            closeContextMenu();
            showToast(`${recentFiles.length} ${APP.lang==='id'?'file dipindahkan ke sampah':'files moved to trash'}`, 'info');
            await refreshUI();
        },
        true
    );
}

async function restoreAllTrash() {
    showConfirm(
        APP.lang === 'id' ? 'Pulihkan Semua?' : 'Restore All?',
        APP.lang === 'id' ? 'Semua file di sampah akan dipulihkan.' : 'All trashed files will be restored.',
        async () => {
            // Get trashed files from IndexedDB (they're not in APP.files anymore)
            let trashFiles;
            try {
                const allDbFiles = await dbGetAll('files');
                trashFiles = allDbFiles.filter(f => f.trashed);
            } catch(e) { trashFiles = []; }
            for (const f of trashFiles) {
                f.trashed = false;
                f.trashedAt = null;
                await saveFile(f);
                // Add back to APP.files
                if (!APP.files.find(af => af.id === f.id)) {
                    APP.files.push(f);
                }
            }
            closeDetailPanel();
            closeContextMenu();
            showToast(`${trashFiles.length} ${APP.lang==='id'?'file dipulihkan':'files restored'}`, 'success');
            await refreshUI();
        },
        false
    );
}

// ===== FILE CLICK HANDLER (F91 shift+click) =====
function handleFileClick(e, fileId, index) {
    if (APP.batchMode || e.shiftKey) {
        e.preventDefault();
        if (e.shiftKey && APP.lastSelectedIndex >= 0) {
            // F91: Range select
            const files = getFilteredFiles();
            const start = Math.min(APP.lastSelectedIndex, index);
            const end = Math.max(APP.lastSelectedIndex, index);
            for (let i = start; i <= end; i++) {
                if (files[i]) APP.selectedFiles.add(files[i].id);
            }
        } else {
            if (APP.selectedFiles.has(fileId)) APP.selectedFiles.delete(fileId);
            else APP.selectedFiles.add(fileId);
        }
        APP.lastSelectedIndex = index;
        renderFileList();
    } else if (e.detail === 2) {
        // Double click → preview
        openPreview(fileId);
    } else {
        // Single click → detail panel
        openDetailPanel(fileId);
    }
}

// ===== DRAG & DROP (F46, F86) =====
let draggedFileId = null;
function handleDragStart(e, fileId) {
    draggedFileId = fileId;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', fileId);
}
function handleFolderDrop(e, folderId) {
    e.preventDefault();
    if (!draggedFileId) return;
    moveFileToFolder(draggedFileId, folderId);
    draggedFileId = null;
}
function handleDragReorder(e, index) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}
function handleDropReorder(e, targetId) {
    e.preventDefault();
    if (!draggedFileId || draggedFileId === targetId) return;
    const targetIdx = APP.files.findIndex(f => f.id === targetId);
    if (targetIdx >= 0) {
        APP.customOrder[draggedFileId] = targetIdx;
        localStorage.setItem('rb_custom_order', JSON.stringify(APP.customOrder));
    }
    draggedFileId = null;
    renderFileList();
}
function setupDragDrop() {
    const zone = document.getElementById('drop-zone');
    const container = document.getElementById('file-list-container');
    if (!container) return;
    ['dragenter', 'dragover'].forEach(ev => {
        container.addEventListener(ev, (e) => {
            e.preventDefault();
            if (zone) zone.style.display = 'block';
            if (zone) zone.classList.add('drag-over');
        });
    });
    ['dragleave', 'drop'].forEach(ev => {
        container.addEventListener(ev, (e) => {
            if (e.target === container || !container.contains(e.relatedTarget)) {
                if (zone) zone.style.display = 'none';
                if (zone) zone.classList.remove('drag-over');
            }
        });
    });
    container.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
            handleFileSelect(e.dataTransfer.files);
        }
    });
}

function triggerUpload() {

function triggerUploadWithDriveSelect() {
    const inp = document.getElementById('file-upload-input');
    if (!inp) return;

    const originalOnchange = inp.onchange;

async function handleFileSelect(fileList) {
    if (!fileList || fileList.length === 0) return;
    showUploadPreview(fileList);
    for (const file of fileList) {
        await executeUpload(file);
    }
    const inp = document.getElementById('file-upload-input');
    if (inp) inp.value = '';
}

async function executeUpload(file, folderParam) {
    // Smart Storage Allocation: Try Google Drive first if connected
    if (APP.gdriveAccounts.filter(a => a.status === 'connected').length > 0) {
        const gdriveResult = await executeUploadToGDrive(file, folderParam);
        if (gdriveResult) {
            renderFileList();
            return; // Successfully uploaded to Google Drive
        }
        // If GDrive upload failed or no space, fall through to Telegram
    }

    const bot = APP.bots[0];
    if (!bot) { showToast(t('uploadError') + ': No bot configured', 'error'); return; }

    // Feature 4: Chunked upload for large files (>10MB)
    if (file.size > 10 * 1024 * 1024) {
        APP.activeUploads++;
        updateGlobalProgress();
        try {
            await executeChunkedUpload(file, folderParam);
            APP.activeUploads--;
            updateGlobalProgress();
            showToast(`${file.name} ${t('uploaded')}`, 'success');
            sendNotification('Ridgebox', `${file.name} uploaded`);
            logActivity('upload', `${APP.lang==='id'?'Mengunggah':'Uploaded'} ${file.name}`);
            triggerWebhook('file.uploaded', { fileId: file.name, fileName: file.name, fileSize: file.size, fileType: getFileType(file.name, file.type) });
            checkStorageWarning();
        } catch(e) {
            APP.activeUploads--;
            updateGlobalProgress();
            showToast(t('uploadError') + ': ' + e.message, 'error');
        }
        return;
    }

    APP.activeUploads++;
    updateGlobalProgress();

    try {
        let fileData = file;
        let fileName = file.name;
        let fileSize = file.size;
        let mimeType = file.type || 'application/octet-stream';
        let isEncrypted = false;

        // F11: Encrypt if enabled
        if (APP.settings.encryption) {
            const buffer = await file.arrayBuffer();
            const encData = await encryptData(buffer, 'ridgebox_' + bot.chatId);
            fileData = new Blob([encData], { type: 'application/octet-stream' });
            fileName += '.enc';
            isEncrypted = true;
        }

        // F81: Check for versioning (same name in same folder)
        const folderId = folderParam || APP.currentFolder;
        const existing = APP.files.filter(f => f.name === file.name && f.folderId === folderId && !f.trashed);
        const version = existing.length + 1;

        // F76: Proxy mode vs direct
        let result;
        if (APP.settings.proxyMode !== false) {
            // Upload via server proxy
            const formData = new FormData();
            formData.append('document', fileData, fileName);
            formData.append('bot_index', bot.index);
            if (folderParam) formData.append('chat_id', bot.chatId);

            const resp = await fetch('/api/upload', { method: 'POST', body: formData });
            result = await resp.json();
        } else {
            // Direct upload to Telegram
            const formData = new FormData();
            formData.append('chat_id', bot.chatId);
            formData.append('document', fileData, fileName);
            const resp = await fetch(`https://api.telegram.org/bot${bot.token}/sendDocument`, { method: 'POST', body: formData });
            result = await resp.json();
        }

        if (result.ok || (result.result && result.result.message_id)) {
            const msg = result.result;
            const doc = msg.document || msg.photo?.[msg.photo.length - 1] || msg.video || msg.audio || msg.animation;
            const fileId = doc?.file_id || genId();
            // Telegram sendDocument doesn't return file_path — must call getFile API separately
            let filePath = '';
            try {
                const fileResp = await fetch('/api/file-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: fileId, bot_index: bot.index || '0' })
                });
                const fileData = await fileResp.json();
                if (fileData.ok && fileData.result && fileData.result.file_path) {
                    filePath = fileData.result.file_path;
                }
            } catch(e) { console.warn('getFile failed:', e); }

            // F103: Auto-tag by file type
            const fileType = getFileType(fileName, mimeType);
            const autoTag = getAutoTagColor(fileType);

            const meta = {
                id: genId(),
                name: file.name,
                size: fileSize,
                mime: mimeType,
                fileId: fileId,
                filePath: filePath,
                messageId: msg.message_id || null,
                botIndex: bot.index || '0',
                chatId: bot.chatId,
                folderId: folderId === 'all' || folderId === 'recent' || folderId === 'favorites' || folderId === 'trash' ? null : folderId,
                uploadedAt: Date.now(),
                pinned: false,
                starred: false,
                trashed: false,
                encrypted: isEncrypted,
                version: version,
                tag: autoTag,
                caption: '',
                shareCount: 0
            };

            await saveFile(meta);
            APP.files.push(meta);
            showToast(t('uploaded'), 'success');
            sendNotification('Ridgebox', `${file.name} ${t('uploaded').toLowerCase()}`);
            logActivity('upload', `${APP.lang==='id'?'Mengunggah':'Uploaded'} ${file.name}`);
            triggerWebhook('file.uploaded', { fileId: meta.id, fileName: meta.name, fileSize: meta.size, fileType: fileType, folderId: meta.folderId });
            checkStorageWarning();
            updateUploadPreviewProgress(file.name, 100);
            setTimeout(clearUploadPreview, 2000);
            // Minimize smart upload zone after first upload
            const suz = document.getElementById('smart-upload-zone');
            if (suz && !suz.classList.contains('minimized')) suz.classList.add('minimized');
            renderFileList();
            const _glowC = document.getElementById('file-list-container');
            if (_glowC) { _glowC.classList.add('success-glow'); setTimeout(() => _glowC.classList.remove('success-glow'), 1000); }
            const sidebar = document.getElementById('sidebar-panel');
            if (sidebar) sidebar.innerHTML = renderSidebarHTML();
        } else {
            showToast(t('uploadError') + ': ' + (result.description || 'Unknown error'), 'error');
        }
    } catch (err) {
        showToast(t('uploadError') + ': ' + err.message, 'error');
    } finally {
        APP.activeUploads--;
        updateGlobalProgress();
    }
}

function updateGlobalProgress() { // F93
    const bar = document.getElementById('global-progress-bar');
    if (!bar) return;
    if (APP.activeUploads === 0) {
        bar.style.width = '0';
    } else {
        bar.style.width = Math.min(90, APP.activeUploads * 30) + '%';
        setTimeout(() => { if (APP.activeUploads === 0) bar.style.width = '0'; }, 1000);
    }
}

let cameraStream = null;
let mediaRecorder = null;
let recordingChunks = [];

async function startCamera() {
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
        const video = document.getElementById('camera-preview');
        if (video) video.srcObject = cameraStream;
    } catch (err) {
        showToast('Camera error: ' + err.message, 'error');
    }
}

function closeCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
}

function capturePhoto() {
    const video = document.getElementById('camera-preview');
    const canvas = document.getElementById('camera-canvas');
    if (!video || !canvas) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(async (blob) => {
        const file = new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
        await executeUpload(file);
        closeCamera();
        closeModal();
    }, 'image/jpeg');
}

function toggleRecording() {
    const btn = document.getElementById('record-btn');
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        recordingChunks = [];
        const video = document.getElementById('camera-preview');
        const stream = video?.srcObject;
        if (!stream) return;
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordingChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            const blob = new Blob(recordingChunks, { type: 'video/webm' });
            const file = new File([blob], `video_${Date.now()}.webm`, { type: 'video/webm' });
            await executeUpload(file);
            closeCamera();
            closeModal();
        };
        mediaRecorder.start();
        if (btn) btn.innerHTML = `<i class="fas fa-stop"></i> ${t('stopRecording')}`;
    } else {
        mediaRecorder.stop();
        if (btn) btn.innerHTML = `<i class="fas fa-video"></i> ${t('startRecording')}`;
    }
}

// ===== FILE OPERATIONS =====
async function moveToTrash(fileId) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) { console.warn('moveToTrash: file not found', fileId); return; }
    const fileName = file.name; // Save name before removing
    logActivity('delete', `${APP.lang==='id'?'Menghapus':'Deleted'} ${fileName}`);
    // Immediately remove from DOM for instant visual feedback
    removeFileElement(fileId);
    // Set trashed flags
    file.trashed = true;
    file.trashedAt = Date.now();
    // Save to IndexedDB with trashed flag
    try {
        await saveFile(file);
        console.log('moveToTrash: saved', fileId, 'trashed=', file.trashed);
    } catch(e) { console.error('moveToTrash save error:', e); }
    // CRITICAL: Remove from APP.files IMMEDIATELY so it disappears from all non-trash views
    // The trash view will read directly from IndexedDB
    APP.files = APP.files.filter(f => f.id !== fileId);
    APP.selectedFiles.delete(fileId);
    closeDetailPanel();
    closeContextMenu();
    showUndoToast(t('movedToTrash'), async () => { await restoreFile(fileId); });
    await refreshUI();
}

async function restoreFile(fileId) {
    // File might not be in APP.files anymore (removed when trashed)
    // So we need to get it from IndexedDB
    let file = APP.files.find(f => f.id === fileId);
    if (!file) {
        try {
            file = await dbGet('files', fileId);
        } catch(e) { console.error('restoreFile: cannot find file:', e); }
    }
    if (!file) { console.warn('restoreFile: file not found anywhere', fileId); return; }
    file.trashed = false;
    file.trashedAt = null;
    try { await saveFile(file); } catch(e) { console.error('restoreFile save error:', e); }
    // Add back to APP.files so it appears in non-trash views
    if (!APP.files.find(f => f.id === fileId)) {
        APP.files.push(file);
    } else {
        const idx = APP.files.findIndex(f => f.id === fileId);
        if (idx !== -1) { APP.files[idx].trashed = false; APP.files[idx].trashedAt = null; }
    }
    closeDetailPanel();
    closeContextMenu();
    showToast(t('restored'), 'success');
    await refreshUI();
}

async function deletePermanently(fileId) {
    showConfirm(
        APP.lang === 'id' ? 'Hapus Permanen?' : 'Delete Permanently?',
        APP.lang === 'id' ? 'Tidak bisa dikembalikan.' : 'Cannot be undone.',
        async () => {
            // Immediately remove from DOM for instant visual feedback
            removeFileElement(fileId);
            const file = APP.files.find(f => f.id === fileId);
            // Delete from storage provider (Telegram or Google Drive)
            if (file) {
                if (file.storageProvider === 'gdrive' && file.driveFileId) {
                    // Delete from Google Drive
                    try {
                        const account = APP.gdriveAccounts.find(a => a.id === file.providerAccountId && a.status === 'connected') || APP.gdriveAccounts.find(a => a.status === 'connected');
                        if (account) {
                            const accessToken = await APP.storageProviders.gdrive.getAccessToken(account.id);
                            if (accessToken) {
                                await fetch('/api/gdrive/proxy', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ accessToken, method: 'DELETE', path: `/drive/v3/files/${file.driveFileId}` }) });
                                // Update quota estimate
                                if (account.quota) { account.quota.usage = Math.max(0, (parseInt(account.quota.usage) || 0) - (file.size || 0)); await dbPut('gdrive_accounts', account); }
                            }
                        }
                    } catch(e) { console.warn('GDrive delete failed:', e); }
                } else if (file.messageId && file.chatId) {
                    // Delete from Telegram server
                    try {
                        const bot = APP.bots[file.botIndex || 0] || APP.bots[0];
                        if (bot && bot.masked) {
                            await fetch(`/api/proxy?method=deleteMessage&chat_id=${encodeURIComponent(file.chatId)}&message_id=${file.messageId}&bot_index=${file.botIndex || '0'}`);
                        } else if (bot) {
                            await fetch(`https://api.telegram.org/bot${bot.token}/deleteMessage?chat_id=${encodeURIComponent(file.chatId)}&message_id=${file.messageId}`);
                        }
                    } catch(e) { console.warn('Telegram delete failed:', e); }
                }
            }
            await deleteFileDB(fileId);
            // Remove from memory immediately
            APP.files = APP.files.filter(f => f.id !== fileId);
            APP.selectedFiles.delete(fileId);
            closeDetailPanel();
            closeContextMenu();
            if (file) triggerWebhook('file.deleted', { fileId, fileName: file.name, fileSize: file.size });
            showToast(t('deletedForever'), 'info');
            await refreshUI();
        },
        true
    );
}
