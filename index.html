/* Light mode icon contrast improvements */
.header-pill-btn i{color:#475569;transition:color .15s ease}
.header-pill-btn:hover i{color:#3b82f6}
.sidebar-action-btn i{color:#64748b;transition:color .15s ease}
.sidebar-action-btn:hover i{color:#3b82f6}

/* ===== Storage Management Dashboard ===== */
.storage-page{min-height:calc(100vh - var(--header-h));background:var(--bg);padding:24px 20px}
.storage-page-inner{max-width:1100px;margin:0 auto}
.storage-hero{background:linear-gradient(135deg,#1e3a5f,#0f172a 50%,#1a0f2e);border-radius:20px;padding:40px 32px;color:#fff;position:relative;overflow:hidden;margin-bottom:24px}
.storage-hero::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%)}
.storage-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.1),transparent 70%)}
.storage-hero-title{font-size:28px;font-weight:800;margin-bottom:6px;position:relative;z-index:1}
.storage-hero-subtitle{font-size:14px;opacity:.7;margin-bottom:24px;position:relative;z-index:1}
.storage-hero-stats{display:flex;gap:24px;flex-wrap:wrap;position:relative;z-index:1}
.storage-hero-stat{flex:1;min-width:140px}
.storage-hero-stat-value{font-size:32px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1.1}
.storage-hero-stat-label{font-size:12px;opacity:.6;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.storage-hero-stat-value.accent-blue{color:#60a5fa}
.storage-hero-stat-value.accent-green{color:#34d399}
.storage-hero-stat-value.accent-purple{color:#a78bfa}
.storage-hero-stat-value.accent-amber{color:#fbbf24}
.storage-section{margin-bottom:24px}
.storage-section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text)}
.storage-section-title i{color:var(--accent)}
.gdrive-account-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;transition:all .2s ease;position:relative;overflow:hidden}
.gdrive-account-card:hover{border-color:rgba(59,130,246,.3);box-shadow:0 4px 20px rgba(59,130,246,.08)}
.gdrive-account-card .account-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.gdrive-account-card .account-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#4285f4,#34a853);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0}
.gdrive-account-card .account-info{flex:1;min-width:0}
.gdrive-account-card .account-email{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gdrive-account-card .account-name{font-size:12px;color:var(--text-secondary)}
.gdrive-account-card .account-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px}
.gdrive-account-card .account-status.connected{background:rgba(16,185,129,.1);color:#10b981}
.gdrive-account-card .account-status.disconnected{background:rgba(239,68,68,.1);color:#ef4444}
.gdrive-account-card .account-status.expired{background:rgba(245,158,11,.1);color:#f59e0b}
.storage-bar-wrap{margin-top:8px}
.storage-bar-track{height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden;position:relative}
.storage-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.storage-bar-fill.gradient-blue{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.storage-bar-fill.gradient-green{background:linear-gradient(90deg,#10b981,#34d399)}
.storage-bar-fill.gradient-purple{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.storage-bar-fill.gradient-amber{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.storage-bar-fill.gradient-red{background:linear-gradient(90deg,#ef4444,#f87171)}
.storage-bar-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace}
.account-actions{display:flex;gap:8px;margin-top:14px}
.account-action-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text);transition:all .15s ease;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.account-action-btn:hover{border-color:var(--accent);color:var(--accent)}
.account-action-btn.danger{color:#ef4444;border-color:rgba(239,68,68,.2)}
.account-action-btn.danger:hover{background:rgba(239,68,68,.06);border-color:#ef4444}
.account-action-btn.primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none}
.account-action-btn.primary:hover{opacity:.9;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.connect-card{background:var(--bg-card);border:2px dashed var(--border);border-radius:16px;padding:32px;text-align:center;cursor:pointer;transition:all .25s ease}
.connect-card:hover{border-color:var(--accent);background:rgba(59,130,246,.02)}
.connect-card i{font-size:32px;color:var(--accent);margin-bottom:10px}
.connect-card .connect-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.connect-card .connect-desc{font-size:12px;color:var(--text-secondary)}
.storage-chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.storage-chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden}
.storage-chart-card .chart-title{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.storage-chart-card canvas{width:100%!important;height:auto!important;max-width:100%;display:block}
.dark .storage-hero{background:linear-gradient(135deg,#0f172a,#1e293b 50%,#1a0f2e)}
.dark .storage-chart-card{background:#1e293b;border-color:#334155}
.dark .storage-stat-card{background:#1e293b;border-color:#334155}
.dark .storage-stat-card:hover{border-color:rgba(59,130,246,.4)}
.dark .gdrive-account-card{background:#1e293b;border-color:#334155}
.dark .connect-card{border-color:#334155}
.dark .connect-card:hover{border-color:rgba(59,130,246,.4)}

/* Storage Provider Badge */
.provider-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;font-size:8px;vertical-align:middle;margin-right:3px;cursor:pointer;transition:all .15s ease}
.provider-badge.gdrive{background:rgba(66,133,244,.12);color:#4285f4}
.provider-badge.gdrive:hover{background:rgba(66,133,244,.22);transform:scale(1.15)}
.provider-badge.telegram{background:rgba(0,136,204,.12);color:#0088cc}
.provider-badge.telegram:hover{background:rgba(0,136,204,.22);transform:scale(1.15)}

/* Provider Filter Bar */
.provider-filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.provider-filter-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);transition:all .2s ease}
.provider-filter-pill:hover{border-color:var(--accent);color:var(--accent)}
.provider-filter-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.provider-filter-pill i{font-size:10px}

/* Sync Progress */
.sync-progress-bar{height:4px;background:var(--bg-secondary);border-radius:2px;overflow:hidden;margin-top:8px}
.sync-progress-bar .fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:2px;transition:width .3s ease}

/* Enhanced Account Card */
.gdrive-account-card .account-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.account-action-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text);cursor:pointer;transition:all .2s ease;font-family:inherit}
.account-action-btn:hover{border-color:var(--accent);color:var(--accent)}
.account-action-btn.danger{color:#ef4444;border-color:rgba(239,68,68,.2)}
.account-action-btn.danger:hover{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.4)}

/* Storage Dashboard Grid */
.storage-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.storage-stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:all .2s ease}
.storage-stat-card:hover{border-color:rgba(59,130,246,.3);box-shadow:0 4px 16px rgba(59,130,246,.06)}
.storage-stat-card .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.storage-stat-card .stat-value{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--text);line-height:1.1}
.storage-stat-card .stat-label{font-size:11px;color:var(--text-secondary);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* Drive Select Modal */
.drive-select-card{background:var(--bg-card);border:2px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease}
.drive-select-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(59,130,246,.1)}
.drive-select-card.selected{border-color:var(--accent);background:rgba(59,130,246,.04)}

/* Google Drive Setup Banner */
.gdrive-setup-banner{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;display:flex;gap:20px;position:relative;border-left:4px solid #4285f4;animation:fadeIn .3s ease}
.gdrive-setup-banner .setup-banner-icon{width:48px;height:48px;border-radius:14px;background:rgba(66,133,244,.1);display:flex;align-items:center;justify-content:center;font-size:22px;color:#4285f4;flex-shrink:0}
.gdrive-setup-banner .setup-banner-content{flex:1;min-width:0}
.gdrive-setup-banner .setup-banner-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.gdrive-setup-banner .setup-banner-desc{font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.5}
.gdrive-setup-banner .setup-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.gdrive-setup-banner .setup-step{display:flex;align-items:flex-start;gap:10px}
.gdrive-setup-banner .setup-step-num{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gdrive-setup-banner .setup-step-text{font-size:12px;color:var(--text-secondary);line-height:1.6}
.gdrive-setup-banner .setup-step-text a{color:var(--accent);text-decoration:underline}
.gdrive-setup-banner .setup-step-text code{background:var(--bg-secondary);border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace;word-break:break-all}
.gdrive-setup-banner .setup-banner-actions{display:flex;gap:8px;flex-wrap:wrap}
.gdrive-setup-banner .setup-banner-close{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;color:var(--text-secondary);padding:4px 8px;border-radius:6px;font-size:14px;transition:all .15s ease}
.gdrive-setup-banner .setup-banner-close:hover{background:var(--bg-secondary);color:var(--text)}
.dark .gdrive-setup-banner{border-left-color:#4285f4;background:#1e293b;border-color:#334155}
.dark .gdrive-setup-banner .setup-step-text code{background:#0f172a;border-color:#334155}

@media(max-width:768px){
    .storage-hero{padding:20px 16px}
    .storage-hero-stats{gap:10px}
    .storage-hero-stat-value{font-size:20px}
    .storage-chart-row{grid-template-columns:1fr}
    .storage-chart-card{padding:14px!important;overflow:hidden}
    .storage-chart-card canvas{max-width:100%!important;height:180px!important}
    .storage-page{padding:12px}
    .gdrive-setup-banner{flex-direction:column;gap:12px;padding:16px}
    .gdrive-setup-banner .setup-banner-actions{flex-direction:column}
}

/* 11. Live Demo Section */
.live-demo-mockup{position:relative;max-width:600px;margin:0 auto}
.demo-mockup-inner{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.1)}
.demo-float{position:absolute;opacity:0;animation:demoFloat 3s ease-in-out infinite}
.demo-float-1{top:-20px;left:-30px;animation-delay:0s}
.demo-float-2{top:-15px;right:-25px;animation-delay:.5s}
.demo-float-3{bottom:-15px;left:-20px;animation-delay:1s}
.demo-float-4{bottom:-20px;right:-30px;animation-delay:1.5s}
@keyframes demoFloat{0%,100%{opacity:.7;transform:translateY(0)}50%{opacity:1;transform:translateY(-10px)}}
.demo-launch-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:14px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;box-shadow:0 6px 24px rgba(59,130,246,.3);transition:all .3s ease;text-decoration:none}
.demo-launch-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(59,130,246,.4)}

/* How It Works - Connecting Line */
.hiw-steps{display:flex;align-items:flex-start;justify-content:center;gap:0;position:relative;flex-wrap:wrap}
.hiw-step{flex:1;max-width:280px;text-align:center;position:relative;padding:0 16px;z-index:1}
.hiw-step-num{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;font-weight:800;color:#fff;position:relative;z-index:2}
.hiw-step-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#fff;opacity:0;pointer-events:none}
.hiw-connector{position:absolute;top:32px;left:calc(50% + 40px);width:calc(100% - 80px);height:2px;z-index:0}
.hiw-connector::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--accent),#8b5cf6);opacity:.3}
.hiw-connector::after{content:'';position:absolute;top:-3px;left:0;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:connectorDot 2s ease-in-out infinite}
@keyframes connectorDot{0%{left:0;opacity:1}100%{left:100%;opacity:0}}
.hiw-step:last-child .hiw-connector{display:none}
@media(max-width:768px){.hiw-steps{flex-direction:column;align-items:center;gap:32px}.hiw-connector{display:none}}
/* Mobile: hide demo floats, smaller security badges */
@media(max-width:640px){.demo-float{display:none!important}.security-badges{flex-direction:column;align-items:center}.security-badge{width:100%;max-width:320px}}

/* ===== DASHBOARD WIDGETS ===== */
.dash-widgets-wrap{padding:0 20px 16px;display:flex;flex-direction:column;gap:16px}
.dash-widgets-wrap.collapsed .dash-widget-body{display:none}
.dash-widget-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text-secondary);padding:4px 0;user-select:none;transition:color .2s}
.dash-widget-toggle:hover{color:var(--accent)}
.dash-widget-toggle i{transition:transform .25s ease}
.dash-widgets-wrap.collapsed .dash-widget-toggle i{transform:rotate(-90deg)}

/* Smart Upload Zone */
.smart-upload-zone{border:2px dashed var(--border);border-radius:16px;padding:32px 24px;text-align:center;transition:all .3s ease;cursor:pointer;position:relative;overflow:hidden;background:var(--bg-secondary)}
.smart-upload-zone:hover{border-color:var(--accent);background:rgba(59,130,246,.03)}
.smart-upload-zone.drag-active{border-color:var(--accent);background:rgba(59,130,246,.08);box-shadow:0 0 0 4px rgba(59,130,246,.12)}
@keyframes uploadBorderPulse{0%,100%{border-color:var(--accent);box-shadow:0 0 0 4px rgba(59,130,246,.12)}50%{border-color:#8b5cf6;box-shadow:0 0 0 8px rgba(139,92,246,.12)}}
.smart-upload-zone.drag-active{animation:uploadBorderPulse 1.2s ease infinite}
.smart-upload-zone .upload-icon{font-size:36px;color:var(--accent);margin-bottom:8px;transition:transform .3s ease}
.smart-upload-zone:hover .upload-icon{transform:translateY(-4px)}
.smart-upload-zone .upload-title{font-size:15px;font-weight:600;margin-bottom:2px}
.smart-upload-zone .upload-sub{font-size:12px;color:var(--text-secondary)}
.smart-upload-zone .upload-sub span{color:var(--accent);font-weight:500;cursor:pointer}
.smart-upload-zone .upload-methods{display:flex;justify-content:center;gap:12px;margin-top:12px}
.smart-upload-zone .upload-method{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary);padding:4px 10px;border-radius:99px;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.smart-upload-zone .upload-method:hover{border-color:var(--accent);color:var(--accent)}
.smart-upload-zone.minimized{padding:10px 16px;display:flex;align-items:center;gap:10px;text-align:left}
.smart-upload-zone.minimized .upload-icon{font-size:18px;margin-bottom:0}
.smart-upload-zone.minimized .upload-title{font-size:13px;margin-bottom:0}
.smart-upload-zone.minimized .upload-sub,.smart-upload-zone.minimized .upload-methods{display:none}

/* Upload Preview Queue */
.upload-preview-queue{display:flex;flex-direction:column;gap:6px;margin-top:12px;text-align:left}
.upload-preview-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border);font-size:12px}
.upload-preview-item .upi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.upload-preview-item .upi-info{flex:1;min-width:0}
.upload-preview-item .upi-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-preview-item .upi-meta{font-size:11px;color:var(--text-secondary)}
.upload-preview-item .upi-progress{height:4px;background:var(--bg-secondary);border-radius:2px;overflow:hidden;margin-top:4px}
.upload-preview-item .upi-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#8b5cf6);border-radius:2px;transition:width .3s ease}

/* Quick Actions Bar */
.quick-actions-row{display:flex;gap:8px;padding:10px 14px;background:linear-gradient(135deg,rgba(59,130,246,.04),rgba(139,92,246,.04));border-radius:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick-actions-row::-webkit-scrollbar{display:none}
.quick-action-pill{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text);transition:all .2s ease;flex-shrink:0}
.quick-action-pill:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);box-shadow:0 2px 8px rgba(59,130,246,.1)}
.quick-action-pill i{font-size:13px}

/* Dashboard Widget Cards */
.dash-cards-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dash-3col-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:768px){.dash-cards-row{grid-template-columns:1fr}}
@media(max-width:900px){.dash-3col-row{grid-template-columns:1fr}}
@media(max-width:768px){.dash-3col-row{grid-template-columns:1fr}}
.dash-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:border-color .2s ease}
.dash-card:hover{border-color:rgba(59,130,246,.2)}
.dash-card-title{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px}
.dark .dash-card-title{color:#94a3b8}

/* Storage Analytics Ring */
.storage-ring-wrap{display:flex;align-items:center;gap:20px}
.storage-ring-svg{width:100px;height:100px;flex-shrink:0;transform:rotate(-90deg)}
.storage-ring-bg{fill:none;stroke:var(--border);stroke-width:8}
.storage-ring-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.storage-ring-center{text-anchor:middle;transform:rotate(90deg);transform-origin:center}
.storage-breakdown{display:flex;flex-direction:column;gap:6px;flex:1}
.storage-breakdown-item{display:flex;align-items:center;gap:8px;font-size:12px}
.storage-breakdown-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.storage-breakdown-label{flex:1;color:var(--text-secondary)}
.storage-breakdown-pct{font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px}

/* Weekly Summary Card */
.weekly-card{background:linear-gradient(135deg,#3b82f6,#7c3aed);color:#fff;border:none}
.weekly-card .dash-card-title{color:rgba(255,255,255,.7)}
.weekly-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.weekly-stat{text-align:center}
.weekly-stat-val{font-size:22px;font-weight:700;line-height:1.2}
.weekly-stat-label{font-size:10px;opacity:.7;margin-top:2px}

/* Top Files Widget */
.top-file-item{display:flex;align-items:center;gap:10px;padding:6px 0}
.top-file-item+.top-file-item{border-top:1px solid var(--border)}
.top-file-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.top-file-info{flex:1;min-width:0}
.top-file-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-file-size{font-size:10px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace}
.top-file-bar{height:4px;background:var(--bg-secondary);border-radius:2px;margin-top:3px;overflow:hidden}
.top-file-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.top-file-link{font-size:11px;color:var(--accent);cursor:pointer;text-align:center;display:block;margin-top:8px;font-weight:500}
.top-file-link:hover{text-decoration:underline}

/* Activity Timeline */
.activity-timeline{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;gap:10px;padding:8px 0;font-size:12px;position:relative}
.activity-item+.activity-item{border-top:1px solid var(--border)}
.activity-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.activity-body{flex:1;min-width:0}
.activity-desc{color:var(--text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.activity-time{font-size:10px;color:var(--text-secondary);margin-top:1px}

/* Dashboard right sidebar for activity */
.dash-sidebar{width:280px;min-width:280px;border-left:1px solid var(--border);overflow-y:auto;padding:16px 14px;background:linear-gradient(180deg,var(--bg) 0%,var(--bg-secondary) 100%)}
@media(max-width:1100px){.dash-sidebar{display:none}}
@media(max-width:768px){.dash-widgets-wrap{padding:0 12px 12px;gap:8px}.quick-actions-row{padding:8px 10px;gap:6px}.dash-card{padding:14px;border-radius:14px}.carousel-wrap{margin:0 12px 6px}}

/* ===== FILE PREVIEW CAROUSEL ===== */
.carousel-wrap{position:relative;margin:0 20px 6px;overflow:hidden}
.carousel-track{display:flex;gap:10px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:4px 2px 8px}
.carousel-track::-webkit-scrollbar{display:none}
.carousel-card{flex:0 0 140px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden}
.carousel-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,130,246,.1)}
.carousel-card .cc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:16px}
.carousel-card .cc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.carousel-card .cc-date{font-size:10px;color:var(--text-secondary);text-align:center;margin-top:3px}
.carousel-card .cc-tag{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%}
.carousel-nav{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;transition:all .2s;box-shadow:var(--shadow);font-size:11px;color:var(--text)}
.carousel-nav:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.carousel-nav.prev{left:2px}
.carousel-nav.next{right:2px}
.carousel-dots{display:flex;justify-content:center;gap:4px;margin-top:4px}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
.carousel-dot.active{background:var(--accent);width:14px;border-radius:3px}
@media(max-width:768px){.carousel-wrap{margin:0 12px 6px}.carousel-card{flex:0 0 120px;padding:10px 8px}.carousel-nav{display:none}}

/* ===== KEYBOARD SHORTCUTS PANEL ===== */
.shortcuts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;font-size:13px}
@media(max-width:600px){.shortcuts-grid{grid-template-columns:1fr}}
.shortcut-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.shortcut-row kbd{display:inline-flex;align-items:center;justify-content:center;min-width:28px;padding:3px 8px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.06);line-height:1.4}
.shortcut-row .shortcut-desc{color:var(--text-secondary);flex:1}
.shortcut-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin:12px 0 6px;grid-column:1/-1}

/* ===== COLOR TAGS ENHANCEMENT ===== */
.tag-filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag-filter-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);transition:all .2s}
.tag-filter-btn:hover{border-color:var(--accent)}
.tag-filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.06)}
.tag-filter-btn .tf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.detail-tag-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.detail-tag-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.detail-tag-dot:hover{transform:scale(1.15)}
.detail-tag-dot.active{border-color:var(--text);box-shadow:0 0 0 2px var(--bg-card)}
.detail-tag-remove{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:11px;transition:all .15s}
.detail-tag-remove:hover{border-color:#ef4444;color:#ef4444}

/* ===== SMART CATEGORIES VIEW ===== */
.categories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.category-card{border-radius:16px;padding:20px 16px;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden;border:1px solid transparent}
.category-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.12)}
.category-card:active{transform:translateY(-1px)}
.cat-icon{font-size:28px;margin-bottom:10px}
.cat-name{font-size:14px;font-weight:700;margin-bottom:2px}
.cat-count{font-size:12px;opacity:.8}
.cat-size{font-size:11px;opacity:.6;margin-top:2px}
.cat-docs{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.cat-photos{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.cat-videos{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
.cat-audio{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.cat-archives{background:linear-gradient(135deg,#64748b,#475569);color:#fff}
.cat-code{background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff}
.cat-others{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
@keyframes catCardIn{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.cat-card-anim{animation:catCardIn .35s cubic-bezier(.4,0,.2,1) forwards;opacity:0}
@media(max-width:768px){.categories-grid{grid-template-columns:repeat(2,1fr);gap:10px}.category-card{padding:14px 12px}}

/* ===== SORT PRESETS ===== */
.sort-preset-wrap{display:flex;gap:4px;align-items:center}
.sort-preset-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text);transition:all .2s;white-space:nowrap}
.sort-preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.sort-preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.dark .sort-preset-btn{color:#cbd5e1}
.dark .sort-preset-btn:hover{color:#93c5fd}
@media(max-width:768px){.sort-preset-btn{padding:4px 8px;font-size:11px}}
/* Share Modal Tabs */
.share-tab-bar{display:flex;border-bottom:1px solid var(--border);margin:-24px -24px 16px;padding:0 24px}
.share-tab-btn{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text-secondary);border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.share-tab-btn:hover{color:var(--text)}
.share-tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.share-tab-content{display:none}.share-tab-content.active{display:block}
/* QR Code Area */
.qr-container{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.qr-canvas-wrap{background:var(--bg-secondary);border-radius:16px;padding:16px;display:inline-block;margin-bottom:16px;position:relative}
.qr-canvas-wrap canvas{display:block;border-radius:4px}
.qr-download-btn{display:flex;align-items:center;gap:8px}
/* Share Analytics Cards */
.share-analytics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
.share-analytics-card{padding:12px;border-radius:10px;background:var(--bg-secondary);text-align:center}
.share-analytics-card .sa-icon{font-size:16px;margin-bottom:4px}
.share-analytics-card .sa-number{font-size:18px;font-weight:700;color:var(--text)}
.share-analytics-card .sa-label{font-size:10px;color:var(--text-secondary);margin-top:2px}
.share-analytics-card.accent .sa-icon,.share-analytics-card.accent .sa-number{color:var(--accent)}
.share-analytics-card.green .sa-icon,.share-analytics-card.green .sa-number{color:#10b981}
.share-analytics-card.purple .sa-icon,.share-analytics-card.purple .sa-number{color:#8b5cf6}
.share-analytics-card.orange .sa-icon,.share-analytics-card.orange .sa-number{color:#f59e0b}
.share-analytics-card.red .sa-icon,.share-analytics-card.red .sa-number{color:#ef4444}
/* Share link row with expiry badge */
.share-link-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:var(--bg-secondary);margin-bottom:6px;font-size:12px}
.share-link-row .slr-info{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.share-link-row .slr-info i{color:var(--accent);flex-shrink:0}
.share-link-row .slr-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.expiry-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.expiry-badge.active{background:rgba(16,185,129,.1);color:#10b981}
.expiry-badge.expiring{background:rgba(245,158,11,.1);color:#f59e0b}
.expiry-badge.expired{background:rgba(239,68,68,.1);color:#ef4444}
.expiry-badge.never{background:rgba(100,116,139,.1);color:#64748b}
/* Gallery Grid */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;padding:20px;max-width:960px;margin:0 auto}
.gallery-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;transition:all .2s;cursor:pointer}
.gallery-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.gallery-card .gc-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.gallery-card .gc-name{font-size:13px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gallery-card .gc-size{font-size:11px;color:var(--text-secondary)}
.gallery-card .gc-download{margin-top:10px}
@media(max-width:600px){.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:12px}.gallery-card{padding:12px}}

/* ===== RIDGEBOX PREMIUM BRANDING ===== */
/* Header logo animated gradient — defined above with .header-logo-icon */

/* ===== SIDEBAR PREMIUM ===== */
.sidebar-upload-btn{width:100%;padding:14px 16px;border-radius:12px;border:none;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s ease;box-shadow:0 4px 12px rgba(59,130,246,.25)}
.sidebar-upload-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.35)}
.sidebar-upload-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(59,130,246,.2)}
.sidebar-section-label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;padding:12px 12px 6px;margin-top:4px}
.sidebar-section-divider{height:1px;background:var(--border);margin:8px 0}

/* Active sidebar item with sliding indicator */
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all .15s ease;position:relative}
.sidebar-item:hover{background:rgba(59,130,246,.06);color:var(--accent)}
.sidebar-item.active{background:rgba(59,130,246,.1);color:var(--accent);font-weight:600}
.sidebar-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,#3b82f6,#8b5cf6)}
.sidebar-item i{color:var(--text-secondary);width:18px;text-align:center;transition:color .15s ease}
.sidebar-item:hover i{color:var(--accent)}
.sidebar-item.active i{color:var(--accent)}

/* Sidebar badge */
.sidebar-badge{font-size:10px;font-weight:600;min-width:18px;height:18px;padding:0 5px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;line-height:1}
.sidebar-badge-default{background:var(--bg-secondary);color:var(--text-secondary)}
.sidebar-badge-accent{background:rgba(59,130,246,.12);color:var(--accent)}
.sidebar-badge-warning{background:rgba(245,158,11,.12);color:#f59e0b}
.sidebar-badge-danger{background:rgba(239,68,68,.12);color:#ef4444}

/* ===== DASHBOARD STATS BAR ===== */
.dash-stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 20px 16px}
.dash-stat-card{padding:16px;border-radius:14px;background:var(--bg-card);border:1px solid var(--border);position:relative;overflow:hidden;transition:all .2s ease}
.dash-stat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.dash-stat-card .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:16px}
.dash-stat-card .stat-value{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2}
.dash-stat-card .stat-label{font-size:11px;color:var(--text-secondary);margin-top:4px;font-weight:500}
.dash-stat-card .stat-bg{position:absolute;right:-10px;bottom:-10px;font-size:60px;opacity:.04}

/* ===== QUICK ACTIONS PREMIUM ===== */
.quick-actions-premium{display:flex;gap:8px;padding:0 20px 16px;flex-wrap:wrap}
.quick-action-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all .15s ease;white-space:nowrap}
.quick-action-btn:hover{border-color:var(--accent);background:rgba(59,130,246,.04)}
.quick-action-btn:active{transform:scale(.97)}
.quick-action-btn.primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;box-shadow:0 4px 12px rgba(59,130,246,.25)}
.quick-action-btn.primary:hover{box-shadow:0 6px 20px rgba(59,130,246,.35);transform:translateY(-1px)}

/* ===== RECENT WIDGETS ===== */
.recent-widget{padding:16px 20px;border-bottom:1px solid var(--border)}
.recent-widget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.recent-widget-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.recent-widget-title i{color:var(--accent);font-size:13px}
.recent-widget-link{font-size:12px;color:var(--accent);cursor:pointer;font-weight:500}
.recent-widget-link:hover{text-decoration:underline}
.recent-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.recent-item:last-child{border-bottom:none}
.recent-item-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.recent-item-info{flex:1;min-width:0}
.recent-item-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-item-meta{font-size:11px;color:var(--text-secondary);margin-top:1px}
.recent-item-time{font-size:11px;color:var(--text-secondary);white-space:nowrap}

/* ===== MOBILE-FIRST OPTIMIZATIONS ===== */
@media(max-width:768px){
  .dash-stats-bar{grid-template-columns:repeat(2,1fr);gap:8px;padding:0 12px 12px}
  .dash-stat-card{padding:12px;border-radius:12px}
  .dash-stat-card .stat-value{font-size:18px}
  .dash-stat-card .stat-label{font-size:10px}
  .quick-actions-premium{padding:0 12px 12px;gap:6px}
  .quick-action-btn{padding:10px 14px;font-size:12px;border-radius:10px}
  .recent-widget{padding:12px}
  .file-card-premium{min-height:160px!important}
  .file-row-premium{padding:12px!important;min-height:64px}
  .row-actions{display:none!important}
  .mobile-delete-btn,.mobile-restore-btn{display:flex!important;width:36px;height:36px;border-radius:10px;border:none;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
  .mobile-delete-btn{background:rgba(239,68,68,.1);color:#ef4444}
  .mobile-restore-btn{background:rgba(16,185,129,.1);color:#10b981}
  .toolbar-wrap{padding:8px 12px!important;gap:6px!important}
  .search-premium{min-width:0!important;flex:1!important}
  .toolbar-upload-btn{padding:7px 16px;border-radius:10px;font-size:12px;display:inline-flex!important;align-items:center;gap:6px}
  .toolbar-upload-btn span{display:inline}
  .detail-panel{width:100%!important;max-width:100%!important}
  .dash-sidebar{display:none!important}
  .sidebar-desktop{display:none!important}
  .dash-widget-body .dash-cards-row{flex-direction:column}
  /* ===== MOBILE DASHBOARD SPACING FIXES ===== */
  .dash-widgets-wrap{padding:0 12px 16px;gap:8px}
  .dash-widget-toggle{padding:2px 0}
  .dash-widget-body{gap:10px!important}
  .dash-card{padding:14px;border-radius:14px}
  .dash-card-title{font-size:11px;margin-bottom:8px;gap:5px}
  .dash-cards-row{gap:10px}
  .dash-3col-row{gap:10px}
  /* Hero stat cards - consistent sizing */
  .dash-widget-body>div[style*="display:flex;gap:12px"]{gap:8px!important;flex-wrap:wrap!important}
  .dash-widget-body>div[style*="display:flex;gap:10px"]{gap:6px!important;flex-wrap:wrap!important}
  /* Quick action pills - even padding */
  .quick-action-pill{padding:8px 12px;font-size:11px;gap:5px;border-radius:99px}
  .quick-action-pill i{font-size:12px}
  /* Smart upload zone - compact on mobile */
  .smart-upload-zone{padding:16px 12px!important}
  .smart-upload-zone.minimized{padding:8px 12px!important;gap:8px!important}

async function importAppData(jsonFile) {
  try {
    const text = await jsonFile.text();
    const data = JSON.parse(text);
    if (!data.version || !data.files) { showToast('Invalid backup file', 'error'); return; }
    const fileCount = (data.files||[]).length;
    const folderCount = (data.folders||[]).length;
    const settingCount = Object.keys(data.settings||{}).length;
    const isId = APP.lang === 'id';
    showConfirm(
      isId ? 'Impor Data?' : 'Import Data?',
      isId ? `Ini akan menggabungkan ${fileCount} file, ${folderCount} folder, ${settingCount} pengaturan. Lanjutkan?` : `This will merge ${fileCount} files, ${folderCount} folders, ${settingCount} settings. Continue?`,
      async () => {
        let added = 0;
        for (const f of (data.files||[])) { if (!APP.files.find(ef => ef.id === f.id)) { APP.files.push(f); await saveFile(f); added++; } }
        for (const fo of (data.folders||[])) { if (!APP.folders.find(ef => ef.id === fo.id)) { APP.folders.push(fo); await saveFolder(fo); } }
        if (data.settings) { for (const [k,v] of Object.entries(data.settings)) { APP.settings[k] = v; await saveSetting(k, v); } }
        if (data.shares) { for (const s of data.shares) { if (!APP.shares.find(es => es.id === s.id)) { APP.shares.push(s); await saveShare(s); } } }
        showToast(isId ? `${added} file diimpor` : `${added} files imported`, 'success');
        await refreshUI();
      }
    );
  } catch(e) { showToast('Import failed: ' + e.message, 'error'); }
}

async function setupBiometric() {
  if (!window.PublicKeyCredential) { showToast(APP.lang==='id'?'Browser tidak mendukung WebAuthn':'Browser does not support WebAuthn', 'error'); return; }
  try {
    const avail = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if (!avail) { showToast(APP.lang==='id'?'Tidak ada autentikator biometrik':'No biometric authenticator available', 'error'); return; }
    const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
    const cred = await navigator.credentials.create({ publicKey: { challenge, rp: { name: 'Ridgebox' }, user: { id: new Uint8Array(16), name: 'ridgebox-user', displayName: 'Ridgebox User' }, pubKeyCredParams: [{type:'public-key',alg:-7},{type:'public-key',alg:-257}], authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' }, timeout: 60000 } });
    localStorage.setItem('rb_biometric_id', btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
    showToast(APP.lang==='id'?'Biometrik terdaftar':'Biometric registered', 'success');
    openSettings();
  } catch(e) { if (e.name !== 'NotAllowedError') showToast('Error: ' + e.message, 'error'); }
}

async function verifyBiometric() {
  const storedId = localStorage.getItem('rb_biometric_id');
  if (!storedId || !window.PublicKeyCredential) return false;
  try {
    const rawId = Uint8Array.from(atob(storedId), c => c.charCodeAt(0));
    const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
    await navigator.credentials.get({ publicKey: { challenge, allowCredentials: [{ type: 'public-key', id: rawId }], userVerification: 'required', timeout: 60000 } });
    return true;
  } catch(e) { return false; }
}

function removeBiometric() { localStorage.removeItem('rb_biometric_id'); showToast(APP.lang==='id'?'Biometrik dihapus':'Biometric removed', 'info'); openSettings(); }

// ===== INDEXEDDB (F15) =====
const DB_NAME = 'RidgeboxDB';
const DB_VERSION = 5;
let _db = null;

function openDB() {
    return new Promise((resolve, reject) => {
        if (_db && !_db.closed) return resolve(_db);
        _db = null; // Reset if closed
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('files')) {
                const fs = db.createObjectStore('files', { keyPath: 'id' });
                fs.createIndex('folderId', 'folderId', { unique: false });
                fs.createIndex('name', 'name', { unique: false });
                fs.createIndex('trashed', 'trashed', { unique: false });
                fs.createIndex('starred', 'starred', { unique: false });
            }
            if (!db.objectStoreNames.contains('folders')) db.createObjectStore('folders', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('shares')) db.createObjectStore('shares', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
            if (!db.objectStoreNames.contains('thumbnails')) db.createObjectStore('thumbnails', { keyPath: 'fileId' });
            if (!db.objectStoreNames.contains('gdrive_accounts')) {
                const ga = db.createObjectStore('gdrive_accounts', { keyPath: 'id' });
                ga.createIndex('email', 'email', { unique: false });
                ga.createIndex('status', 'status', { unique: false });
            }
        };
        req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
        req.onerror = (e) => reject(e.target.error);
    });
}

async function dbGetAll(store) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function dbGet(store, key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function dbPut(store, data) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).put(data);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error('Transaction aborted'));
    });
}

async function dbDelete(store, key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

async function dbClear(store) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

}

// ===== FEATURE 1: AUTO-LOCK (IDLE TIMER) =====
function initAutoLock() {
    if (APP.autoLockTimer) clearTimeout(APP.autoLockTimer);
    if (APP.autoLockCountdown) clearInterval(APP.autoLockCountdown);
    const mins = APP.settings.autoLockMinutes;
    if (!mins || mins <= 0 || !APP.settings.pinLock) { updateAutoLockDisplay(-1); return; }
    let remaining = mins * 60 * 1000;
    function startCountdown() {
        if (APP.autoLockCountdown) clearInterval(APP.autoLockCountdown);
        const startT = Date.now();
        APP.autoLockCountdown = setInterval(() => {
            const elapsed = Date.now() - startT;
            const left = Math.max(0, remaining - elapsed);
            updateAutoLockDisplay(left);
            if (left <= 0) clearInterval(APP.autoLockCountdown);
        }, 1000);
    }
    function resetTimer() {
        if (APP.autoLockTimer) clearTimeout(APP.autoLockTimer);
        if (APP.autoLockCountdown) clearInterval(APP.autoLockCountdown);
        remaining = mins * 60 * 1000;
        APP.autoLockTimer = setTimeout(() => { showLockScreen(); }, remaining);
        startCountdown();
    }
    ['mousemove','keydown','touchstart','scroll','click'].forEach(e => document.removeEventListener(e, resetTimer));
    ['mousemove','keydown','touchstart','scroll','click'].forEach(e => document.addEventListener(e, resetTimer, {passive:true}));
    resetTimer();
}
function updateAutoLockDisplay(ms) {
    const el = document.getElementById('auto-lock-countdown');
    if (!el) return;
    if (ms < 0) { el.style.display='none'; return; }
    el.style.display='flex';
    const sec = Math.ceil(ms/1000);
    const m = Math.floor(sec/60), s = sec%60;
    el.innerHTML = `<i class="fas fa-lock" style="font-size:9px"></i> ${t('autoLockIn')} ${m}:${s.toString().padStart(2,'0')}`;
}

function applyBulkRenamePattern(name, pattern, prefix, suffix, index) {
    const ext = name.includes('.') ? '.' + name.split('.').pop() : '';
    const baseName = name.includes('.') ? name.slice(0, name.lastIndexOf('.')) : name;
    let result = pattern || '{name}';
    result = result.replace('{name}', baseName).replace('{index}', String(index + 1).padStart(2, '0')).replace('{date}', new Date().toISOString().slice(0, 10));
    result = (prefix || '') + result + (suffix || '');
    if (ext) result += ext;
    return result;
}
function updateBulkRenamePreview() {
    const prefix = document.getElementById('rename-prefix')?.value || '';
    const suffix = document.getElementById('rename-suffix')?.value || '';
    const pattern = document.getElementById('rename-pattern')?.value || '';
    const ids = [...APP.selectedFiles];
    const files = ids.map(id => APP.files.find(f => f.id === id)).filter(Boolean);
    const preview = files.slice(0, 3);
    const el = document.getElementById('bulk-rename-preview');
    if (!el) return;
    el.innerHTML = preview.map((f, i) => {
        const newName = applyBulkRenamePattern(f.name, pattern, prefix, suffix, i);
        return `<div style="margin-bottom:4px">${f.name} → <strong style="color:var(--accent)">${newName}</strong></div>`;
    }).join('') + (files.length > 3 ? `<div>... +${files.length - 3} ${APP.lang==='id'?'lainnya':'more'}</div>` : '');
}
async function applyBulkRename() {
    const prefix = document.getElementById('rename-prefix')?.value || '';
    const suffix = document.getElementById('rename-suffix')?.value || '';
    const pattern = document.getElementById('rename-pattern')?.value || '';
    const ids = [...APP.selectedFiles];
    await bulkRename(ids, pattern, prefix, suffix);
}
async function bulkRename(fileIds, pattern, prefix, suffix) {
    let count = 0;
    for (let i = 0; i < fileIds.length; i++) {
        const file = APP.files.find(f => f.id === fileIds[i]);
        if (!file) continue;
        file.name = applyBulkRenamePattern(file.name, pattern, prefix, suffix, i);
        await saveFile(file);
        count++;
    }
    closeModal();
    showToast(`${count} ${APP.lang==='id'?'file diganti nama':'files renamed'}`, 'success');
    renderFileList();
}

// ===== FEATURE 4: RESUME UPLOAD (CHUNKED UPLOAD) =====
async function executeChunkedUpload(file, folderParam) {
    const CHUNK = 5 * 1024 * 1024;
    const totalChunks = Math.ceil(file.size / CHUNK);
    const uploadId = genId();
    const progress = { id: uploadId, fileName: file.name, totalChunks, uploadedChunks: 0, size: file.size, folderParam: folderParam || APP.currentFolder, startedAt: Date.now() };
    await saveSetting('pendingUpload_' + uploadId, progress);
    try {
        for (let i = 0; i < totalChunks; i++) {
            const start = i * CHUNK;
            const end = Math.min(start + CHUNK, file.size);
            const chunk = file.slice(start, end);
            const bot = APP.bots[0];
            if (!bot) throw new Error('No bot');
            const formData = new FormData();
            formData.append('document', chunk, `${file.name}.part${i}`);
            formData.append('bot_index', bot.index);
            formData.append('chat_id', bot.chatId);
            const resp = await fetch('/api/upload', { method: 'POST', body: formData });
            const result = await resp.json();
            if (!result.ok && !(result.result && result.result.message_id)) throw new Error('Chunk upload failed');
            progress.uploadedChunks = i + 1;
            await saveSetting('pendingUpload_' + uploadId, progress);
            const pct = Math.round(((i + 1) / totalChunks) * 100);
            updateUploadPreviewProgress(file.name, pct);
        }
        await saveSetting('pendingUpload_' + uploadId, null);
        await dbDelete('settings', 'pendingUpload_' + uploadId);
    } catch (e) {
        showToast(t('retryingUpload'), 'warning');
        throw e;
    }
}
async function checkPendingUploads() {
    try {
        const allSettings = await dbGetAll('settings');
        const pending = allSettings.filter(s => s.key && s.key.startsWith('pendingUpload_') && s.value);

        showToast(`${t('resumeUpload')} ${pending.length} ${APP.lang==='id'?'unggahan':'upload(s)'}`, 'info', 6000);

}

// ===== FEATURE 6: THUMBNAIL CACHE =====
async function getThumbnail(fileId, fileUrl) {
    try {
        const cached = await dbGet('thumbnails', fileId);
        if (cached && cached.dataUrl && (Date.now() - cached.cachedAt < 7 * 86400000)) return cached.dataUrl;
    } catch(e) {}
    if (!fileUrl) return null;
    try {
        const dataUrl = await new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = 64; c.height = 64;
                const ctx = c.getContext('2d');
                const ratio = Math.min(64/img.width, 64/img.height);
                const w = img.width * ratio, h = img.height * ratio;
                ctx.drawImage(img, (64-w)/2, (64-h)/2, w, h);
                resolve(c.toDataURL('image/jpeg', 0.7));
            };
            img.onerror = () => reject('img err');
            img.src = fileUrl;
        });
        await dbPut('thumbnails', { fileId, dataUrl, cachedAt: Date.now() });
        return dataUrl;
    } catch(e) { return null; }
}
async function clearOldThumbnails() {
    try {
        const all = await dbGetAll('thumbnails');
        const cutoff = Date.now() - 7 * 86400000;
        for (const t of all) {
            if (t.cachedAt < cutoff) await dbDelete('thumbnails', t.fileId);
        }
    } catch(e) {}
}
async function loadThumbnailsForVisibleFiles(files) {
    // Use IntersectionObserver for lazy loading image thumbnails
    const lazyElements = document.querySelectorAll('[data-lazy-thumb]');
    if (lazyElements.length === 0) return;

    if (window._thumbObserver) window._thumbObserver.disconnect();

    window._thumbObserver = new IntersectionObserver((entries) => {
        entries.forEach(async (entry) => {
            if (!entry.isIntersecting) return;
            const el = entry.target;
            const thumbUrl = el.getAttribute('data-lazy-thumb');
            const fileId = el.getAttribute('data-file-id');
            if (!thumbUrl || el._thumbLoaded) return;
            el._thumbLoaded = true;
            window._thumbObserver.unobserve(el);

            // Try cached thumbnail first
            try {
                const cached = await dbGet('thumbnails', fileId);
                if (cached && cached.dataUrl && (Date.now() - cached.cachedAt < 7 * 86400000)) {
                    applyThumbToElement(el, cached.dataUrl);
                    return;
                }
            } catch(e) {}

            // Load the image directly as background (for grid cards)
            const img = el.querySelector('img.file-thumb-placeholder-img');
            if (img) {
                img.src = thumbUrl;
            } else {
                // For list thumbnails, set background-image
                const thumbDiv = el.querySelector('img') || el;
                if (thumbDiv.tagName === 'IMG') {
                    thumbDiv.src = thumbUrl;
                } else {
                    el.style.backgroundImage = `url(${thumbUrl})`;
                    el.style.backgroundSize = 'cover';
                    el.style.backgroundPosition = 'center';
                }
            }
        });
    }, { rootMargin: '200px', threshold: 0.01 });

    lazyElements.forEach(el => window._thumbObserver.observe(el));
}

function applyThumbToElement(el, dataUrl) {
    const img = el.querySelector('img.file-thumb-placeholder-img');
    if (img) {
        img.src = dataUrl;
    } else {
        const thumbImg = el.querySelector('img');
        if (thumbImg) {
            thumbImg.src = dataUrl;
        }
    }
}

function applyAdvancedSearchFilter(files) {
    const s = APP.advancedSearch;
    if (!s.name && !s.dateFrom && !s.dateTo && !s.sizeMin && !s.sizeMax && s.fileType === 'all' && (!s.tags || s.tags.length === 0)) return files;

    if (s.name) { const q = s.name.toLowerCase(); result = result.filter(f => (f.name||'').toLowerCase().includes(q)); }
    if (s.dateFrom) { const from = new Date(s.dateFrom).getTime(); result = result.filter(f => f.uploadedAt >= from); }
    if (s.dateTo) { const to = new Date(s.dateTo).getTime() + 86400000; result = result.filter(f => f.uploadedAt <= to); }
    if (s.sizeMin || s.sizeMax) {
        const mult = s.sizeUnit === 'KB' ? 1024 : s.sizeUnit === 'GB' ? 1073741824 : 1048576;
        if (s.sizeMin) { const min = parseFloat(s.sizeMin) * mult; result = result.filter(f => (f.size||0) >= min); }
        if (s.sizeMax) { const max = parseFloat(s.sizeMax) * mult; result = result.filter(f => (f.size||0) <= max); }
    }
    if (s.fileType !== 'all') { result = result.filter(f => getFileType(f.name, f.mime) === s.fileType); }
    if (s.tags && s.tags.length > 0) { result = result.filter(f => s.tags.includes(f.tag)); }

// ===== UTILITIES =====
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }

function formatSize(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDate(ts) {
    if (!ts) return '-';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return APP.lang === 'id' ? 'Baru saja' : 'Just now';
    if (diff < 3600000) return Math.floor(diff/60000) + (APP.lang === 'id' ? ' menit lalu' : ' min ago');
    if (diff < 86400000) return Math.floor(diff/3600000) + (APP.lang === 'id' ? ' jam lalu' : 'h ago');
    if (diff < 604800000) return Math.floor(diff/86400000) + (APP.lang === 'id' ? ' hari lalu' : 'd ago');
    return d.toLocaleDateString(APP.lang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'short', year: 'numeric' });
}

function getFileType(name, mime) {
    const ext = (name || '').split('.').pop().toLowerCase();
    if (mime) {
        if (mime.startsWith('image/')) return 'image';
        if (mime.startsWith('video/')) return 'video';
        if (mime.startsWith('audio/')) return 'audio';
        if (mime === 'application/pdf') return 'pdf';
        if (mime.includes('zip') || mime.includes('rar') || mime.includes('7z') || mime.includes('tar') || mime.includes('gz')) return 'archive';
        if (mime.includes('word') || mime.includes('document')) return 'document';
        if (mime.includes('sheet') || mime.includes('excel')) return 'spreadsheet';
        if (mime.includes('presentation') || mime.includes('powerpoint')) return 'presentation';
        if (mime.includes('text')) return 'text';
    }
    const imgExts = ['jpg','jpeg','png','gif','webp','svg','bmp','ico'];
    const vidExts = ['mp4','avi','mkv','mov','webm','flv','wmv'];
    const audExts = ['mp3','wav','ogg','flac','aac','m4a','wma'];
    const docExts = ['doc','docx','xls','xlsx','ppt','pptx','pdf','txt','rtf'];
    const codeExts = ['js','ts','py','java','c','cpp','h','css','html','jsx','tsx','json','xml','yaml','yml','md','sh','sql','go','rs','rb','php'];
    if (imgExts.includes(ext)) return 'image';
    if (vidExts.includes(ext)) return 'video';
    if (audExts.includes(ext)) return 'audio';
    if (ext === 'pdf') return 'pdf';
    if (['doc','docx'].includes(ext)) return 'document';
    if (['xls','xlsx'].includes(ext)) return 'spreadsheet';
    if (['ppt','pptx'].includes(ext)) return 'presentation';
    if (codeExts.includes(ext)) return 'code';
    if (['zip','rar','7z','tar','gz','bz2'].includes(ext)) return 'archive';
    return 'other';
}

async function hashPin(pin) { // F77: SHA-256 PIN hash
    const encoder = new TextEncoder();
    const data = encoder.encode(pin + '_ridgebox_salt_2024');
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ===== ENCRYPTION (F11) =====
async function encryptData(data, password) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt']);
    const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
    const result = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
    result.set(salt, 0);
    result.set(iv, salt.length);
    result.set(new Uint8Array(encrypted), salt.length + iv.length);
    return result;
}

async function decryptData(encData, password) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const salt = encData.slice(0, 16);
    const iv = encData.slice(16, 28);
    const data = encData.slice(28);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    return await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
}

// ===== TOAST (F13, F96) =====
const toastGroups = {};
function showToast(msg, type = 'info', duration = 4000) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const groupKey = msg.substring(0, 30) + type;
    if (toastGroups[groupKey]) {
        const existing = toastGroups[groupKey];
        const count = (parseInt(existing.dataset.count) || 1) + 1;
        existing.dataset.count = count;
        existing.querySelector('.toast-msg').textContent = msg + (count > 1 ? ` (${count}x)` : '');
        clearTimeout(existing._timer);
        // Reset progress bar
        const prog = existing.querySelector('.toast-progress');
        if (prog) { prog.style.animation = 'none'; prog.offsetHeight; prog.style.animation = `toastProgress ${duration}ms linear forwards`; }
        existing._timer = setTimeout(() => { removeToast(existing, groupKey); }, duration);
        return;
    }
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.dataset.count = '1';
    const svgIcons = {
        success: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 9.5L7.5 11.5L12.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        error: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 6.5L11.5 11.5M11.5 6.5L6.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
        info: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M9 7V7.5M9 10V12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
        warning: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L16.5 14.5H1.5L9 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 7V9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="12" r="0.75" fill="currentColor"/></svg>'
    };
    el.innerHTML = `${svgIcons[type] || svgIcons.info}<span class="toast-msg">${msg}</span><div class="toast-progress" style="animation-duration:${duration}ms"></div>`;
    el._timer = setTimeout(() => { removeToast(el, groupKey); }, duration);
    el.onclick = () => { removeToast(el, groupKey); };
    container.appendChild(el);
    toastGroups[groupKey] = el;
}
function removeToast(el, groupKey) {
    if (!el || el.classList.contains('removing')) return;
    el.classList.add('removing');
    clearTimeout(el._timer);
    setTimeout(() => { el.remove(); delete toastGroups[groupKey]; }, 300);
}

// ===== UNDO TOAST (Premium UX) =====
function showUndoToast(message, undoCallback) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const id = 'toast-' + Date.now();
    const toast = document.createElement('div');
    toast.className = 'toast info';
    toast.id = id;
    toast.innerHTML = `<i class="fas fa-info-circle" style="font-size:14px"></i><span style="flex:1">${message}</span><button style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-weight:600;font-family:inherit;font-size:12px;flex-shrink:0" id="undo-btn-${id}">${APP.lang==='id'?'Urungkan':'Undo'}</button><div class="toast-progress" style="animation-duration:6000ms"></div>`;
    container.appendChild(toast);
    const undoBtn = document.getElementById('undo-btn-' + id);
    if (undoBtn) undoBtn.onclick = () => { undoCallback(); if (document.getElementById(id)) document.getElementById(id).remove(); };
    toast.onclick = (e) => { if (e.target.tagName !== 'BUTTON') removeToast(toast, id); };
    toast._timer = setTimeout(() => { if (document.getElementById(id)) { removeToast(toast, id); delete toastGroups[id]; } }, 6000);
    toastGroups[id] = toast;
}

// ===== SUPABASE AUTH SYSTEM =====
let _authMode = 'login'; // 'login' | 'register' | 'forgot'

function initSupabaseAuth() {
    try {
        const config = window.__supabaseConfig || {};
        const url = config.url || '';
        const anonKey = config.anonKey || '';
        if (!url || !anonKey) {
            console.warn('Supabase not configured - auth disabled');
            APP.supabase = null;
            APP.authReady = true;
            return;
        }
        APP.supabase = window.supabase.createClient(url, anonKey);
        // Listen for auth state changes
        APP.supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                APP.user = session.user;
                localStorage.setItem('rb_user', JSON.stringify({ id: session.user.id, email: session.user.email }));
            } else if (event === 'SIGNED_OUT') {
                APP.user = null;
                localStorage.removeItem('rb_user');
            }
        });
        // Check existing session
        APP.supabase.auth.getSession().then(({ data: { session } }) => {
            APP.user = session?.user || null;
            APP.authReady = true;
            if (APP.user) localStorage.setItem('rb_user', JSON.stringify({ id: APP.user.id, email: APP.user.email }));
            checkUrlRouting();
        }).catch(() => { APP.authReady = true; checkUrlRouting(); });
    } catch(e) {
        console.warn('Supabase init failed:', e);
        APP.supabase = null;
        APP.authReady = true;
    }
}

    // Auth is required if Supabase is configured
    return !!APP.supabase;

}

async function handleLogin() {
    const email = document.getElementById('auth-email')?.value?.trim();
    const password = document.getElementById('auth-password')?.value;
    if (!email || !email.includes('@')) return showAuthError(t('authInvalidEmail'));
    if (!password || password.length < 6) return showAuthError(t('authPasswordTooShort'));
    setAuthLoading(true);
    try {
        const { error } = await APP.supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        APP.user = (await APP.supabase.auth.getUser()).data.user;
        localStorage.setItem('rb_user', JSON.stringify({ id: APP.user.id, email: APP.user.email }));
        showToast(t('authLoginSuccess'), 'success');
        location.hash = '#/dashboard';
    } catch(e) {
        showAuthError(e.message || (APP.lang === 'id' ? 'Email atau kata sandi salah' : 'Invalid email or password'));
    } finally { setAuthLoading(false); }
}

async function handleRegister() {
    const name = document.getElementById('auth-name')?.value?.trim();
    const email = document.getElementById('auth-email')?.value?.trim();
    const password = document.getElementById('auth-password')?.value;
    const confirmPassword = document.getElementById('auth-confirm-password')?.value;
    if (!email || !email.includes('@')) return showAuthError(t('authInvalidEmail'));
    if (!password || password.length < 6) return showAuthError(t('authPasswordTooShort'));
    if (password !== confirmPassword) return showAuthError(t('authPasswordMismatch'));
    setAuthLoading(true);
    try {
        const { error } = await APP.supabase.auth.signUp({
            email,
            password,
            options: { data: { full_name: name || '' } }
        });
        if (error) throw error;
        // Check if email confirmation is required
        showAuthSuccess(APP.lang === 'id' ? 'Cek email Anda untuk konfirmasi akun, lalu masuk.' : 'Check your email to confirm your account, then sign in.');
        _authMode = 'login';
        setTimeout(() => renderAuthPage(), 3000);
    } catch(e) {
        showAuthError(e.message || (APP.lang === 'id' ? 'Gagal mendaftar' : 'Registration failed'));
    } finally { setAuthLoading(false); }
}

async function handleGoogleLogin() {
    try {
        const { error } = await APP.supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + window.location.pathname }
        });

    } catch(e) {

async function handleForgotPassword() {
    const email = document.getElementById('auth-email')?.value?.trim();
    if (!email || !email.includes('@')) return showAuthError(t('authInvalidEmail'));
    setAuthLoading(true);
    try {
        const { error } = await APP.supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + window.location.pathname
        });

        showAuthSuccess(t('authResetSent'));
    } catch(e) {
        showAuthError(e.message || (APP.lang === 'id' ? 'Gagal mengirim reset link' : 'Failed to send reset link'));

}

async function handleLogout() {
    if (!APP.supabase) return;
    try {
        await APP.supabase.auth.signOut();
    } catch(e) { console.warn('Logout error:', e); }
    APP.user = null;

function checkUrlRouting() {
    const hash = location.hash || '#/';
    const main = document.getElementById('app-main');
    if (!main) return;

    // Close any open panels
    closeDetailPanel();
    closeContextMenu();

    // Auth guard for protected routes
    const protectedRoutes = ['#/dashboard', '#/storage', '#/file/'];
    const isProtected = protectedRoutes.some(r => hash.startsWith(r));
    if (isProtected && isAuthRequired() && !isLoggedIn()) {
        renderAuthPage();
        return;
    }

    if (hash === '#/' || hash === '') {
        renderHomepage();
    } else if (hash === '#/dashboard') {
        checkPinThenRender(() => renderDashboard());
    } else if (hash === '#/storage') {
        checkPinThenRender(() => renderStorageManagement());
    } else if (hash.startsWith('#/file/')) {
        const fileId = hash.replace('#/file/', '');
        checkPinThenRender(() => renderFileDetail(fileId));
    } else if (hash.startsWith('#/upload/')) {
        const token = hash.replace('#/upload/', '');
        renderUploadPortal(token);
    } else if (hash.startsWith('#/s/')) {
        const alias = hash.replace('#/s/', '');
        renderSharePortal(alias);
    } else if (hash.startsWith('#/gallery/')) {
        const galleryId = hash.replace('#/gallery/', '');
        renderGallery(galleryId);
    } else {
        render404();
    }
}

// ===== PIN LOCK GATE (Enhanced) =====
let _pinAttempts = 0, _pinLocked = false, _pinLockTimer = null, _pinCreateMode = false, _pinFirstInput = '';

function checkPinThenRender(callback) {
    if (APP.settings.pinLock) { showLockScreen(callback); }
    else { callback(); }
}

function showLockScreen(callback) {
    const overlay = document.getElementById('pin-lock-overlay');
    overlay.style.display = 'flex';
    overlay.style.opacity = '0';
    overlay._callback = callback;
    requestAnimationFrame(() => { overlay.style.transition = 'opacity .3s ease'; overlay.style.opacity = '1'; });
    _pinAttempts = 0;
    _pinCreateMode = false;
    renderPinPad();
}

function hideLockScreen() {
    const ov = document.getElementById('pin-lock-overlay');
    ov.style.opacity = '0';
    setTimeout(() => { ov.style.display = 'none'; }, 300);
    initAutoLock(); // Reset auto-lock timer after unlock
}

function renderPinPad() {
    const overlay = document.getElementById('pin-lock-overlay');
    const isId = APP.lang === 'id';
    const title = _pinCreateMode ? (isId ? 'Buat PIN' : 'Create PIN') : t('enterPin');
