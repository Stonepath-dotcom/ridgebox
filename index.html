let cameraStream = null;
let mediaRecorder = null;
let recordingChunks = [];

async function startCamera() {
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
        const video = document.getElementById('camera-preview');
        if (video) video.srcObject = cameraStream;
    } catch (err) {
        showToast('Camera error: ' + err.message, 'error');
    }
}

function closeCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
}

function capturePhoto() {
    const video = document.getElementById('camera-preview');
    const canvas = document.getElementById('camera-canvas');
    if (!video || !canvas) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(async (blob) => {
        const file = new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
        await executeUpload(file);
        closeCamera();
        closeModal();
    }, 'image/jpeg');
}

function toggleRecording() {
    const btn = document.getElementById('record-btn');
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        recordingChunks = [];
        const video = document.getElementById('camera-preview');
        const stream = video?.srcObject;
        if (!stream) return;
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordingChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            const blob = new Blob(recordingChunks, { type: 'video/webm' });
            const file = new File([blob], `video_${Date.now()}.webm`, { type: 'video/webm' });
            await executeUpload(file);
            closeCamera();
            closeModal();
        };
        mediaRecorder.start();
        if (btn) btn.innerHTML = `<i class="fas fa-stop"></i> ${t('stopRecording')}`;
    } else {
        mediaRecorder.stop();
        if (btn) btn.innerHTML = `<i class="fas fa-video"></i> ${t('startRecording')}`;
    }
}

// ===== FILE OPERATIONS =====
async function moveToTrash(fileId) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) return;
    file.trashed = true;
    file.trashedAt = Date.now();
    await saveFile(file);
    APP.selectedFiles.delete(fileId);
    closeDetailPanel();
    closeContextMenu();
    showUndoToast(t('movedToTrash'), () => { restoreFile(fileId); });
    refreshUI();
}

async function restoreFile(fileId) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) return;
    file.trashed = false;
    file.trashedAt = null;
    await saveFile(file);
    closeDetailPanel();
    closeContextMenu();
    showToast(t('restored'), 'success');
    refreshUI();
}

async function deletePermanently(fileId) {
    showConfirm(
        APP.lang === 'id' ? 'Hapus Permanen?' : 'Delete Permanently?',
        APP.lang === 'id' ? 'Tidak bisa dikembalikan.' : 'Cannot be undone.',
        async () => {
            const file = APP.files.find(f => f.id === fileId);
            // Try to delete message from Telegram server
            if (file && file.messageId && file.chatId) {
                try {
                    const bot = APP.bots[file.botIndex || 0] || APP.bots[0];
                    if (bot && bot.masked) {
                        await fetch(`/api/proxy?method=deleteMessage&chat_id=${encodeURIComponent(file.chatId)}&message_id=${file.messageId}&bot_index=${file.botIndex || '0'}`);
                    } else if (bot) {
                        await fetch(`https://api.telegram.org/bot${bot.token}/deleteMessage?chat_id=${encodeURIComponent(file.chatId)}&message_id=${file.messageId}`);
                    }

// ===== DOWNLOAD =====
// Helper: Save blob to device storage (Downloads folder on phone)
async function saveToDevice(blob, fileName) {
    // Method 1: File System Access API (Chrome/Edge Android & desktop) — saves directly to Downloads
    if (window.showSaveFilePicker) {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: fileName,
                types: blob.type ? [{ description: 'File', accept: { [blob.type]: ['.' + fileName.split('.').pop()] } }] : []
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return true;
        } catch (e) {
            // User cancelled the picker or not supported — fall through
            if (e.name === 'AbortError') return false;
            console.warn('showSaveFilePicker failed, falling back:', e);
        }
    }
    // Method 2: Navigator msSaveBlob (IE/Edge legacy)
    if (navigator.msSaveBlob) {
        try {
            navigator.msSaveBlob(blob, fileName);
            return true;
        } catch(e) { console.warn('msSaveBlob failed:', e); }
    }
    // Method 3: <a download> with blob URL (works on most browsers)
    // On iOS Safari, this opens the file — user must use share sheet to save
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    // Delay cleanup so browser can process the download
    setTimeout(() => {
        URL.revokeObjectURL(a.href);
        a.remove();
    }, 5000);
    return true;
}

async function downloadFile(fileId) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) return;
    try {
        // Resolve filePath if missing — call getFile API
        if (!file.filePath && file.fileId) {
            try {
                const fileResp = await fetch('/api/file-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: file.fileId, bot_index: file.botIndex || '0' })
                });
                const fileData = await fileResp.json();
                if (fileData.ok && fileData.result && fileData.result.file_path) {
                    file.filePath = fileData.result.file_path;
                    await saveFile(file);
                }
            } catch(e) { console.warn('getFile resolve failed:', e); }
        }
        let url;
        if (APP.settings.proxyMode !== false) {
            url = `/api/download?path=${encodeURIComponent(file.filePath)}&bot_index=${file.botIndex}&name=${encodeURIComponent(file.name)}`;
        } else {
            url = `https://api.telegram.org/file/bot${APP.bots[0]?.token}/${file.filePath}`;
        }
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Download failed');
        let blob = await resp.blob();
        if (file.encrypted) {
            try {
                const encData = new Uint8Array(await blob.arrayBuffer());
                const decData = await decryptData(encData, 'ridgebox_' + file.chatId);
                blob = new Blob([decData]);
            } catch(e) { console.warn('Decrypt failed, returning raw file'); }
        }
        await saveToDevice(blob, file.name);
        showToast(t('download') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
    } catch (err) {
        showToast('Download error: ' + err.message, 'error');
    }
}

    for (const id of APP.selectedFiles) {

        try {

async function createShareLink(fileId) {
    const password = document.getElementById('share-password')?.value || '';
    const expiry = parseInt(document.getElementById('share-expiry')?.value || '0');
    const selfDestruct = document.getElementById('share-selfdestruct')?.checked || false;
    const permission = document.getElementById('share-permission')?.value || 'download';
    const alias = document.getElementById('share-alias')?.value.trim() || genId().substring(0, 8);
    const file = APP.files.find(f => f.id === fileId);
    if (!file) { showToast('File not found', 'error'); return; }
    const share = {
        id: genId(),
        fileId: fileId,
        alias: alias,
        password: password ? await hashPin(password) : '',
        expiry: expiry > 0 ? Date.now() + expiry * 3600000 : 0,
        selfDestruct: selfDestruct,
        permission: permission,
        clicks: 0,
        lastAccess: null,
        createdAt: Date.now()
    };
    await saveShare(share);
    APP.shares.push(share);
    if (file) { file.shareCount = (file.shareCount || 0) + 1; await saveFile(file); }
    // Encode file info into the share URL so it works cross-device
    const payload = {
        fn: file.name,
        fs: file.size,
        fm: file.mime || '',
        fp: file.filePath || '',
        fi: file.fileId || '',
        bi: file.botIndex || '0',
        ci: file.chatId || '',
        pw: share.password,
        ex: share.expiry,
        sd: selfDestruct ? 1 : 0,
        pm: permission,
        sid: share.id,
        enc: file.encrypted ? 1 : 0,
        ca: file.caption || '',
        al: alias
    };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const url = `${location.origin}${location.pathname}#/s/${encoded}`;
    closeModal();
    openShareModal(fileId);
    copyShareLink(url);
    showToast(t('shareCreated'), 'success');
}

// ===== SHARE PORTAL (F5, F6, F78, F88) =====
function decodeSharePayload(raw) {
    try {
        const json = decodeURIComponent(escape(atob(raw)));
        const p = JSON.parse(json);
        return {
            isEncoded: true,
            name: p.fn || 'Unknown',
            size: p.fs || 0,
            mime: p.fm || '',
            filePath: p.fp || '',
            fileId: p.fi || '',
            botIndex: p.bi || '0',
            chatId: p.ci || '',
            password: p.pw || '',
            expiry: p.ex || 0,
            selfDestruct: p.sd === 1,
            permission: p.pm || 'download',
            id: p.sid || raw.substring(0, 8),
            encrypted: p.enc === 1,
            caption: p.ca || '',
            alias: p.al || ''
        };
    } catch (e) {
        return null;
    }
}

function renderSharePortal(rawAlias) {
    const main = document.getElementById('app-main');
    if (!main) return;
    renderHeader();

    // Try decoding base64 payload first (new cross-device format)
    let shareData = decodeSharePayload(rawAlias);
    let share = null;
    let file = null;

    if (shareData && shareData.isEncoded) {
        // New format: data is embedded in URL
        share = shareData;
        file = {
            name: shareData.name,

async function verifySharePassword(shareId) {
    // Support both local IndexedDB shares and cross-device encoded shares
    let share = APP.shares.find(s => s.id === shareId);
    if (!share && window._shareVerifyData) {
        share = window._shareVerifyData;
    }
    if (!share) return;
    const input = document.getElementById('share-pw-input');
    const errEl = document.getElementById('share-pw-error');
    if (!input) return;
    const hashed = await hashPin(input.value);
    if (hashed === share.password) {
        // Build file object from encoded share data or find in local files
        let file;
        if (share.isEncoded || window._shareVerifyData) {
            file = {
                name: share.name || 'Unknown',
                size: share.size || 0,
                mime: share.mime || '',
                filePath: share.filePath || '',
                botIndex: share.botIndex || '0',
                chatId: share.chatId || '',
                encrypted: share.encrypted || false,
                caption: share.caption || ''
            };
        } else {
            file = APP.files.find(f => f.id === share.fileId);
        }
        if (file) renderShareDownload(share, file);
    } else {
        if (errEl) errEl.style.display = 'block';
        input.value = '';
    }
}

    // Update share analytics (only for local shares stored in IndexedDB)

    } else {

    // F78: Mark self-destruct as used
    if (share.selfDestruct) {

    // Build download function: use fileId for local files, or filePath+fileId for cross-device shares
    const isLocalFile = file.id && APP.files.find(f => f.id === file.id);
    const downloadFn = isLocalFile
        ? `downloadFile('${file.id}')`
        : `downloadSharedFile('${encodeURIComponent(file.filePath || '')}','${encodeURIComponent(file.fileId || '')}','${file.botIndex || '0'}','${encodeURIComponent(file.name)}',${file.encrypted ? 1 : 0},'${file.chatId || ''}')`;
    const permissionLevel = share.permission || 'download';
    const isViewOnly = permissionLevel === 'view';
    const permLabel = permissionLevel === 'view' ? (APP.lang==='id'?'Lihat Saja':'View Only') : permissionLevel === 'edit' ? (APP.lang==='id'?'Bisa Edit':'Can Edit') : (APP.lang==='id'?'Bisa Download':'Can Download');
    const permBadgeClass = permissionLevel === 'view' ? 'view' : permissionLevel === 'edit' ? 'edit' : 'download';
    main.innerHTML = `<div class="page-transition" style="display:flex;align-items:center;justify-content:center;min-height:80vh">
        <div style="text-align:center;max-width:400px;padding:40px">

            <span class="perm-badge ${permBadgeClass}" style="margin-bottom:12px"><i class="fas ${permissionLevel==='view'?'fa-eye':permissionLevel==='edit'?'fa-pen':'fa-download'}" style="font-size:10px"></i> ${permLabel}</span>
            ${share.selfDestruct ? `<p style="color:#ef4444;font-size:12px;margin-bottom:16px"><i class="fas fa-fire"></i> ${APP.lang==='id'?'Link ini hanya bisa digunakan sekali':'This link can only be used once'}</p>` : ''}
            ${isViewOnly ? `<div style="padding:14px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:10px;margin-bottom:8px"><i class="fas fa-eye" style="color:var(--accent);margin-right:6px"></i> ${APP.lang==='id'?'File ini hanya bisa dilihat, tidak bisa didownload':'This file is view-only and cannot be downloaded'}</div>` : `<button class="btn btn-primary" style="width:100%;padding:14px" onclick="${downloadFn}"><i class="fas fa-download"></i> ${t('downloadFile')}</button>`}

// Download file from share portal (cross-device, uses filePath with fileId fallback)
async function downloadSharedFile(encodedPath, encodedFileId, botIndex, encodedName, encrypted, chatId) {
    let filePath = decodeURIComponent(encodedPath);
    const fileId = decodeURIComponent(encodedFileId);
    const fileName = decodeURIComponent(encodedName);
    try {
        // Build download URL — use filePath if available, otherwise use file_id for server-side resolution
        // Always include name parameter so the API sends Content-Disposition: attachment
        let url;
        if (filePath) {
            url = `/api/download?path=${encodeURIComponent(filePath)}&bot_index=${botIndex}&name=${encodeURIComponent(fileName)}`;
        } else if (fileId) {
            url = `/api/download?file_id=${encodeURIComponent(fileId)}&bot_index=${botIndex}&name=${encodeURIComponent(fileName)}`;
        } else {
            throw new Error('No file path or ID available');
        }
        const resp = await fetch(url);
        if (!resp.ok) {
            const errData = await resp.json().catch(() => ({}));
            throw new Error(errData.error || 'Download failed (' + resp.status + ')');
        }
        let blob = await resp.blob();
        if (encrypted) {
            try {
                const encData = new Uint8Array(await blob.arrayBuffer());
                const decData = await decryptData(encData, 'ridgebox_' + chatId);
                blob = new Blob([decData]);
            } catch(e) { console.warn('Decrypt failed, returning raw file'); }
        }
        await saveToDevice(blob, fileName);
        showToast(t('download') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
    } catch (err) {
        showToast('Download error: ' + err.message, 'error');
    }
}

async function fetchCodePreview(file, url) {
    try {
        const resp = await fetch(url);
        const text = await resp.text();
        const container = document.getElementById('code-preview');
        if (!container) return;
        if (file.name.endsWith('.md')) {
            // F100: Simple markdown rendering
            container.innerHTML = renderMarkdown(text);
            container.style.fontFamily = "'Space Grotesk', sans-serif";
        } else {
            container.textContent = text.substring(0, 50000);
        }
    } catch (e) {
        const container = document.getElementById('code-preview');
        if (container) container.textContent = 'Failed to load preview';
    }
}

function renderMarkdown(md) { // F100
    let html = md
        .replace(/^### (.+)$/gm, '<h3 style="font-size:16px;font-weight:600;margin:12px 0 4px">$1</h3>')
        .replace(/^## (.+)$/gm, '<h2 style="font-size:18px;font-weight:700;margin:16px 0 6px">$1</h2>')
        .replace(/^# (.+)$/gm, '<h1 style="font-size:22px;font-weight:700;margin:20px 0 8px">$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code style="background:var(--bg);padding:2px 4px;border-radius:3px;font-family:JetBrains Mono,monospace;font-size:12px">$1</code>')
        .replace(/^- (.+)$/gm, '<li style="margin-left:16px">$1</li>')
        .replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid var(--accent);padding-left:12px;color:var(--text-secondary)">$1</blockquote>')
        .replace(/\n/g, '<br>');
    return html;
}

function generateWaveform(audioEl) { // F63
    const container = document.getElementById('waveform-container');
    if (!container || !audioEl) return;
    const barCount = 50;
    container.innerHTML = '';
    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'waveform-bar';
        bar.style.height = Math.random() * 40 + 10 + 'px';
        container.appendChild(bar);
    }
    // Animate waveform on play
    audioEl.addEventListener('play', () => {
        const bars = container.querySelectorAll('.waveform-bar');
        const animate = () => {
            if (audioEl.paused) return;
            bars.forEach(bar => { bar.style.height = Math.random() * 50 + 5 + 'px'; });
            requestAnimationFrame(animate);
        };
        animate();
    });
}

async function setPinLock() {

async function createCollaborativeFolder() { // F104
    showPrompt(
        APP.lang==='id'?'Folder Kolaboratif':'Collaborative Folder',
        APP.lang==='id'?'Nama folder kolaboratif:':'Collaborative folder name:',
        async (name) => {

function scheduleUpload() { // F80
    const timeInput = document.getElementById('scheduled-time');
    if (!timeInput || !timeInput.value) return;
    const scheduledTime = new Date(timeInput.value).getTime();
    if (scheduledTime <= Date.now()) { showToast(APP.lang==='id'?'Waktu harus di masa depan':'Time must be in the future', 'warning'); return; }
    const delay = scheduledTime - Date.now();
    const timerId = setTimeout(() => {
        showToast(APP.lang==='id'?'Unggah terjadwal siap!':'Scheduled upload ready!', 'info');
        sendNotification('Ridgebox', APP.lang==='id'?'Unggah terjadwal siap':'Scheduled upload ready');
    }, delay);
    APP.scheduledUploads.push({ id: genId(), time: scheduledTime, timerId });
    localStorage.setItem('rb_scheduled', JSON.stringify(APP.scheduledUploads.map(s => ({ id: s.id, time: s.time }))));
    showToast(t('scheduledUpload') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
}

function restoreScheduledUploads() { // F80
    try {
        const saved = JSON.parse(localStorage.getItem('rb_scheduled') || '[]');
        saved.forEach(s => {
            const delay = s.time - Date.now();
            if (delay > 0) {
                const timerId = setTimeout(() => {
                    showToast(APP.lang==='id'?'Unggah terjadwal siap!':'Scheduled upload ready!', 'info');
                }, delay);
                APP.scheduledUploads.push({ id: s.id, time: s.time, timerId });
            }
        });
    } catch(e) {}
}

const onboardingSteps = [

function startOnboarding() {

}

function showOnboardingStep() {
    const overlay = document.getElementById('onboarding-overlay');

    overlay.style.display = 'block';
    overlay.innerHTML = `
        <div style="position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:110" onclick="if(event.target===this)skipOnboarding()">
            <div class="onboarding-tooltip onb-step" style="text-align:center">
                <div style="width:64px;height:64px;border-radius:16px;background:rgba(59,130,246,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">

                <p style="font-size:14px;color:var(--text-secondary);margin-bottom:20px">${t(step.desc)}</p>
                <div style="display:flex;justify-content:center;gap:6px;margin-bottom:16px">
                    ${onboardingSteps.map((_, i) => `<div style="width:8px;height:8px;border-radius:50%;background:${i === onboardingStep ? 'var(--accent)' : 'var(--border)'}"></div>`).join('')}
                </div>
                <div style="display:flex;gap:8px;justify-content:center">
                    <button class="btn btn-ghost" onclick="skipOnboarding()">${t('skip')}</button>
                    ${!isLast ? `<button class="btn btn-primary" onclick="onboardingStep++;showOnboardingStep()">${t('nextStep')} <i class="fas fa-arrow-right"></i></button>` : `<button class="btn btn-primary" onclick="finishOnboarding()">${t('done')} <i class="fas fa-check"></i></button>`}
                </div>
            </div>
        </div>`;
}

function skipOnboarding() {
    finishOnboarding();
}

function finishOnboarding() {
    const overlay = document.getElementById('onboarding-overlay');
    if (overlay) overlay.style.display = 'none';
    APP.onboardingDone = true;
    localStorage.setItem('rb_onboarding', '1');
}

// ===== KEYBOARD NAVIGATION (F99) =====
document.addEventListener('keydown', (e) => {
    const hash = location.hash || '#/';
    if (hash === '#/' && !hash.startsWith('#/dashboard')) return;
    
    // Escape: close modals, panels, context menu
    if (e.key === 'Escape') {
        closeContextMenu();
        closeModal();
        closeDetailPanel();
        if (APP.batchMode) { APP.batchMode = false; renderFileList(); }
    }
    
    // Only handle keyboard nav in file list
    if (!document.getElementById('file-list-container')) return;
    
    const files = getFilteredFiles();
    if (files.length === 0) return;
    
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const currentIdx = APP.lastSelectedIndex;
        const nextIdx = e.key === 'ArrowDown' ? Math.min(currentIdx + 1, files.length - 1) : Math.max(currentIdx - 1, 0);
        if (files[nextIdx]) {
            openDetailPanel(files[nextIdx].id);
            APP.lastSelectedIndex = nextIdx;
        }
    }
    
    if (e.key === 'Enter' && APP.lastSelectedIndex >= 0 && files[APP.lastSelectedIndex]) {
        openPreview(files[APP.lastSelectedIndex].id);
    }
    
    // Ctrl+A: select all
    if (e.key === 'a' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        APP.batchMode = true;
        files.forEach(f => APP.selectedFiles.add(f.id));
        renderFileList();
    }
    
    // Delete
    if (e.key === 'Delete' && APP.selectedFiles.size > 0) {
        bulkDelete();
    }
});

// ===== AUTO PURGE TRASH (F82) =====
async function autoPurgeTrash() {
    if (APP.settings.trashPurgeDays <= 0) return;
    const cutoff = Date.now() - APP.settings.trashPurgeDays * 86400000;
    const toDelete = APP.files.filter(f => f.trashed && f.trashedAt && f.trashedAt < cutoff);
    for (const f of toDelete) {
        await deleteFileDB(f.id);
    }
    if (toDelete.length > 0) {
        APP.files = APP.files.filter(f => !(f.trashed && f.trashedAt && f.trashedAt < cutoff));
        showToast(`${toDelete.length} ${APP.lang==='id'?'file dihapus permanen':'files permanently deleted'}`, 'info');
    }
}


// ===== FILE PREVIEW TOOLTIP IN GRID (F84) =====
let tooltipTimeout = null;
document.addEventListener('mouseover', (e) => {
    const item = e.target.closest('.file-grid-item');
    if (!item) return;
    tooltipTimeout = setTimeout(() => {
        const fileId = item.querySelector('[onclick]')?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
        if (!fileId) return;
        const file = APP.files.find(f => f.id === fileId);
        if (!file) return;
        const type = getFileType(file.name, file.mime);
        const icon = getFileIcon(type);
        let tooltip = document.getElementById('grid-tooltip');
        if (!tooltip) {
            tooltip = document.createElement('div');
            tooltip.id = 'grid-tooltip';
            tooltip.style.cssText = 'position:fixed;z-index:150;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;box-shadow:var(--shadow-lg);pointer-events:none;max-width:200px';
            document.body.appendChild(tooltip);
        }
        tooltip.innerHTML = `<strong style="display:block;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</strong>
            <span style="color:var(--text-secondary)">${formatSize(file.size)} · ${type} · ${formatDate(file.uploadedAt)}</span>`;
        const rect = item.getBoundingClientRect();
        tooltip.style.left = Math.min(rect.left, window.innerWidth - 220) + 'px';
        tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';
        tooltip.style.display = 'block';
    }, 500);
});
document.addEventListener('mouseout', (e) => {
    if (e.target.closest('.file-grid-item')) {
        clearTimeout(tooltipTimeout);
        const tooltip = document.getElementById('grid-tooltip');
        if (tooltip) tooltip.style.display = 'none';
    }
});

// ===== QR CODE for share links =====
function showQRCode(url) {
    openModal(`
        <div style="padding:24px;text-align:center">
            <h3 style="font-size:18px;font-weight:600;margin-bottom:16px"><i class="fas fa-qrcode" style="color:var(--accent)"></i> ${t('qrCode')}</h3>
            <canvas id="qr-canvas" style="margin:0 auto"></canvas>
            <p style="font-size:12px;color:var(--text-secondary);margin-top:12px;word-break:break-all">${url}</p>
            <button class="btn btn-secondary" style="margin-top:12px" onclick="closeModal()">${t('close')}</button>
        </div>`);
    setTimeout(() => {
        const canvas = document.getElementById('qr-canvas');
        if (canvas && typeof QRious !== 'undefined') {
            new QRious({ element: canvas, value: url, size: 200, foreground: getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#0f172a', background: 'transparent' });
        }
    }, 100);
}

// ===== INITIALIZATION =====
async function init() {
    try {
        // Load theme
        APP.theme = localStorage.getItem('rb_theme') || 'light';
        APP.lang = localStorage.getItem('rb_lang') || 'id';
        applyTheme();
        applyViewMode();

        // Load data from IndexedDB
        await loadAllData();

        // Fetch bot config
        try {
            const resp = await fetch('/api/config');
            const data = await resp.json();
            if (data.ok && data.bots && data.bots.length > 0) {
                APP.bots = data.bots;
                APP.settings.proxyMode = data.proxyMode !== false;
                APP.connected = true;
            }
        } catch (e) {
            console.warn('Config fetch failed:', e);
            APP.connected = navigator.onLine;
        }

        // Update connection status
        updateConnectionStatus();
        window.addEventListener('online', () => { APP.connected = true; updateConnectionStatus(); showToast(t('connectionOk'), 'success', 2000); });
        window.addEventListener('offline', () => { APP.connected = false; updateConnectionStatus(); showToast(t('connectionOff'), 'warning', 2000); });

        // Auto purge trash
        await autoPurgeTrash();

        // Route
        checkUrlRouting();
        window.addEventListener('hashchange', checkUrlRouting);

        // Onboarding (F95) - show on first dashboard visit
        if (!APP.onboardingDone && location.hash === '#/dashboard') {
            setTimeout(startOnboarding, 500);
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            try {
                await navigator.serviceWorker.register('sw.js');
            } catch(e) { console.warn('SW registration failed:', e); }
        }

        // Load type filter options
        APP.filterType = 'all';

    } catch (err) {
        console.error('Init error:', err);
        showToast('Initialization error: ' + err.message, 'error');
    }
}

// Safe init wrapper (error handling pattern)
function safeInit() {
    try {
        init().catch(err => {
            console.error('Async init error:', err);
            showToast('Startup error: ' + err.message, 'error');
        });
    } catch (err) {
        console.error('Sync init error:', err);
        showToast('Critical error: ' + err.message, 'error');
    }
}

// Start the app
safeInit();

// ===== BULK MOVE TO FOLDER (Premium UX) =====
function bulkMoveToFolder() {
    if (APP.selectedFiles.size === 0) return;
    const folders = APP.folders.filter(f => !f.system);
    const allOption = `<div class="context-menu-item" onclick="executeBulkMove('all')"><i class="fas fa-layer-group" style="color:var(--accent)"></i> ${APP.lang==='id'?'Semua File':'All Files'}</div>`;
    const folderOptions = folders.map(f => `<div class="context-menu-item" onclick="executeBulkMove('${f.id}')"><i class="fas ${f.icon||'fa-folder'}" style="color:var(--accent)"></i> ${f.name}</div>`).join('');
    openModal(`<div style="padding:24px">
        <h3 style="font-size:17px;font-weight:600;margin-bottom:4px"><i class="fas fa-folder-open" style="color:var(--accent)"></i> ${APP.lang==='id'?'Pindahkan ke Folder':'Move to Folder'}</h3>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">${APP.selectedFiles.size} ${APP.lang==='id'?'file dipilih':'files selected'}</p>
        ${allOption}
        ${folderOptions || `<p style="font-size:13px;color:var(--text-secondary);padding:8px 0">${APP.lang==='id'?'Belum ada folder kustom':'No custom folders yet'}</p>`}
        <div style="margin-top:16px;text-align:right">
            <button class="btn btn-secondary" onclick="closeModal()">${t('close')}</button>
        </div>
    </div>`);
}

async function executeBulkMove(folderId) {
    const moveCount = APP.selectedFiles.size;
    for (const id of APP.selectedFiles) {
        const file = APP.files.find(f => f.id === id);
        if (file) {
            file.folderId = folderId === 'all' ? null : folderId;
            await saveFile(file);
        }
    }
    const targetName = folderId === 'all' ? (APP.lang==='id'?'Semua File':'All Files') : (APP.folders.find(f => f.id === folderId)?.name || folderId);
    APP.selectedFiles.clear();
    APP.batchMode = false;
    closeModal();
    closeDetailPanel();
    refreshUI();
    showToast(`${moveCount} ${APP.lang==='id'?'file dipindahkan ke':'files moved to'} ${targetName}`, 'success');
}

// ===== KEYBOARD SHORTCUTS (Premium UX) =====
document.addEventListener('keydown', (e) => {
    if (e.key === '?' && !e.target.closest('input,textarea,select')) {
        openModal(`<div style="padding:24px">
            <h3 style="font-size:17px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px"><i class="fas fa-keyboard" style="color:var(--accent)"></i> ${APP.lang==='id'?'Pintasan Keyboard':'Keyboard Shortcuts'}</h3>
            <div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13px">
                <kbd style="background:var(--bg-secondary);padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--border)">U</kbd><span>${t('upload')}</span>
                <kbd style="background:var(--bg-secondary);padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--border)">/</kbd><span>${t('search')}</span>
                <kbd style="background:var(--bg-secondary);padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--border)">G</kbd><span>${APP.lang==='id'?'Grid/List':'Grid/List view'}</span>
                <kbd style="background:var(--bg-secondary);padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--border)">B</kbd><span>${t('batchMode')}</span>
                <kbd style="background:var(--bg-secondary);padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--border)">D</kbd><span>${APP.lang==='id'?'Tema Gelap/Terang':'Toggle Dark/Light'}</span>
                <kbd style="background:var(--bg-secondary);padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--border)">Esc</kbd><span>${t('close')}</span>
                <kbd style="background:var(--bg-secondary);padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--border)">?</kbd><span>${APP.lang==='id'?'Pintasan':'Shortcuts'}</span>
            </div>
        </div>`);
    }
    if (e.key === 'u' && !e.target.closest('input,textarea,select')) triggerUpload();
    if (e.key === '/' && !e.target.closest('input,textarea,select')) { e.preventDefault(); const s = document.querySelector('.search-premium input'); if (s) s.focus(); }
    if (e.key === 'g' && !e.target.closest('input,textarea,select')) { APP.currentView = APP.currentView === 'list' ? 'grid' : 'list'; renderFileList(); }
    if (e.key === 'b' && !e.target.closest('input,textarea,select')) { APP.batchMode = !APP.batchMode; renderFileList(); }
    if (e.key === 'd' && !e.target.closest('input,textarea,select')) toggleTheme();
    if (e.key === 'Escape') { closeModal(); closeDetailPanel(); closeContextMenu(); }
});
</script>
