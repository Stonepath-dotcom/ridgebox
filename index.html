<!DOCTYPE html>
<html lang="id" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Ridgebox — Cloud Storage</title>
<meta name="description" content="Simpan file gratis tanpa server. Unlimited storage, end-to-end encryption.">
<meta name="theme-color" content="#3b82f6">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="/api/favicon" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#3b82f6','primary-dark':'#2563eb'},fontFamily:{sans:['Space Grotesk','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{--accent:#3b82f6;--accent-hover:#2563eb;--bg:#ffffff;--bg-secondary:#f8fafc;--bg-card:#ffffff;--text:#0f172a;--text-secondary:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 10px 40px rgba(0,0,0,.15);--radius:12px;--sidebar-w:260px;--header-h:60px;--transition:all .2s ease}
.dark{--bg:#0f172a;--bg-secondary:#1e293b;--bg-card:#1e293b;--text:#f1f5f9;--text-secondary:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 10px 40px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-secondary);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.font-mono{font-family:'JetBrains Mono',monospace}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--bg-secondary) 25%,var(--border) 50%,var(--bg-secondary) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.page-transition{animation:fadeIn .25s ease}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);backdrop-filter:blur(0px);z-index:100;display:flex;align-items:center;justify-content:center;transition:background .35s ease,backdrop-filter .35s ease;pointer-events:none}
.modal-backdrop.active{background:rgba(0,0,0,.5);backdrop-filter:blur(8px);pointer-events:auto}
.modal-content{background:var(--bg-card);border-radius:16px;max-width:560px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.2),0 0 0 1px rgba(59,130,246,.08);transform:translateY(30px) scale(.96);opacity:0;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .3s ease}
.modal-backdrop.active .modal-content{transform:translateY(0) scale(1);opacity:1}
.detail-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100%;background:var(--bg-card);box-shadow:-8px 0 40px rgba(0,0,0,0),0 0 0 1px rgba(59,130,246,0);z-index:90;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1),box-shadow .4s ease;overflow-y:auto}
.detail-panel.open{transform:translateX(0);box-shadow:-8px 0 40px rgba(0,0,0,.1),0 0 0 1px rgba(59,130,246,.08)}
.sidebar-mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;display:none}
.sidebar-mobile-overlay.open{display:block}
.context-menu{position:fixed;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.15),0 0 0 1px rgba(59,130,246,.05);z-index:200;min-width:200px;padding:6px;transform-origin:top left;transform:scale(.9);opacity:0;pointer-events:none;transition:transform .2s cubic-bezier(.4,0,.2,1),opacity .15s ease}
.context-menu.open{transform:scale(1);opacity:1;pointer-events:auto}
.context-menu-item{padding:9px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text);transition:all .2s ease}
.context-menu-item:hover{background:rgba(59,130,246,.06);color:var(--accent);transform:translateX(2px)}
.context-menu-item.danger{color:#ef4444}.context-menu-item.danger:hover{background:rgba(239,68,68,.06)}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{padding:12px 16px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);cursor:pointer;position:relative;overflow:hidden;transform:translateX(120%);opacity:0;animation:toastSlideIn .4s cubic-bezier(.4,0,.2,1) forwards}
.toast.removing{animation:toastSlideOut .3s cubic-bezier(.4,0,.2,1) forwards}
.toast-progress{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 10px 10px;animation:toastProgress linear forwards}
.toast.success{background:#10b981;color:#fff}.toast.success .toast-progress{background:rgba(255,255,255,.4)}
.toast.error{background:#ef4444;color:#fff}.toast.error .toast-progress{background:rgba(255,255,255,.4)}
.toast.info{background:var(--accent);color:#fff}.toast.info .toast-progress{background:rgba(255,255,255,.4)}
.toast.warning{background:#f59e0b;color:#fff}.toast.warning .toast-progress{background:rgba(255,255,255,.4)}
@keyframes toastSlideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastSlideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
@keyframes toastProgress{from{width:100%}to{width:0%}}
.upload-progress-global{position:fixed;top:0;left:0;right:0;height:3px;z-index:400;background:transparent}
.upload-progress-global .bar{height:100%;background:linear-gradient(90deg,var(--accent),#8b5cf6,var(--accent));background-size:200% 100%;transition:width .3s ease;border-radius:0 2px 2px 0;animation:progressShimmer 2s ease infinite}
@keyframes progressShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.quick-actions-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 12px 40px rgba(0,0,0,.12),0 0 0 1px rgba(59,130,246,.05);z-index:80;opacity:0;pointer-events:none;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s ease}
.quick-actions-bar.visible{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.scroll-progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:500;transition:width .1s linear}
.back-to-top{position:fixed;bottom:20px;left:20px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);z-index:80;border:none;font-size:16px;transition:var(--transition)}
.back-to-top.visible{display:flex}
.back-to-top:hover{background:var(--accent-hover);transform:scale(1.1)}
@keyframes fileItemIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* Staggered file item delays */
.file-stagger-1{animation-delay:.03s!important}.file-stagger-2{animation-delay:.06s!important}.file-stagger-3{animation-delay:.09s!important}.file-stagger-4{animation-delay:.12s!important}.file-stagger-5{animation-delay:.15s!important}.file-stagger-6{animation-delay:.18s!important}.file-stagger-7{animation-delay:.21s!important}.file-stagger-8{animation-delay:.24s!important}.file-stagger-9{animation-delay:.27s!important}.file-stagger-10{animation-delay:.3s!important}
/* Empty state SVG breathing */
@keyframes emptyBreathe{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.03);opacity:.8}}
.empty-svg{animation:emptyBreathe 3s ease-in-out infinite}
/* Onboarding step transition */
@keyframes onbStepIn{from{opacity:0;transform:translateX(30px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
.onb-step{animation:onbStepIn .4s cubic-bezier(.4,0,.2,1) forwards}
/* Storage analytics animated bar */
@keyframes barFill{from{width:0}to{width:var(--bar-w)}}
.analytics-bar{animation:barFill .8s cubic-bezier(.4,0,.2,1) forwards}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.tag-dot{width:10px;height:10px;border-radius:50%;display:inline-block;cursor:pointer}
.file-grid-item{position:relative;border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);background:var(--bg-card);opacity:0;transform:translateY(12px);animation:fileItemIn .4s cubic-bezier(.4,0,.2,1) forwards}
.file-grid-item:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(59,130,246,.1);transform:translateY(-2px)}
.file-grid-item.selected{border-color:var(--accent);background:rgba(59,130,246,.08);box-shadow:0 0 0 2px rgba(59,130,246,.2)}
.file-list-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s ease;opacity:0;transform:translateX(-8px);animation:fileItemIn .35s cubic-bezier(.4,0,.2,1) forwards}
.file-list-row:hover{background:rgba(59,130,246,.04)}
.file-list-row.selected{background:rgba(59,130,246,.08)}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:var(--transition);font-size:14px;color:var(--text-secondary)}
.sidebar-item:hover,.sidebar-item.active{background:var(--bg-secondary);color:var(--text)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;border-radius:8px;font-weight:500;font-size:14px;cursor:pointer;border:none;transition:var(--transition);font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--bg-secondary);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--text-secondary)}.btn-ghost:hover{background:var(--bg-secondary)}
.btn-sm{padding:4px 10px;font-size:12px}
.input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;transition:var(--transition)}
.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.hero-gradient{background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 50%,#ec4899 100%)}
.card-hover{transition:var(--transition)}.card-hover:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);transition:var(--transition)}
.drop-zone.drag-over{border-color:var(--accent);background:rgba(59,130,246,.05)}
.waveform-bar{display:inline-block;width:3px;margin:0 1px;background:var(--accent);border-radius:2px;vertical-align:bottom;transition:height .1s ease}
.onboarding-highlight{position:relative;z-index:110;box-shadow:0 0 0 4px var(--accent),0 0 0 9999px rgba(0,0,0,.5);border-radius:8px}
.onboarding-tooltip{position:fixed;z-index:111;background:var(--bg-card);border-radius:var(--radius);padding:16px;max-width:320px;box-shadow:var(--shadow-lg)}
/* View Mode: Mobile */
body.view-mobile .sidebar-desktop{display:none!important}
body.view-mobile .detail-panel{width:100%!important;top:auto!important;bottom:0!important;left:0!important;right:0!important;height:70vh!important;border-radius:16px 16px 0 0!important;transform:translateY(100%)!important;box-shadow:0 -4px 24px rgba(0,0,0,.15)!important}
body.view-mobile .detail-panel.open{transform:translateY(0)!important}
body.view-mobile .modal-content{position:fixed!important;bottom:0!important;left:0!important;right:0!important;max-width:100%!important;width:100%!important;max-height:90vh!important;border-radius:16px 16px 0 0!important;animation:slideUp .25s ease!important}
body.view-mobile .modal-backdrop{align-items:flex-end!important}
body.view-mobile .toast-container{left:16px!important;right:16px!important;bottom:80px!important;max-width:none!important}
body.view-mobile .quick-actions-bar{bottom:16px!important;left:16px!important;right:16px!important;transform:none!important;width:auto!important}
body.view-mobile .file-list-row{min-height:56px;padding:12px 16px!important}
body.view-mobile .file-grid-item{padding:12px!important}
body.view-mobile .btn{min-height:36px}
body.view-mobile .back-to-top{bottom:80px!important;left:16px!important}
body.view-mobile .hide-mobile-small{display:none!important}
body.view-mobile .sidebar-mobile{position:fixed;left:0;top:0;bottom:0;width:280px;z-index:50;transform:translateX(-100%);transition:transform .3s ease}
body.view-mobile .sidebar-mobile.open{transform:translateX(0)}
body.view-mobile .toolbar-wrap{flex-wrap:wrap!important;gap:4px!important;padding:8px 12px!important}
body.view-mobile .toolbar-wrap .search-box{min-width:0!important;width:100%!important;order:-1}
body.view-mobile .toolbar-wrap select{font-size:11px!important;padding:4px 6px!important}
body.view-mobile .file-list-row .action-btns{display:none!important}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* ===== ULTRA PREMIUM LUXURY HOMEPAGE ===== */
/* Aurora Mesh Gradient for Hero */
@keyframes aurora{0%{background-position:0% 50%}25%{background-position:50% 100%}50%{background-position:100% 50%}75%{background-position:50% 0%}100%{background-position:0% 50%}}
.aurora-bg{background:linear-gradient(135deg,#0a0a1a 0%,#0d1033 10%,#1a1145 25%,#2d1b69 40%,#1a1145 55%,#0f1d3d 70%,#0a1628 85%,#0a0a1a 100%);background-size:400% 400%;animation:aurora 12s ease infinite;position:relative;overflow:hidden}
.aurora-bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 50%,rgba(59,130,246,.25) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.3) 0%,transparent 50%),radial-gradient(ellipse at 40% 80%,rgba(236,72,153,.2) 0%,transparent 50%),radial-gradient(ellipse at 70% 60%,rgba(6,182,212,.15) 0%,transparent 50%);animation:aurora 15s ease infinite reverse;pointer-events:none}
.aurora-bg::after{content:'';position:absolute;inset:0;background:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><pattern id=%22g%22 width=%2220%22 height=%2220%22 patternUnits=%22userSpaceOnUse%22><circle cx=%2210%22 cy=%2210%22 r=%220.5%22 fill=%22rgba(255,255,255,0.08)%22/></pattern></defs><rect fill=%22url(%23g)%22 width=%22100%22 height=%22100%22/></svg>') repeat;pointer-events:none}

/* Glassmorphism Cards */
.glass-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:16px;transition:all .4s cubic-bezier(.4,0,.2,1)}
.glass-card:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.3)}
.light .glass-card{background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.8);box-shadow:0 4px 30px rgba(0,0,0,.06)}
.light .glass-card:hover{background:rgba(255,255,255,.9);border-color:rgba(59,130,246,.3);box-shadow:0 20px 60px rgba(59,130,246,.1)}

/* Premium Card (non-hero) */
.premium-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.premium-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .4s ease}
.premium-card:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(59,130,246,.12),0 0 0 1px rgba(59,130,246,.1)}
.premium-card:hover::before{opacity:1}
.dark .premium-card:hover{box-shadow:0 20px 60px rgba(59,130,246,.2),0 0 0 1px rgba(59,130,246,.2)}

/* Gradient Text */
.gradient-text{background:linear-gradient(135deg,#3b82f6,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-text-blue{background:linear-gradient(135deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-text-gold{background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Animated Glowing Border */
@keyframes glowBorder{0%{border-color:rgba(59,130,246,.3)}50%{border-color:rgba(139,92,246,.5)}100%{border-color:rgba(59,130,246,.3)}}
.glow-border{border:2px solid rgba(59,130,246,.3);animation:glowBorder 3s ease infinite}

/* Floating Orbs (decorative) */
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-25px,20px) scale(.95)}66%{transform:translate(20px,-15px) scale(1.05)}}
.decor-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);opacity:.15;z-index:0}
.dark .decor-orb{opacity:.08}
.decor-orb-1{width:400px;height:400px;background:#3b82f6;animation:orbFloat1 20s ease infinite}
.decor-orb-2{width:350px;height:350px;background:#8b5cf6;animation:orbFloat2 25s ease infinite}
.decor-orb-3{width:300px;height:300px;background:#ec4899;animation:orbFloat1 18s ease infinite reverse}

/* 3D Tilt on hover */
.tilt-card{transition:transform .3s ease;transform-style:preserve-3d}
.tilt-card:hover{transform:perspective(1000px) rotateX(2deg) rotateY(-2deg) translateY(-4px)}

/* Scroll Reveal Animations */
@keyframes revealUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes revealLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes revealRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes revealScale{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.sr{opacity:0;will-change:transform,opacity}.sr.revealed{animation:revealUp .8s cubic-bezier(.4,0,.2,1) forwards}
.sr-left.revealed{animation:revealLeft .8s cubic-bezier(.4,0,.2,1) forwards}
.sr-right.revealed{animation:revealRight .8s cubic-bezier(.4,0,.2,1) forwards}
.sr-scale.revealed{animation:revealScale .8s cubic-bezier(.4,0,.2,1) forwards}
.sr-delay-1{animation-delay:.1s!important}.sr-delay-2{animation-delay:.2s!important}.sr-delay-3{animation-delay:.3s!important}.sr-delay-4{animation-delay:.4s!important}.sr-delay-5{animation-delay:.5s!important}

/* Animated Logo */
@keyframes logoReveal{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.1) rotate(10deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes logoPulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{box-shadow:0 0 0 15px rgba(59,130,246,0)}}
.logo-animated{animation:logoReveal 1s cubic-bezier(.4,0,.2,1) forwards,logoPulse 2s ease 1s infinite}

/* Premium Stat Card */
@keyframes countUpPremium{from{opacity:0;transform:translateY(20px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
.stat-card{padding:28px 24px;background:var(--bg-card);border-radius:16px;border:1px solid var(--border);position:relative;overflow:hidden;transition:all .4s cubic-bezier(.4,0,.2,1)}
.stat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,.03),rgba(139,92,246,.03));pointer-events:none}
.stat-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 16px 48px rgba(59,130,246,.12)}
.stat-number{font-size:42px;font-weight:800;letter-spacing:-1px;line-height:1}

/* Premium Comparison Row */
.cmp-table{border-collapse:separate;border-spacing:0;overflow:hidden}
.cmp-table thead th{position:relative}
.cmp-table thead th::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#8b5cf6);opacity:.5}
.cmp-ridge-col{background:rgba(59,130,246,.04)!important}
.dark .cmp-ridge-col{background:rgba(59,130,246,.08)!important}

/* Premium Mockup */
.premium-mockup{border-radius:20px;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.15),0 0 0 1px rgba(59,130,246,.1);border:1px solid rgba(255,255,255,.1);position:relative}
.premium-mockup::before{content:'';position:absolute;inset:-1px;border-radius:21px;padding:1px;background:linear-gradient(135deg,rgba(59,130,246,.3),rgba(139,92,246,.3),rgba(236,72,153,.3));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1}

/* Premium CTA */
.premium-cta{position:relative;overflow:hidden;border-radius:28px;padding:60px 40px;background:linear-gradient(135deg,#1e1b4b,#312e81,#4c1d95);box-shadow:0 25px 80px rgba(79,70,229,.3)}
.premium-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(59,130,246,.3) 0%,transparent 60%),radial-gradient(ellipse at 70% 30%,rgba(139,92,246,.3) 0%,transparent 60%);pointer-events:none}
.premium-cta::after{content:'';position:absolute;inset:-1px;border-radius:28px;padding:2px;background:linear-gradient(135deg,rgba(59,130,246,.5),rgba(139,92,246,.5),rgba(236,72,153,.5));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}

/* Premium Newsletter */
.premium-newsletter{background:var(--bg-secondary);border:1px solid var(--border);border-radius:24px;padding:40px;position:relative;overflow:hidden}
.premium-newsletter::before{content:'';position:absolute;top:-50%;right:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 80% 20%,rgba(59,130,246,.06) 0%,transparent 50%);pointer-events:none}

/* Wave Dividers */
.wave-divider{position:relative;margin-top:-2px}.wave-divider svg{display:block;width:100%}
.wave-divider-flip{transform:scaleY(-1)}

/* Premium Section Title */
.section-eyebrow{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:rgba(59,130,246,.08);color:var(--accent);border:1px solid rgba(59,130,246,.15);margin-bottom:16px}
.dark .section-eyebrow{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.25)}
.section-title{font-size:clamp(28px,5vw,40px);font-weight:800;line-height:1.15;letter-spacing:-.5px;margin-bottom:12px}
.section-desc{font-size:16px;color:var(--text-secondary);max-width:560px;margin:0 auto;line-height:1.7}

/* Floating animation for hero */
@keyframes float1{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-20px) rotate(5deg)}50%{transform:translateY(-10px) rotate(-3deg)}75%{transform:translateY(-25px) rotate(2deg)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-15px) rotate(-4deg)}66%{transform:translateY(-25px) rotate(3deg)}}
@keyframes float3{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(6deg)}}
@keyframes float4{0%,100%{transform:translateY(-5px)}50%{transform:translateY(-22px)}}
.hero-float{position:absolute;opacity:.12;color:#fff;pointer-events:none;animation-timing-function:ease-in-out;animation-iteration-count:infinite}
.hero-float-1{animation:float1 6s infinite;font-size:28px}
.hero-float-2{animation:float2 8s infinite;font-size:22px}
.hero-float-3{animation:float3 7s infinite;font-size:32px}
.hero-float-4{animation:float4 5s infinite;font-size:18px}

/* ===== LUXURY HOMEPAGE EXTRAS ===== */
/* Particle Canvas */
#hero-particles{position:absolute;inset:0;pointer-events:none;z-index:1}

/* Hero Typing Effect */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.typing-cursor::after{content:'|';animation:blink .8s step-end infinite;color:var(--accent);margin-left:2px;font-weight:300}

/* Luxury Bento Grid */
.bento-grid{display:grid;gap:16px;grid-template-columns:repeat(3,1fr);max-width:960px;margin:0 auto}
.bento-lg{grid-column:span 2;grid-row:span 2}
.bento-md{grid-column:span 2}
.bento-sm{grid-column:span 1}
@media(max-width:700px){.bento-grid{grid-template-columns:1fr}.bento-lg,.bento-md{grid-column:span 1;grid-row:span 1}}

/* Luxury Bento Card */
.bento-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:28px;position:relative;overflow:hidden;transition:all .4s cubic-bezier(.4,0,.2,1)}
.bento-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#8b5cf6,#ec4899);opacity:0;transition:opacity .4s ease}
.bento-card:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(59,130,246,.12);border-color:rgba(59,130,246,.2)}
.bento-card:hover::before{opacity:1}
.dark .bento-card:hover{box-shadow:0 20px 60px rgba(59,130,246,.2)}

/* Animated Marquee */
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-track{display:flex;gap:16px;animation:marquee 30s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
.marquee-wrap{overflow:hidden;mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent)}

/* Luxury Feature Card */
.lux-feature{padding:32px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border);transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.lux-feature::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at center,rgba(59,130,246,.06),transparent 70%);opacity:0;transition:opacity .4s ease}
.lux-feature:hover{transform:translateY(-6px);box-shadow:0 24px 64px rgba(59,130,246,.12);border-color:rgba(59,130,246,.2)}
.lux-feature:hover::before{opacity:1}
.lux-feature .lux-icon{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;position:relative;transition:transform .3s ease}
.lux-feature:hover .lux-icon{transform:scale(1.08) rotate(3deg)}
.lux-feature .lux-icon::after{content:'';position:absolute;inset:0;border-radius:18px;background:inherit;filter:blur(16px);opacity:.4;z-index:-1}

/* Hero Trust Bar */
.trust-bar{display:flex;align-items:center;gap:28px;justify-content:center;flex-wrap:wrap;margin-top:56px;padding:20px 0}
.trust-item{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.5);font-size:14px;font-weight:500;letter-spacing:.3px}
.trust-item i{font-size:16px}
.trust-sep{width:1px;height:20px;background:rgba(255,255,255,.15)}

/* Animated Counter */
@keyframes countPop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

/* Premium Testimonial */
.lux-testimonial{padding:32px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border);transition:all .4s ease;position:relative;overflow:hidden}
.lux-testimonial::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .4s ease}
.lux-testimonial:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(59,130,246,.1)}
.lux-testimonial:hover::before{opacity:1}

/* Step Connector Line */
.step-line{position:relative}
.step-line::after{content:'';position:absolute;top:50%;right:-40px;width:40px;height:2px;background:linear-gradient(90deg,var(--accent),rgba(139,92,246,.4));z-index:1}
.step-line:last-child::after{display:none}
@media(max-width:768px){.step-line::after{display:none}}

/* Luxury Badge Glow */
@keyframes badgeGlow{0%,100%{box-shadow:0 0 8px rgba(59,130,246,.3)}50%{box-shadow:0 0 20px rgba(59,130,246,.5)}}
.badge-glow{animation:badgeGlow 2.5s ease infinite}

/* Comparison checkmark */
.cmp-yes{color:#10b981;font-weight:700}
.cmp-no{color:#94a3b8}
.cmp-partial{color:#f59e0b;font-weight:600}
/* Dashboard mockup */
.mockup-frame{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);overflow:hidden;position:relative}
.mockup-topbar{height:36px;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px}
.mockup-dot{width:10px;height:10px;border-radius:50%}
/* File type badge */
.file-type-badge{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:12px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg-card);transition:all .3s ease}
.file-type-badge:hover{border-color:var(--accent);transform:translateY(-2px) scale(1.04);box-shadow:0 4px 16px rgba(59,130,246,.1)}
/* Newsletter input */
.newsletter-input{padding:14px 18px;border:2px solid var(--border);border-radius:12px 0 0 12px;font-size:15px;background:var(--bg);color:var(--text);flex:1;outline:none;transition:var(--transition);font-family:inherit}
.newsletter-input:focus{border-color:var(--accent)}
.newsletter-btn{padding:14px 24px;background:var(--accent);color:#fff;border:2px solid var(--accent);border-radius:0 12px 12px 0;font-weight:600;font-size:15px;cursor:pointer;transition:var(--transition);font-family:inherit;white-space:nowrap}
.newsletter-btn:hover{background:var(--accent-hover);border-color:var(--accent-hover)}

/* Hero Particles */
.hero-particle{position:absolute;border-radius:50%;pointer-events:none;opacity:.3;background:#fff;animation:particleFloat 8s ease-in-out infinite}
@keyframes particleFloat{0%,100%{transform:translateY(0) translateX(0);opacity:.3}25%{transform:translateY(-30px) translateX(15px);opacity:.5}50%{transform:translateY(-15px) translateX(-10px);opacity:.2}75%{transform:translateY(-40px) translateX(20px);opacity:.4}}

/* Section Separator */
.lux-sep{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);max-width:200px;margin:0 auto}

/* Hero Badge */
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:99px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:13px;font-weight:500;backdrop-filter:blur(12px);margin-bottom:28px}
.hero-badge .pulse-dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:logoPulse 2s ease infinite}

/* ===== ULTRA LUXURY ANIMATION SYSTEM ===== */
/* Mouse-Follow Spotlight */
.hero-spotlight{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.hero-spotlight-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.12) 0%,rgba(139,92,246,.06) 30%,transparent 70%);pointer-events:none;transform:translate(-50%,-50%);transition:left .3s ease,top .3s ease,opacity .5s ease;opacity:0;filter:blur(40px)}
.hero-spotlight-glow.active{opacity:1}

/* Text Split Reveal Animation */
@keyframes charReveal{0%{opacity:0;transform:translateY(40px) rotateX(-40deg);filter:blur(6px)}100%{opacity:1;transform:translateY(0) rotateX(0deg);filter:blur(0)}}
.char-reveal{display:inline-block;opacity:0;animation:charReveal .6s cubic-bezier(.23,1,.32,1) forwards;transform-origin:bottom}
.word-reveal{display:inline-block;opacity:0;transform:translateY(30px) scale(.95);filter:blur(4px);transition:all .5s cubic-bezier(.23,1,.32,1)}
.word-reveal.revealed{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}

/* Magnetic Button Effect */
.magnetic-btn{position:relative;transition:transform .25s cubic-bezier(.23,1,.32,1);will-change:transform}
.magnetic-btn .btn-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rippleOut .6s ease-out forwards;pointer-events:none}
@keyframes rippleOut{to{transform:scale(4);opacity:0}}

/* Hero CTA Premium */
.hero-cta-primary{background:linear-gradient(135deg,#fff,#f0f4ff);color:#1e1b4b;padding:16px 40px;font-size:16px;font-weight:700;border-radius:14px;text-decoration:none;box-shadow:0 8px 32px rgba(0,0,0,.2),0 0 0 1px rgba(255,255,255,.1);transition:all .3s cubic-bezier(.23,1,.32,1);display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;font-family:inherit;position:relative;overflow:hidden}
.hero-cta-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(139,92,246,.1));opacity:0;transition:opacity .3s ease}
.hero-cta-primary:hover::before{opacity:1}
.hero-cta-primary:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 16px 48px rgba(59,130,246,.3),0 0 0 1px rgba(59,130,246,.2)}
.hero-cta-primary::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,rgba(59,130,246,.1),transparent 30%);animation:ctaSpin 3s linear infinite;pointer-events:none}
@keyframes ctaSpin{to{transform:rotate(360deg)}}

.hero-cta-secondary{background:rgba(255,255,255,.06);color:#fff;padding:16px 40px;font-size:16px;font-weight:500;border-radius:14px;border:1px solid rgba(255,255,255,.2);text-decoration:none;backdrop-filter:blur(20px);transition:all .3s cubic-bezier(.23,1,.32,1);display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:inherit;position:relative;overflow:hidden}
.hero-cta-secondary:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4);transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,255,255,.06)}

/* Morphing Blob Background */
@keyframes blobMorph1{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%;transform:translate(0,0) rotate(0deg)}25%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%;transform:translate(20px,-30px) rotate(90deg)}50%{border-radius:50% 60% 30% 60%/30% 60% 70% 40%;transform:translate(-15px,20px) rotate(180deg)}75%{border-radius:60% 30% 60% 40%/60% 40% 30% 70%;transform:translate(10px,-10px) rotate(270deg)}}
@keyframes blobMorph2{0%,100%{border-radius:40% 60% 70% 30%/40% 50% 60% 50%;transform:translate(0,0) rotate(0deg)}33%{border-radius:70% 30% 50% 60%/30% 70% 40% 60%;transform:translate(-25px,15px) rotate(120deg)}66%{border-radius:30% 50% 60% 70%/60% 40% 70% 30%;transform:translate(15px,-20px) rotate(240deg)}}
.morph-blob{position:absolute;pointer-events:none;filter:blur(60px);opacity:.08;z-index:0}
.dark .morph-blob{opacity:.05}
.morph-blob-1{width:500px;height:500px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);animation:blobMorph1 20s ease-in-out infinite}
.morph-blob-2{width:400px;height:400px;background:linear-gradient(135deg,#ec4899,#8b5cf6);animation:blobMorph2 18s ease-in-out infinite}
.morph-blob-3{width:350px;height:350px;background:linear-gradient(135deg,#06b6d4,#3b82f6);animation:blobMorph1 22s ease-in-out infinite reverse}

/* Animated Gradient Border (rotating) */
@keyframes borderRotate{to{--angle:360deg}}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
.animated-border{position:relative;border-radius:28px;overflow:hidden}
.animated-border::before{content:'';position:absolute;inset:-2px;border-radius:28px;padding:2px;background:conic-gradient(from var(--angle),#3b82f6,#8b5cf6,#ec4899,#06b6d4,#3b82f6);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:borderRotate 4s linear infinite;pointer-events:none;z-index:2}

/* Typewriter Effect */
@keyframes typewriter{from{width:0}to{width:100%}}
.typewriter-text{display:inline-block;overflow:hidden;white-space:nowrap;border-right:2px solid var(--accent);animation:typewriter 2.5s steps(40) .8s forwards,blink .8s step-end infinite;width:0}

/* Parallax Depth Layer */
.parallax-layer{transition:transform .1s ease-out;will-change:transform}

/* Smooth Counter Roll */
@keyframes counterRoll{0%{transform:translateY(100%);opacity:0}30%{opacity:1}100%{transform:translateY(0);opacity:1}}
.counter-digit{display:inline-block;overflow:hidden;vertical-align:bottom}
.counter-digit span{display:inline-block;animation:counterRoll .6s cubic-bezier(.23,1,.32,1) forwards;transform:translateY(100%)}

/* Glow Pulse Ring */
@keyframes glowPulseRing{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.2);opacity:0}}
.glow-ring{position:absolute;border:2px solid rgba(59,130,246,.4);border-radius:50%;animation:glowPulseRing 2.5s ease-out infinite;pointer-events:none}
.glow-ring-2{animation-delay:.8s}
.glow-ring-3{animation-delay:1.6s}

/* Shimmer Sweep */
@keyframes shimmerSweep{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.shimmer-sweep{position:relative;overflow:hidden}
.shimmer-sweep::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shimmerSweep 3s ease-in-out infinite;pointer-events:none}

/* Floating Elements with Depth */
@keyframes floatDepth1{0%,100%{transform:translateY(0) translateZ(0) rotateY(0deg)}25%{transform:translateY(-15px) translateZ(20px) rotateY(5deg)}50%{transform:translateY(-8px) translateZ(10px) rotateY(-3deg)}75%{transform:translateY(-22px) translateZ(30px) rotateY(2deg)}}
@keyframes floatDepth2{0%,100%{transform:translateY(0) translateZ(0) rotateX(0deg)}33%{transform:translateY(-20px) translateZ(25px) rotateX(4deg)}66%{transform:translateY(-10px) translateZ(15px) rotateX(-2deg)}}
.float-3d{perspective:800px;transform-style:preserve-3d}
.float-3d-inner{animation:floatDepth1 8s ease-in-out infinite;transform-style:preserve-3d}

/* Section Entrance Orchestrator */
@keyframes sectionEnter{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
.section-orchestrated{opacity:0;transform:translateY(60px)}
.section-orchestrated.in-view{animation:sectionEnter .8s cubic-bezier(.23,1,.32,1) forwards}

/* Luxury Feature Card with Animated Icon */
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(3deg)}}
.lux-feature:hover .lux-icon i{animation:iconFloat .6s ease}

/* Animated Dotted Line */
@keyframes dashMove{to{stroke-dashoffset:-20}}
.animated-dash{stroke-dasharray:8 6;animation:dashMove 1s linear infinite}

/* CTA Breathing Glow */
@keyframes ctaBreathe{0%,100%{box-shadow:0 0 20px rgba(59,130,246,.2),0 0 60px rgba(59,130,246,.1)}50%{box-shadow:0 0 40px rgba(59,130,246,.3),0 0 80px rgba(59,130,246,.15)}}
.cta-breathe{animation:ctaBreathe 3s ease-in-out infinite}

/* Smooth Scale Entrance for Stats */
@keyframes scaleEntrance{0%{opacity:0;transform:scale(.7) translateY(20px)}60%{transform:scale(1.03) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.scale-entrance{opacity:0;transform:scale(.7) translateY(20px)}
.scale-entrance.in-view{animation:scaleEntrance .7s cubic-bezier(.23,1,.32,1) forwards}

/* Luxury Gradient Divider */
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.lux-grad-divider{height:2px;background:linear-gradient(90deg,transparent,#3b82f6,#8b5cf6,#ec4899,#8b5cf6,#3b82f6,transparent);background-size:200% 100%;animation:gradShift 4s ease infinite}

/* Orbit Animation for Logo */
@keyframes orbit{to{transform:rotate(360deg)}}
.orbit-ring{position:absolute;border:1px dashed rgba(255,255,255,.1);border-radius:50%;animation:orbit 20s linear infinite;pointer-events:none}
.orbit-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);top:-3px;left:50%;margin-left:-3px}

/* Text Gradient Animation */
@keyframes textGradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.animated-gradient-text{background:linear-gradient(135deg,#3b82f6,#8b5cf6,#ec4899,#06b6d4,#3b82f6);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:textGradShift 5s ease infinite}

/* Luxury Footer */
.lux-footer{background:var(--bg-secondary);border-top:1px solid var(--border);padding:60px 20px 30px;position:relative;overflow:hidden}
.lux-footer::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#3b82f6,#8b5cf6,#ec4899,#f59e0b,#3b82f6);background-size:200% 100%;animation:progressShimmer 4s linear infinite}
.lux-footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;max-width:960px;margin:0 auto}
@media(max-width:700px){.lux-footer-grid{grid-template-columns:1fr 1fr;gap:24px}}
@media(max-width:480px){.lux-footer-grid{grid-template-columns:1fr;gap:20px}}
/* View Mode: Desktop */
body.view-desktop .sidebar-mobile-toggle{display:none!important}
body.view-desktop .detail-panel{width:420px;max-width:100%;top:0;right:0;bottom:0;left:auto;height:auto;border-radius:0}
body.view-desktop .detail-panel.open{transform:translateX(0)}
/* Fallback: auto-detect */
@media(max-width:768px){body:not(.view-mobile):not(.view-desktop) .sidebar-desktop{display:none!important}body:not(.view-mobile):not(.view-desktop) .detail-panel{width:100%}}
@media(min-width:769px){body:not(.view-mobile):not(.view-desktop) .sidebar-mobile-toggle{display:none!important}}

/* ===== PREMIUM DASHBOARD UPGRADES ===== */
/* Glassmorphism Header */
.header-glass{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.82);border-bottom:1px solid transparent;border-image:linear-gradient(90deg,transparent,rgba(59,130,246,.3),rgba(139,92,246,.3),transparent) 1}

// ===== INDEXEDDB (F15) =====
const DB_NAME = 'RidgeboxDB';
const DB_VERSION = 3;
let _db = null;

function openDB() {
    return new Promise((resolve, reject) => {
        if (_db) return resolve(_db);
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('files')) {
                const fs = db.createObjectStore('files', { keyPath: 'id' });
                fs.createIndex('folderId', 'folderId', { unique: false });
                fs.createIndex('name', 'name', { unique: false });
                fs.createIndex('trashed', 'trashed', { unique: false });
                fs.createIndex('starred', 'starred', { unique: false });
            }
            if (!db.objectStoreNames.contains('folders')) db.createObjectStore('folders', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('shares')) db.createObjectStore('shares', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
        };
        req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
        req.onerror = (e) => reject(e.target.error);
    });
}

async function dbGetAll(store) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function dbGet(store, key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function dbPut(store, data) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).put(data);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

async function dbDelete(store, key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

async function dbClear(store) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }

function formatSize(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDate(ts) {
    if (!ts) return '-';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return APP.lang === 'id' ? 'Baru saja' : 'Just now';
    if (diff < 3600000) return Math.floor(diff/60000) + (APP.lang === 'id' ? ' menit lalu' : ' min ago');
    if (diff < 86400000) return Math.floor(diff/3600000) + (APP.lang === 'id' ? ' jam lalu' : 'h ago');
    if (diff < 604800000) return Math.floor(diff/86400000) + (APP.lang === 'id' ? ' hari lalu' : 'd ago');
    return d.toLocaleDateString(APP.lang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'short', year: 'numeric' });
}

function getFileType(name, mime) {
    const ext = (name || '').split('.').pop().toLowerCase();
    if (mime) {
        if (mime.startsWith('image/')) return 'image';
        if (mime.startsWith('video/')) return 'video';
        if (mime.startsWith('audio/')) return 'audio';
        if (mime === 'application/pdf') return 'pdf';
        if (mime.includes('zip') || mime.includes('rar') || mime.includes('7z') || mime.includes('tar') || mime.includes('gz')) return 'archive';
        if (mime.includes('word') || mime.includes('document')) return 'document';
        if (mime.includes('sheet') || mime.includes('excel')) return 'spreadsheet';
        if (mime.includes('presentation') || mime.includes('powerpoint')) return 'presentation';
        if (mime.includes('text')) return 'text';
    }
    const imgExts = ['jpg','jpeg','png','gif','webp','svg','bmp','ico'];
    const vidExts = ['mp4','avi','mkv','mov','webm','flv','wmv'];
    const audExts = ['mp3','wav','ogg','flac','aac','m4a','wma'];
    const docExts = ['doc','docx','xls','xlsx','ppt','pptx','pdf','txt','rtf'];
    const codeExts = ['js','ts','py','java','c','cpp','h','css','html','jsx','tsx','json','xml','yaml','yml','md','sh','sql','go','rs','rb','php'];
    if (imgExts.includes(ext)) return 'image';
    if (vidExts.includes(ext)) return 'video';
    if (audExts.includes(ext)) return 'audio';
    if (ext === 'pdf') return 'pdf';
    if (['doc','docx'].includes(ext)) return 'document';
    if (['xls','xlsx'].includes(ext)) return 'spreadsheet';
    if (['ppt','pptx'].includes(ext)) return 'presentation';
    if (codeExts.includes(ext)) return 'code';
    if (['zip','rar','7z','tar','gz','bz2'].includes(ext)) return 'archive';
    return 'other';
}

async function hashPin(pin) { // F77: SHA-256 PIN hash
    const encoder = new TextEncoder();
    const data = encoder.encode(pin + '_ridgebox_salt_2024');
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ===== ENCRYPTION (F11) =====
async function encryptData(data, password) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt']);
    const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
    const result = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
    result.set(salt, 0);
    result.set(iv, salt.length);
    result.set(new Uint8Array(encrypted), salt.length + iv.length);
    return result;
}

async function decryptData(encData, password) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const salt = encData.slice(0, 16);
    const iv = encData.slice(16, 28);
    const data = encData.slice(28);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    return await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
}

// ===== TOAST (F13, F96) =====
const toastGroups = {};
function showToast(msg, type = 'info', duration = 4000) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const groupKey = msg.substring(0, 30) + type;
    if (toastGroups[groupKey]) {
        const existing = toastGroups[groupKey];
        const count = (parseInt(existing.dataset.count) || 1) + 1;
        existing.dataset.count = count;
        existing.querySelector('.toast-msg').textContent = msg + (count > 1 ? ` (${count}x)` : '');
        clearTimeout(existing._timer);
        // Reset progress bar
        const prog = existing.querySelector('.toast-progress');
        if (prog) { prog.style.animation = 'none'; prog.offsetHeight; prog.style.animation = `toastProgress ${duration}ms linear forwards`; }
        existing._timer = setTimeout(() => { removeToast(existing, groupKey); }, duration);
        return;
    }
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.dataset.count = '1';
    const svgIcons = {
        success: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 9.5L7.5 11.5L12.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        error: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 6.5L11.5 11.5M11.5 6.5L6.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
        info: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M9 7V7.5M9 10V12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
        warning: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L16.5 14.5H1.5L9 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 7V9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="12" r="0.75" fill="currentColor"/></svg>'
    };
    el.innerHTML = `${svgIcons[type] || svgIcons.info}<span class="toast-msg">${msg}</span><div class="toast-progress" style="animation-duration:${duration}ms"></div>`;
    el._timer = setTimeout(() => { removeToast(el, groupKey); }, duration);
    el.onclick = () => { removeToast(el, groupKey); };
    container.appendChild(el);
    toastGroups[groupKey] = el;
}
function removeToast(el, groupKey) {
    if (!el || el.classList.contains('removing')) return;
    el.classList.add('removing');
    clearTimeout(el._timer);
    setTimeout(() => { el.remove(); delete toastGroups[groupKey]; }, 300);
}

function showUndoToast(message, undoCallback) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = 'toast info';
    toast.id = id;
    toast.innerHTML = `<i class="fas fa-info-circle" style="font-size:14px"></i><span style="flex:1">${message}</span><button style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-weight:600;font-family:inherit;font-size:12px;flex-shrink:0" id="undo-btn-${id}">${APP.lang==='id'?'Urungkan':'Undo'}</button><div class="toast-progress" style="animation-duration:6000ms"></div>`;
    container.appendChild(toast);
    const undoBtn = document.getElementById('undo-btn-' + id);
    if (undoBtn) undoBtn.onclick = () => { undoCallback(); if (document.getElementById(id)) document.getElementById(id).remove(); };
    toast.onclick = (e) => { if (e.target.tagName !== 'BUTTON') removeToast(toast, id); };
    toast._timer = setTimeout(() => { if (document.getElementById(id)) { removeToast(toast, id); delete toastGroups[id]; } }, 6000);
    toastGroups[id] = toast;
}

function checkUrlRouting() {
    const hash = location.hash || '#/';
    const main = document.getElementById('app-main');
    if (!main) return;

    // Close any open panels
    closeDetailPanel();
    closeContextMenu();

    if (hash === '#/' || hash === '') {
        renderHomepage();
    } else if (hash === '#/dashboard') {
        checkPinThenRender(() => renderDashboard());
    } else if (hash.startsWith('#/file/')) {
        const fileId = hash.replace('#/file/', '');
        checkPinThenRender(() => renderFileDetail(fileId));
    } else if (hash.startsWith('#/upload/')) {
        const token = hash.replace('#/upload/', '');
        renderUploadPortal(token);
    } else if (hash.startsWith('#/s/')) {
        const alias = hash.replace('#/s/', '');
        renderSharePortal(alias);
    } else {
        render404();
    }
}

    setTimeout(() => { const inp = document.getElementById('pin-input'); if (inp) inp.focus(); }, 100);
    overlay._callback = callback;
}

async function verifyPin() {
    const inp = document.getElementById('pin-input');
    const errEl = document.getElementById('pin-error');
    if (!inp) return;
    const hashed = await hashPin(inp.value);
    if (hashed === APP.settings.pinLock) {
        const ov = document.getElementById('pin-lock-overlay');
        ov.style.opacity = '0';
        setTimeout(() => { ov.style.display = 'none'; }, 300);
        if (document.getElementById('pin-lock-overlay')._callback) {
            document.getElementById('pin-lock-overlay')._callback();
        }
    } else {
        if (errEl) errEl.style.display = 'block';
        inp.value = '';
        inp.focus();
    }
}

// ===== VIEW MODE TOGGLE (Mobile/Desktop) =====
function toggleViewMode() {
    APP.viewMode = APP.viewMode === 'mobile' ? 'desktop' : 'mobile';
    localStorage.setItem('rb_view_mode', APP.viewMode);
    applyViewMode();
    renderHeader();
    // Re-render current page with new layout
    const sidebar = document.getElementById('sidebar-panel');
    if (sidebar) {
        if (APP.viewMode === 'desktop') {
            sidebar.style.transform = '';
            sidebar.style.position = '';
            const overlay = document.getElementById('sidebar-mobile-overlay');
            if (overlay) overlay.classList.remove('open');
        } else {
            sidebar.style.transform = 'translateX(-100%)';
            sidebar.style.position = 'fixed';
        }
    }
    showToast(APP.viewMode === 'mobile' ? 'Mobile Mode' : 'Desktop Mode', 'info', 2000);
}

function applyViewMode() {
    document.body.classList.remove('view-mobile', 'view-desktop');
    document.body.classList.add('view-' + APP.viewMode);

    const sidebar = document.getElementById('sidebar-panel');
    if (sidebar) {
        if (APP.viewMode === 'desktop') {

            sidebar.classList.add('sidebar-desktop');
            sidebar.style.cssText = 'width:var(--sidebar-w);min-width:var(--sidebar-w);border-right:1px solid var(--border);background:linear-gradient(180deg,var(--bg) 0%,var(--bg-secondary) 100%);overflow-y:auto;padding:16px 12px;transition:transform .3s ease;z-index:50';

function toggleMobileSidebar(open) {

// ===== MODAL SYSTEM =====
function openModal(html) {
    const backdrop = document.getElementById('modal-backdrop');
    const content = document.getElementById('modal-content');
    if (!backdrop || !content) return;
    content.innerHTML = html;
    backdrop.style.display = 'flex';

        </div>
    </div>`);

        const inp = document.getElementById('prompt-input');
        const btn = document.getElementById('prompt-action-btn');

}

        <div class="context-menu-item danger" onclick="deletePermanently('${fileId}')"><i class="fas fa-times-circle"></i> ${t('delete')}</div>
        `}

// ===== LUXURY ANIMATION INIT FUNCTIONS =====
function initHeroSpotlight() {
    const section = document.getElementById('hero-section');
    const glow = document.getElementById('hero-glow');
    if (!section || !glow) return;
    const handler = (e) => {
        const rect = section.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        glow.style.left = x + 'px';
        glow.style.top = y + 'px';
        glow.classList.add('active');
    };
    section.addEventListener('mousemove', handler);
    section.addEventListener('mouseleave', () => glow.classList.remove('active'));
    if (window._spotlightCleanup) window._spotlightCleanup();
    window._spotlightCleanup = () => {
        section.removeEventListener('mousemove', handler);
    };
}

function initMagneticButtons() {
    document.querySelectorAll('.magnetic-btn').forEach(btn => {
        const handler = (e) => {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            btn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px)`;
        };
        const reset = () => { btn.style.transform = ''; };
        btn.addEventListener('mousemove', handler);
        btn.addEventListener('mouseleave', reset);
        btn.addEventListener('click', (e) => {
            const ripple = document.createElement('span');
            ripple.className = 'btn-ripple';
            const rect = btn.getBoundingClientRect();
            ripple.style.left = (e.clientX - rect.left) + 'px';
            ripple.style.top = (e.clientY - rect.top) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    });
}

function initParallaxLayers() {
    const section = document.getElementById('hero-section');
    if (!section) return;
    const layers = section.querySelectorAll('.parallax-layer');
    const handler = (e) => {
        const rect = section.getBoundingClientRect();
        const x = (e.clientX - rect.left - rect.width / 2) / rect.width;
        const y = (e.clientY - rect.top - rect.height / 2) / rect.height;
        layers.forEach(layer => {
            const depth = parseFloat(layer.dataset.depth || 0.02);
            const moveX = x * depth * 100;
            const moveY = y * depth * 100;
            layer.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    };
    section.addEventListener('mousemove', handler);
    if (window._parallaxCleanup) window._parallaxCleanup();
    window._parallaxCleanup = () => section.removeEventListener('mousemove', handler);
}

function initMockup3D() {
    const mockup = document.getElementById('mockup-3d');
    if (!mockup) return;
    const parent = mockup.parentElement;
    const handler = (e) => {
        const rect = parent.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        mockup.style.transform = `perspective(1200px) rotateX(${-y * 6}deg) rotateY(${x * 6}deg)`;
    };
    const reset = () => { mockup.style.transform = 'perspective(1200px) rotateX(2deg)'; };
    parent.addEventListener('mousemove', handler);
    parent.addEventListener('mouseleave', reset);
    if (window._mockup3DCleanup) window._mockup3DCleanup();
    window._mockup3DCleanup = () => {
        parent.removeEventListener('mousemove', handler);
        parent.removeEventListener('mouseleave', reset);
    };
}

function initSectionOrchestrator() {
    const sections = document.querySelectorAll('.section-orchestrated');
    if (!sections.length || !('IntersectionObserver' in window)) {
        sections.forEach(s => s.classList.add('in-view'));
        return;
    }
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('in-view');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
    sections.forEach(s => observer.observe(s));
    // Also init scale-entrance
    document.querySelectorAll('.scale-entrance').forEach(el => {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('in-view'); obs.unobserve(entry.target); }
            });
        }, { threshold: 0.1 });
        obs.observe(el);
    });
}

// ===== HERO PARTICLE CANVAS =====
function initHeroParticles() {
    const canvas = document.getElementById('hero-particles');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let w, h, particles = [], animId;
    function resize() {
        const parent = canvas.parentElement;
        if (!parent) return;
        w = canvas.width = parent.offsetWidth;
        h = canvas.height = parent.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    // Create particles
    for (let i = 0; i < 50; i++) {
        particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 2 + 0.5,
            dx: (Math.random() - 0.5) * 0.4,
            dy: (Math.random() - 0.5) * 0.4,
            opacity: Math.random() * 0.3 + 0.1
        });
    }
    function draw() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
            p.x += p.dx;
            p.y += p.dy;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
            ctx.fill();
        });
        // Draw connections
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(255,255,255,${0.06 * (1 - dist / 120)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
        animId = requestAnimationFrame(draw);
    }
    draw();
    // Cleanup on page change
    const origRoute = window._routeHandler;
    const cleanup = () => {
        cancelAnimationFrame(animId);
        window.removeEventListener('resize', resize);
    };
    // Store cleanup for next route
    if (window._particleCleanup) window._particleCleanup();
    window._particleCleanup = cleanup;
}

function animateCounters() { // F69
    const counters = document.querySelectorAll('[data-count]');
    counters.forEach(el => {
        const target = el.dataset.count;
        if (target === 'unlimited') return;
        let current = 0;
        const step = Math.ceil(parseInt(target) / 40);
        const timer = setInterval(() => {
            current += step;
            if (current >= parseInt(target)) { current = parseInt(target); clearInterval(timer); }
            el.textContent = current.toLocaleString();
        }, 30);
    });
}

// ===== SCROLL REVEAL (IntersectionObserver) =====
function initScrollReveal() {
    const elements = document.querySelectorAll('.sr, .sr-left, .sr-right, .sr-scale');
    if (!elements.length) return;
    if (!('IntersectionObserver' in window)) { elements.forEach(el => el.classList.add('revealed')); return; }
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('revealed');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    elements.forEach(el => observer.observe(el));
}

// ===== FILE LIST (integrated with ALL enhancements) =====
function renderFileList() {
    const container = document.getElementById('file-list-container');
    if (!container) return;
    let files = getFilteredFiles();

    // Sort
    files.sort((a, b) => {
        // Pinned first
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        // Custom order
        const orderA = APP.customOrder[a.id] ?? 99999;
        const orderB = APP.customOrder[b.id] ?? 99999;
        if (orderA !== orderB) return orderA - orderB;
        // Sort field
        let cmp = 0;
        if (APP.sortBy === 'date') cmp = (b.uploadedAt || 0) - (a.uploadedAt || 0);
        else if (APP.sortBy === 'name') cmp = (a.name || '').localeCompare(b.name || '');
        else if (APP.sortBy === 'size') cmp = (b.size || 0) - (a.size || 0);
        return APP.sortOrder === 'asc' ? -cmp : cmp;
    });

    if (files.length === 0) {
        container.innerHTML = renderEmptyState();
        return;
    }

    if (APP.currentView === 'grid') {
        container.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">
            ${files.map((f, i) => renderFileGridItem(f, i)).join('')}
        </div>`;
    } else {
        container.innerHTML = `
            <div style="border:1px solid var(--border);border-radius:14px;overflow:hidden">
                ${files.map((f, i) => renderFileListRow(f, i)).join('')}
            </div>`;
    }
    updateQuickActions();
}

function getFilteredFiles() {
    let files = [...APP.files];

    // Folder filter
    if (APP.currentFolder === 'all') {
        files = files.filter(f => !f.trashed);
    } else if (APP.currentFolder === 'recent') {
        files = files.filter(f => !f.trashed).sort((a, b) => (b.uploadedAt || 0) - (a.uploadedAt || 0)).slice(0, 20);
    } else if (APP.currentFolder === 'favorites') {
        files = files.filter(f => f.starred && !f.trashed);
    } else if (APP.currentFolder === 'trash') {
        files = files.filter(f => f.trashed);
    } else {
        files = files.filter(f => f.folderId === APP.currentFolder && !f.trashed);
    }

    // Quick filter (F65)
    if (APP.quickFilter === 'today') files = files.filter(f => isToday(f.uploadedAt));
    else if (APP.quickFilter === 'thisWeek') files = files.filter(f => isThisWeek(f.uploadedAt));
    else if (APP.quickFilter === 'large') files = files.filter(f => f.size > 10 * 1024 * 1024);
    else if (APP.quickFilter === 'pinned') files = files.filter(f => f.pinned);
    else if (APP.quickFilter === 'encrypted') files = files.filter(f => f.encrypted);

    // Type filter
    if (APP.filterType !== 'all') {
        files = files.filter(f => getFileType(f.name, f.mime) === APP.filterType);
    }

    // Deep search (F54)
    if (APP.searchQuery) {
        const q = APP.searchQuery.toLowerCase();
        files = files.filter(f =>
            (f.name || '').toLowerCase().includes(q) ||
            (f.caption || '').toLowerCase().includes(q) ||
            (f.folderId || '').toLowerCase().includes(q) ||
            getFileType(f.name, f.mime).includes(q)
        );
    }

    return files;
}

// ===== FILE CLICK HANDLER (F91 shift+click) =====
function handleFileClick(e, fileId, index) {
    if (APP.batchMode || e.shiftKey) {
        e.preventDefault();
        if (e.shiftKey && APP.lastSelectedIndex >= 0) {
            // F91: Range select
            const files = getFilteredFiles();
            const start = Math.min(APP.lastSelectedIndex, index);
            const end = Math.max(APP.lastSelectedIndex, index);
            for (let i = start; i <= end; i++) {
                if (files[i]) APP.selectedFiles.add(files[i].id);
            }
        } else {
            if (APP.selectedFiles.has(fileId)) APP.selectedFiles.delete(fileId);
            else APP.selectedFiles.add(fileId);
        }
        APP.lastSelectedIndex = index;
        renderFileList();
    } else if (e.detail === 2) {
        // Double click → preview
        openPreview(fileId);
    } else {
        // Single click → detail panel
        openDetailPanel(fileId);
    }
}

// ===== DRAG & DROP (F46, F86) =====
let draggedFileId = null;
function handleDragStart(e, fileId) {
    draggedFileId = fileId;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', fileId);
}
function handleFolderDrop(e, folderId) {
    e.preventDefault();
    if (!draggedFileId) return;
    moveFileToFolder(draggedFileId, folderId);
    draggedFileId = null;
}
function handleDragReorder(e, index) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}
function handleDropReorder(e, targetId) {
    e.preventDefault();
    if (!draggedFileId || draggedFileId === targetId) return;
    const targetIdx = APP.files.findIndex(f => f.id === targetId);
    if (targetIdx >= 0) {
        APP.customOrder[draggedFileId] = targetIdx;
        localStorage.setItem('rb_custom_order', JSON.stringify(APP.customOrder));
    }
    draggedFileId = null;
    renderFileList();
}
function setupDragDrop() {
    const zone = document.getElementById('drop-zone');
    const container = document.getElementById('file-list-container');
    if (!container) return;
    ['dragenter', 'dragover'].forEach(ev => {
        container.addEventListener(ev, (e) => {
            e.preventDefault();
            if (zone) zone.style.display = 'block';
            if (zone) zone.classList.add('drag-over');
        });
    });
    ['dragleave', 'drop'].forEach(ev => {
        container.addEventListener(ev, (e) => {
            if (e.target === container || !container.contains(e.relatedTarget)) {
                if (zone) zone.style.display = 'none';
                if (zone) zone.classList.remove('drag-over');
            }
        });
    });
    container.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
            handleFileSelect(e.dataTransfer.files);
        }
    });
}


// ===== UPLOAD (F3, F10, F11, F76, F79, F81, F89, F93, F103) =====
function triggerUpload() {
    const inp = document.getElementById('file-upload-input');
    if (inp) inp.click();
}

async function handleFileSelect(fileList) {
    if (!fileList || fileList.length === 0) return;
    for (const file of fileList) {
        await executeUpload(file);
    }
    const inp = document.getElementById('file-upload-input');
    if (inp) inp.value = '';
}

async function executeUpload(file, folderParam) {
    const bot = APP.bots[0];
    if (!bot) { showToast(t('uploadError') + ': No bot configured', 'error'); return; }

    APP.activeUploads++;
    updateGlobalProgress();

    try {
        let fileData = file;
        let fileName = file.name;
        let fileSize = file.size;
        let mimeType = file.type || 'application/octet-stream';
        let isEncrypted = false;

        // F11: Encrypt if enabled
        if (APP.settings.encryption) {
            const buffer = await file.arrayBuffer();
            const encData = await encryptData(buffer, 'ridgebox_' + bot.chatId);
            fileData = new Blob([encData], { type: 'application/octet-stream' });
            fileName += '.enc';
            isEncrypted = true;
        }

        // F81: Check for versioning (same name in same folder)
        const folderId = folderParam || APP.currentFolder;
        const existing = APP.files.filter(f => f.name === file.name && f.folderId === folderId && !f.trashed);
        const version = existing.length + 1;

        // F76: Proxy mode vs direct
        let result;
        if (APP.settings.proxyMode !== false) {
            // Upload via server proxy
            const formData = new FormData();
            formData.append('document', fileData, fileName);
            formData.append('bot_index', bot.index);
            if (folderParam) formData.append('chat_id', bot.chatId);

            const resp = await fetch('/api/upload', { method: 'POST', body: formData });
            result = await resp.json();
        } else {
            // Direct upload to Telegram
            const formData = new FormData();
            formData.append('chat_id', bot.chatId);
            formData.append('document', fileData, fileName);
            const resp = await fetch(`https://api.telegram.org/bot${bot.token}/sendDocument`, { method: 'POST', body: formData });
            result = await resp.json();
        }

        if (result.ok || (result.result && result.result.message_id)) {
            const msg = result.result;
            const doc = msg.document || msg.photo?.[msg.photo.length - 1] || msg.video || msg.audio || msg.animation;
            const fileId = doc?.file_id || genId();
            // Telegram sendDocument doesn't return file_path — must call getFile API separately
            let filePath = '';
            try {
                const fileResp = await fetch('/api/file-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: fileId, bot_index: bot.index || '0' })
                });
                const fileData = await fileResp.json();
                if (fileData.ok && fileData.result && fileData.result.file_path) {
                    filePath = fileData.result.file_path;
                }
            } catch(e) { console.warn('getFile failed:', e); }

            // F103: Auto-tag by file type
            const fileType = getFileType(fileName, mimeType);
            const autoTag = getAutoTagColor(fileType);

            const meta = {
                id: genId(),
                name: file.name,
                size: fileSize,
                mime: mimeType,
                fileId: fileId,
                filePath: filePath,
                messageId: msg.message_id || null,
                botIndex: bot.index || '0',
                chatId: bot.chatId,
                folderId: folderId === 'all' || folderId === 'recent' || folderId === 'favorites' || folderId === 'trash' ? null : folderId,
                uploadedAt: Date.now(),
                pinned: false,
                starred: false,
                trashed: false,
                encrypted: isEncrypted,
                version: version,
                tag: autoTag,
                caption: '',
                shareCount: 0
            };

            await saveFile(meta);
            APP.files.push(meta);
            showToast(t('uploaded'), 'success');
            sendNotification('Ridgebox', `${file.name} ${t('uploaded').toLowerCase()}`);
            renderFileList();
            const _glowC = document.getElementById('file-list-container');
            if (_glowC) { _glowC.classList.add('success-glow'); setTimeout(() => _glowC.classList.remove('success-glow'), 1000); }
            const sidebar = document.getElementById('sidebar-panel');
            if (sidebar) sidebar.innerHTML = renderSidebarHTML();
        } else {
            showToast(t('uploadError') + ': ' + (result.description || 'Unknown error'), 'error');
        }
    } catch (err) {
        showToast(t('uploadError') + ': ' + err.message, 'error');
    } finally {
        APP.activeUploads--;
        updateGlobalProgress();
    }
}

function updateGlobalProgress() { // F93
    const bar = document.getElementById('global-progress-bar');
    if (!bar) return;
    if (APP.activeUploads === 0) {
        bar.style.width = '0';
    } else {
        bar.style.width = Math.min(90, APP.activeUploads * 30) + '%';
        setTimeout(() => { if (APP.activeUploads === 0) bar.style.width = '0'; }, 1000);
    }
}

            const doc = result.result?.document || result.result?.photo?.[0];

                const fileResp = await fetch('/api/file-info', {

                });
                const fileData = await fileResp.json();

                }
            } catch(e) { console.warn('getFile failed:', e); }

                id: genId(),
                name: name || url.split('/').pop() || 'download',
                size: 0,
                mime: 'application/octet-stream',

                chatId: APP.bots[0]?.chatId || '',
                folderId: APP.currentFolder === 'all' ? null : APP.currentFolder,
                uploadedAt: Date.now(),
                pinned: false, starred: false, trashed: false, encrypted: false,
                version: 1, tag: getAutoTagColor('other'), caption: '', shareCount: 0
            };
            await saveFile(meta);

function openCameraUpload() {
    openModal(`
        <div style="padding:24px">
            <h3 style="font-size:18px;font-weight:600;margin-bottom:16px"><i class="fas fa-camera" style="color:var(--accent)"></i> ${t('cameraCapture')}</h3>
            <video id="camera-preview" autoplay playsinline style="width:100%;border-radius:8px;background:#000;margin-bottom:12px"></video>
            <canvas id="camera-canvas" style="display:none"></canvas>
            <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px">
                <button class="btn btn-primary" onclick="capturePhoto()"><i class="fas fa-camera"></i> ${t('takePhoto')}</button>
                <button class="btn btn-secondary" id="record-btn" onclick="toggleRecording()"><i class="fas fa-video"></i> ${t('startRecording')}</button>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button class="btn btn-secondary" onclick="closeCamera();closeModal()">${t('close')}</button>
            </div>
        </div>`);
    startCamera();
