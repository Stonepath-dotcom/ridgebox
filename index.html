// ===== DOWNLOAD =====
// Helper: Save blob to device storage (Downloads folder on phone)
// Direct download — navigates browser to API URL with Content-Disposition: attachment
// This forces the browser to save the file directly to phone storage (like MediaFire)
// instead of opening/previewing it in the browser
function directDownload(url, fileName) {
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName || '';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { a.remove(); }, 1000);
}

async function saveToDevice(blob, fileName) {
    // Method 1: File System Access API (Chrome/Edge desktop) — saves directly to Downloads
    if (window.showSaveFilePicker) {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: fileName,
                types: blob.type ? [{ description: 'File', accept: { [blob.type]: ['.' + fileName.split('.').pop()] } }] : []
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return true;
        } catch (e) {
            if (e.name === 'AbortError') return false;
            console.warn('showSaveFilePicker failed, falling back:', e);
        }
    }
    // Method 2: Navigator msSaveBlob (IE/Edge legacy)
    if (navigator.msSaveBlob) {
        try {
            navigator.msSaveBlob(blob, fileName);
            return true;
        } catch(e) { console.warn('msSaveBlob failed:', e); }
    }
    // Method 3: <a download> with blob URL
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 5000);
    return true;
}

async function downloadFile(fileId) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) return;
    const isId = APP.lang === 'id';
    logActivity('download', (isId?'Mengunduh':'Downloaded') + ' ' + file.name);
    try {
        // Google Drive files — download via GDrive provider
        if (file.storageProvider === 'gdrive' && file.driveFileId) {
            const account = APP.gdriveAccounts.find(a => a.id === file.providerAccountId);
            if (!account || account.status !== 'connected') {
                // Try to find any connected account
                const anyAccount = APP.gdriveAccounts.find(a => a.status === 'connected');
                if (!anyAccount) { showToast(isId ? 'Akun Google Drive tidak tersedia. Hubungkan ulang.' : 'Google Drive account unavailable. Please reconnect.', 'warning'); return; }
            }
            const activeAccount = APP.gdriveAccounts.find(a => a.id === file.providerAccountId && a.status === 'connected') || APP.gdriveAccounts.find(a => a.status === 'connected');
            const accessToken = await APP.storageProviders.gdrive.getAccessToken(activeAccount.id);
            if (!accessToken) { showToast(isId ? 'Gagal memperoleh token akses' : 'Failed to obtain access token', 'error'); return; }
            const dlUrl = `/api/gdrive/download?accessToken=${encodeURIComponent(accessToken)}&fileId=${encodeURIComponent(file.driveFileId)}`;
            directDownload(dlUrl, file.name);
            showToast(t('download') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
            logActivity('download', `${isId?'Mengunduh':'Downloaded'} ${file.name} (Google Drive)`);
            return;
        }

        // Resolve filePath if missing
        if (!file.filePath && file.fileId) {
            try {
                const fileResp = await fetch('/api/file-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: file.fileId, bot_index: file.botIndex || '0' })
                });
                const fileData = await fileResp.json();
                if (fileData.ok && fileData.result && fileData.result.file_path) {
                    file.filePath = fileData.result.file_path;
                    await saveFile(file);
                }
            } catch(e) { console.warn('getFile resolve failed:', e); }
        }

        // If file is encrypted, we must fetch+blob+decrypt first
        if (file.encrypted) {
            let url;
            if (APP.settings.proxyMode !== false) {
                url = '/api/download?path=' + encodeURIComponent(file.filePath) + '&bot_index=' + file.botIndex + '&name=' + encodeURIComponent(file.name);
            } else {
                url = 'https://api.telegram.org/file/bot' + (APP.bots[0]?.token||'') + '/' + file.filePath;
            }
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Download failed');
            let blob = await resp.blob();
            try {
                const encData = new Uint8Array(await blob.arrayBuffer());
                const decData = await decryptData(encData, 'ridgebox_' + file.chatId);
                blob = new Blob([decData]);
            } catch(e) { console.warn('Decrypt failed, returning raw file'); }
            await saveToDevice(blob, file.name);
            showToast(t('download') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
            return;
        }

        // Non-encrypted: Direct download — browser navigates to API URL which has
        // Content-Disposition: attachment → file saves directly to phone Downloads folder
        // This is the MediaFire-style experience: click → save, no preview
        // Always use proxy API for downloads — the Content-Disposition: attachment header
        // forces the browser to save the file. Telegram direct URLs don't have this header
        // and would open the file in the browser instead.
        const dlUrl = '/api/download?path=' + encodeURIComponent(file.filePath) + '&bot_index=' + file.botIndex + '&name=' + encodeURIComponent(file.name);
        directDownload(dlUrl, file.name);
        showToast(t('download') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
        logActivity('download', `${APP.lang==='id'?'Mengunduh':'Downloaded'} ${file.name}`);
    } catch (err) {
        showToast('Download error: ' + err.message, 'error');
    }
}

async function bulkDelete() {
    const fileCount = APP.selectedFiles.size;
    showConfirm(
        APP.lang === 'id' ? `Hapus ${fileCount} File?` : `Delete ${fileCount} Files?`,
        APP.lang === 'id' ? 'File akan dipindahkan ke sampah.' : 'Files will be moved to trash.',
        async () => {
            const trashedIds = new Set();
            for (const id of APP.selectedFiles) {
                const file = APP.files.find(f => f.id === id);
                if (file) {
                    file.trashed = true;
                    file.trashedAt = Date.now();
                    await saveFile(file);
                    trashedIds.add(id);
                }
            }
            // Remove trashed files from APP.files
            APP.files = APP.files.filter(f => !trashedIds.has(f.id));
            APP.selectedFiles.clear();
            APP.batchMode = false;
            closeDetailPanel();
            closeContextMenu();
            showUndoToast(t('movedToTrash'), async () => {
                // Undo: restore all files that were just trashed
                for (const id of trashedIds) {
                    await restoreFile(id);
                }
                showToast(APP.lang === 'id' ? 'File dipulihkan' : 'Files restored', 'success');
            });
            await refreshUI();
        },
        true
    );
}

async function bulkDownloadZip() { // F83
    if (typeof JSZip === 'undefined') { showToast('JSZip not loaded', 'error'); return; }
    const zip = new JSZip();
    let count = 0;
    for (const id of APP.selectedFiles) {
        const file = APP.files.find(f => f.id === id);
        if (!file) continue;
        try {
            const url = APP.settings.proxyMode !== false
                ? `/api/download?path=${encodeURIComponent(file.filePath)}&bot_index=${file.botIndex}&name=${encodeURIComponent(file.name)}`
                : `https://api.telegram.org/file/bot${APP.bots[0]?.token}/${file.filePath}`;
            const resp = await fetch(url);
            if (resp.ok) {
                const blob = await resp.blob();
                zip.file(file.name, blob);
                count++;
            }
        } catch(e) { console.warn('Skip file', file.name); }
    }
    if (count > 0) {
        const content = await zip.generateAsync({ type: 'blob' });
        await saveToDevice(content, `ridgebox_${Date.now()}.zip`);
        showToast(`${count} files <i class="fas fa-file-archive" style="font-size:11px"></i> ZIP`, 'success');
    }
    APP.selectedFiles.clear();
    renderFileList();
}

function openShareModal(fileId) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) return;
    closeContextMenu();
    logActivity('share', `${APP.lang==='id'?'Membagikan':'Shared'} ${file.name}`);
    const existingShares = APP.shares.filter(s => s.fileId === fileId && s.type !== 'gallery');
    // Generate cross-device share URL with encoded file info
    let shareUrl = '';
    if (existingShares.length > 0) {
        const s = existingShares[0];
        const payload = {
            fn: file.name, fs: file.size, fm: file.mime || '',
            fp: file.filePath || '', fi: file.fileId || '', bi: file.botIndex || '0',
            ci: file.chatId || '', pw: s.password || '',
            ex: s.expiry || 0, sd: s.selfDestruct ? 1 : 0,
            pm: s.permission || 'download',
            sid: s.id, enc: file.encrypted ? 1 : 0,
            ca: file.caption || '', al: s.alias || ''
        };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
        shareUrl = `${location.origin}${location.pathname}#/s/${encoded}`;
    }
    // Store share URL in a global for safe copy
    window._currentShareUrl = shareUrl;
    window._currentShareFileId = fileId;
    // Compute analytics
    const totalShares = existingShares.length;
    const totalDownloads = existingShares.reduce((sum, s) => sum + (s.downloadCount || 0), 0);
    const totalClicks = existingShares.reduce((sum, s) => sum + (s.clicks || 0), 0);
    const lastAccessed = existingShares.reduce((max, s) => Math.max(max, s.lastAccess || s.lastAccessedAt || 0), 0);
    const activeLinks = existingShares.filter(s => !s.expiry || s.expiry > Date.now()).length;
    const expiredLinks = totalShares - activeLinks;

    // Helper: get expiry badge for a share
    function getExpiryBadge(s) {
        if (!s.expiry || s.expiry === 0) return `<span class="expiry-badge never"><i class="fas fa-infinity" style="font-size:8px"></i> ${t('never')}</span>`;
        const remaining = s.expiry - Date.now();
        if (remaining <= 0) return `<span class="expiry-badge expired"><i class="fas fa-clock" style="font-size:8px"></i> ${t('expired')}</span>`;
        const hrs = Math.floor(remaining / 3600000);
        const mins = Math.floor((remaining % 3600000) / 60000);
        const days = Math.floor(remaining / 86400000);
        let timeStr = '';
        if (days > 0) timeStr = days + 'd ' + Math.floor((remaining % 86400000) / 3600000) + 'h';
        else if (hrs > 0) timeStr = hrs + 'h ' + mins + 'm';
        else timeStr = mins + 'm';
        const badgeClass = remaining < 3600000 ? 'expiring' : 'active';
        return `<span class="expiry-badge ${badgeClass}"><i class="fas fa-clock" style="font-size:8px"></i> ${timeStr}</span>`;
    }

    openModal(`
        <div style="padding:24px">

                        <div style="display:flex;gap:6px">

                            <button class="btn btn-primary btn-sm" onclick="copyShareLink(window._currentShareUrl)"><i class="fas fa-copy"></i></button>

async function createShareLink(fileId) {
    const password = document.getElementById('share-password')?.value || '';
    const expiry = parseInt(document.getElementById('share-expiry')?.value || '0');
    const selfDestruct = document.getElementById('share-selfdestruct')?.checked || false;
    const permission = document.getElementById('share-permission')?.value || 'download';
    const alias = document.getElementById('share-alias')?.value.trim() || genId().substring(0, 8);
    const file = APP.files.find(f => f.id === fileId);
    if (!file) { showToast('File not found', 'error'); return; }
    const share = {
        id: genId(),
        fileId: fileId,
        alias: alias,
        password: password ? await hashPin(password) : '',
        expiry: expiry > 0 ? Date.now() + expiry * 3600000 : 0,
        expiresAt: expiry > 0 ? Date.now() + expiry * 3600000 : 0,
        selfDestruct: selfDestruct,
        permission: permission,
        clicks: 0,
        downloadCount: 0,
        lastAccess: null,
        lastAccessedAt: null,
        createdAt: Date.now()
    };
    await saveShare(share);
    APP.shares.push(share);
    if (file) { file.shareCount = (file.shareCount || 0) + 1; await saveFile(file); }
    triggerWebhook('file.shared', { fileId, fileName: file.name, fileSize: file.size, shareId: share.id, permission });
    // Encode file info into the share URL so it works cross-device
    const payload = {
        fn: file.name,
        fs: file.size,
        fm: file.mime || '',
        fp: file.filePath || '',
        fi: file.fileId || '',
        bi: file.botIndex || '0',
        ci: file.chatId || '',
        pw: share.password,
        ex: share.expiry,
        sd: selfDestruct ? 1 : 0,
        pm: permission,
        sid: share.id,
        enc: file.encrypted ? 1 : 0,
        ca: file.caption || '',
        al: alias
    };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const url = `${location.origin}${location.pathname}#/s/${encoded}`;
    closeModal();
    openShareModal(fileId);
    copyShareLink(url);
    showToast(t('shareCreated'), 'success');
}

function copyShareLink(url) {
    navigator.clipboard.writeText(url).then(() => showToast(t('linkCopied'), 'success')).catch(() => showToast(t('linkCopied'), 'info'));
}

// ===== SHARE PORTAL (F5, F6, F78, F88) =====
function decodeSharePayload(raw) {
    try {
        const json = decodeURIComponent(escape(atob(raw)));
        const p = JSON.parse(json);
        return {
            isEncoded: true,
            name: p.fn || 'Unknown',
            size: p.fs || 0,
            mime: p.fm || '',
            filePath: p.fp || '',
            fileId: p.fi || '',
            botIndex: p.bi || '0',
            chatId: p.ci || '',
            password: p.pw || '',
            expiry: p.ex || 0,
            selfDestruct: p.sd === 1,
            permission: p.pm || 'download',
            id: p.sid || raw.substring(0, 8),
            encrypted: p.enc === 1,
            caption: p.ca || '',
            alias: p.al || ''
        };
    } catch (e) {
        return null;
    }
}

        // New format: data is embedded in URL
        share = shareData;
        file = {
            name: shareData.name,
            size: shareData.size,
            mime: shareData.mime,
            filePath: shareData.filePath,
            fileId: shareData.fileId,
            botIndex: shareData.botIndex,
            chatId: shareData.chatId,
            encrypted: shareData.encrypted,
            caption: shareData.caption

async function verifySharePassword(shareId) {
    // Support both local IndexedDB shares and cross-device encoded shares
    let share = APP.shares.find(s => s.id === shareId);
    if (!share && window._shareVerifyData) {
        share = window._shareVerifyData;
    }
    if (!share) return;
    const input = document.getElementById('share-pw-input');
    const errEl = document.getElementById('share-pw-error');
    if (!input) return;
    const hashed = await hashPin(input.value);
    if (hashed === share.password) {
        // Build file object from encoded share data or find in local files
        let file;
        if (share.isEncoded || window._shareVerifyData) {
            file = {
                name: share.name || 'Unknown',
                size: share.size || 0,
                mime: share.mime || '',
                filePath: share.filePath || '',
                botIndex: share.botIndex || '0',
                chatId: share.chatId || '',
                encrypted: share.encrypted || false,
                caption: share.caption || ''
            };
        } else {
            file = APP.files.find(f => f.id === share.fileId);
        }
        if (file) renderShareDownload(share, file);
    } else {
        if (errEl) errEl.style.display = 'block';
        input.value = '';
    }
}

// Download file from share portal (cross-device, uses filePath with fileId fallback)
async function downloadSharedFile(encodedPath, encodedFileId, botIndex, encodedName, encrypted, chatId, shareId) {
    let filePath = decodeURIComponent(encodedPath);
    const fileId = decodeURIComponent(encodedFileId);
    const fileName = decodeURIComponent(encodedName);
    try {
        // Build download URL — always include name for Content-Disposition: attachment
        let url;
        if (filePath) {
            url = '/api/download?path=' + encodeURIComponent(filePath) + '&bot_index=' + botIndex + '&name=' + encodeURIComponent(fileName);
        } else if (fileId) {
            url = '/api/download?file_id=' + encodeURIComponent(fileId) + '&bot_index=' + botIndex + '&name=' + encodeURIComponent(fileName);
        } else {
            throw new Error('No file path or ID available');
        }

        // If encrypted, must fetch+blob+decrypt
        if (encrypted) {
            const resp = await fetch(url);
            if (!resp.ok) {
                const errData = await resp.json().catch(() => ({}));
                throw new Error(errData.error || 'Download failed (' + resp.status + ')');
            }
            let blob = await resp.blob();
            try {
                const encData = new Uint8Array(await blob.arrayBuffer());
                const decData = await decryptData(encData, 'ridgebox_' + chatId);
                blob = new Blob([decData]);
            } catch(e) { console.warn('Decrypt failed, returning raw file'); }
            await saveToDevice(blob, fileName);
            showToast(t('download') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
            return;
        }

        // Non-encrypted: Direct download — MediaFire style, click → save to phone
        directDownload(url, fileName);
        // Increment download count for the share
        incrementShareDownloadCount(shareId);
        showToast(t('download') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
    } catch (err) {
        showToast('Download error: ' + err.message, 'error');
    }
}

// Download a local file and track share download count

    await downloadFile(fileId);

// Increment downloadCount on a share record
function incrementShareDownloadCount(shareId) {
    if (!shareId) return;
    const localShare = APP.shares.find(s => s.id === shareId);
    if (localShare) {
        localShare.downloadCount = (localShare.downloadCount || 0) + 1;
        localShare.lastAccessedAt = Date.now();
        localShare.lastAccess = Date.now();
        saveShare(localShare);
        const file = APP.files.find(f => f.id === localShare.fileId);
        sendNotification('Ridgebox', APP.lang==='id'?`Link bagikan "${file?.name||'file'}" diakses`:`Share link for "${file?.name||'file'}" accessed`);
    }
}

async function fetchCodePreview(file, url) {
    try {
        const resp = await fetch(url);
        const text = await resp.text();
        const container = document.getElementById('code-preview');
        if (!container) return;
        if (file.name.endsWith('.md')) {
            // F100: Simple markdown rendering
            container.innerHTML = renderMarkdown(text);
            container.style.fontFamily = "'Space Grotesk', sans-serif";
        } else {
            container.textContent = text.substring(0, 50000);
        }
    } catch (e) {
        const container = document.getElementById('code-preview');
        if (container) container.textContent = 'Failed to load preview';
    }
}

function renderMarkdown(md) { // F100
    let html = md
        .replace(/^### (.+)$/gm, '<h3 style="font-size:16px;font-weight:600;margin:12px 0 4px">$1</h3>')
        .replace(/^## (.+)$/gm, '<h2 style="font-size:18px;font-weight:700;margin:16px 0 6px">$1</h2>')
        .replace(/^# (.+)$/gm, '<h1 style="font-size:22px;font-weight:700;margin:20px 0 8px">$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code style="background:var(--bg);padding:2px 4px;border-radius:3px;font-family:JetBrains Mono,monospace;font-size:12px">$1</code>')
        .replace(/^- (.+)$/gm, '<li style="margin-left:16px">$1</li>')
        .replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid var(--accent);padding-left:12px;color:var(--text-secondary)">$1</blockquote>')
        .replace(/\n/g, '<br>');
    return html;
}

function generateWaveform(audioEl) { // F63
    const container = document.getElementById('waveform-container');
    if (!container || !audioEl) return;
    const barCount = 50;
    container.innerHTML = '';
    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'waveform-bar';
        bar.style.height = Math.random() * 40 + 10 + 'px';
        container.appendChild(bar);
    }
    // Animate waveform on play
    audioEl.addEventListener('play', () => {
        const bars = container.querySelectorAll('.waveform-bar');
        const animate = () => {
            if (audioEl.paused) return;
            bars.forEach(bar => { bar.style.height = Math.random() * 50 + 5 + 'px'; });
            requestAnimationFrame(animate);
        };
        animate();
    });
}

async function updateSetting(key, value) {
    APP.settings[key] = value;
    await saveSetting(key, value);
    showToast(t('save'), 'success');
}

function updateStorageLimit(gb) {
    localStorage.setItem('rb_storage_limit_gb', gb);
    localStorage.removeItem('rb_storage_warning_dismissed'); // Reset dismissal on limit change
    showToast(APP.lang==='id'?'Batas penyimpanan diperbarui':'Storage limit updated', 'success');
}

    // Legacy - now handled by startPinCreate / checkPin flow
}
async function removePinLock() {
    APP.settings.pinLock = '';
    await saveSetting('pinLock', '');

    openSettings();

async function createCollaborativeFolder() { // F104
    showPrompt(
        APP.lang==='id'?'Folder Kolaboratif':'Collaborative Folder',
        APP.lang==='id'?'Nama folder kolaboratif:':'Collaborative folder name:',
        async (name) => {
            if (!name) return;
            const shareToken = genId();
            const folder = { id: genId(), name, icon: 'fa-users', system: false, shareToken };
            await saveFolder(folder);
            APP.folders.push(folder);
            const shareUrl = `${location.origin}${location.pathname}#/upload/${shareToken}`;
            closeModal();
            copyShareLink(shareUrl);
            showToast(t('shareCreated'), 'success');
            const sidebar = document.getElementById('sidebar-panel');
            if (sidebar) sidebar.innerHTML = renderSidebarHTML();
        }
    );
}

function scheduleUpload() { // F80
    const timeInput = document.getElementById('scheduled-time');
    if (!timeInput || !timeInput.value) return;
    const scheduledTime = new Date(timeInput.value).getTime();
    if (scheduledTime <= Date.now()) { showToast(APP.lang==='id'?'Waktu harus di masa depan':'Time must be in the future', 'warning'); return; }
    const delay = scheduledTime - Date.now();
    const timerId = setTimeout(() => {
        showToast(APP.lang==='id'?'Unggah terjadwal siap!':'Scheduled upload ready!', 'info');
        sendNotification('Ridgebox', APP.lang==='id'?'Unggah terjadwal siap':'Scheduled upload ready');
    }, delay);
    APP.scheduledUploads.push({ id: genId(), time: scheduledTime, timerId });
    localStorage.setItem('rb_scheduled', JSON.stringify(APP.scheduledUploads.map(s => ({ id: s.id, time: s.time }))));
    showToast(t('scheduledUpload') + ' <i class="fas fa-check" style="font-size:11px"></i>', 'success');
}

function restoreScheduledUploads() { // F80
    try {
        const saved = JSON.parse(localStorage.getItem('rb_scheduled') || '[]');
        saved.forEach(s => {
            const delay = s.time - Date.now();
            if (delay > 0) {
                const timerId = setTimeout(() => {
                    showToast(APP.lang==='id'?'Unggah terjadwal siap!':'Scheduled upload ready!', 'info');
                }, delay);
                APP.scheduledUploads.push({ id: s.id, time: s.time, timerId });
            }
        });
    } catch(e) {}
}

// ===== STORAGE ANALYTICS (F85) =====
function openStorageAnalytics() {
    const totalFiles = APP.files.filter(f => !f.trashed).length;
    const totalSize = APP.files.filter(f => !f.trashed).reduce((sum, f) => sum + (f.size || 0), 0);
    const quotaLimit = getStorageLimitBytes();
    const botCount = Math.max(APP.bots.length || 1, 1);
    const isId = APP.lang === 'id';
    const typeStats = {};
    APP.files.filter(f => !f.trashed).forEach(f => {
        const type = getFileType(f.name, f.mime);
        typeStats[type] = (typeStats[type] || 0) + (f.size || 0);
    });
    const topFiles = [...APP.files].filter(f => !f.trashed).sort((a, b) => (b.size || 0) - (a.size || 0)).slice(0, 5);
    const days = {};
    APP.files.forEach(f => {
        const d = new Date(f.uploadedAt).toLocaleDateString(APP.lang === 'id' ? 'id-ID' : 'en-US', { weekday: 'short' });
        days[d] = (days[d] || 0) + 1;
    });

    openModal(`
        <div style="padding:24px;max-width:560px">
            <h3 style="font-size:18px;font-weight:600;margin-bottom:20px"><i class="fas fa-chart-pie" style="color:var(--accent)"></i> ${t('storageAnalytics')}</h3>
            
            <!-- Summary Cards -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:20px">
                <div style="padding:12px;background:var(--bg-secondary);border-radius:8px;text-align:center">
                    <div style="font-size:20px;font-weight:700;color:var(--accent)">${totalFiles}</div>
                    <div style="font-size:11px;color:var(--text-secondary)">${isId?'Total File':'Total Files'}</div>
                </div>
                <div style="padding:12px;background:var(--bg-secondary);border-radius:8px;text-align:center">
                    <div style="font-size:20px;font-weight:700;color:#10b981">${formatSize(totalSize)}</div>
                    <div style="font-size:11px;color:var(--text-secondary)">${t('storage')}</div>
                </div>
                <div style="padding:12px;background:var(--bg-secondary);border-radius:8px;text-align:center">
                    <div style="font-size:20px;font-weight:700;color:#8b5cf6">${formatSize(quotaLimit)}</div>
                    <div style="font-size:11px;color:var(--text-secondary)">${isId?'Kuota':'Quota'}</div>
                </div>
                <div style="padding:12px;background:var(--bg-secondary);border-radius:8px;text-align:center">
                    <div style="font-size:20px;font-weight:700;color:#f59e0b">${botCount}</div>
                    <div style="font-size:11px;color:var(--text-secondary)">${isId?'Bot Aktif':'Active Bots'}</div>
                </div>
            </div>
            <div style="padding:10px 12px;background:var(--bg-secondary);border-radius:8px;margin-bottom:16px;font-size:12px;color:var(--text-secondary)">
                <i class="fas fa-info-circle" style="color:var(--accent)"></i> ${isId?`Kuota: ${botCount} bot × 2 GB = ${formatSize(quotaLimit)}`:`Quota: ${botCount} bot(s) × 2 GB = ${formatSize(quotaLimit)}`}
            </div>

            <!-- Type Distribution (Donut) -->
            <div style="margin-bottom:20px">
                <h4 style="font-size:13px;font-weight:600;margin-bottom:8px">${APP.lang==='id'?'Distribusi Tipe':'Type Distribution'}</h4>
                <div style="display:flex;flex-wrap:wrap;gap:8px">
                    ${Object.entries(typeStats).map(([type, size]) => {
                        const icon = getFileIcon(type);
                        const pct = totalSize > 0 ? Math.round(size / totalSize * 100) : 0;
                        return `<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg-secondary);border-radius:6px;font-size:12px">
                            <i class="fas ${icon.icon}" style="color:${icon.color}"></i>
                            <span>${type}</span>
                            <span style="color:var(--text-secondary)">${pct}%</span>
                            <div style="width:40px;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div class="analytics-bar" style="height:100%;width:0;--bar-w:${pct}%;background:${icon.color};border-radius:2px"></div></div>
                        </div>`;
                    }).join('')}
                </div>
            </div>

            <!-- Activity Heatmap -->
            <div style="margin-bottom:20px">
                <h4 style="font-size:13px;font-weight:600;margin-bottom:8px">${APP.lang==='id'?'Aktivitas':'Activity'}</h4>
                <div style="display:flex;gap:4px;align-items:flex-end">
                    ${Object.entries(days).map(([day, count]) => `
                        <div style="flex:1;text-align:center">
                            <div style="height:${Math.max(4, count * 8)}px;background:var(--accent);border-radius:2px;margin-bottom:4px;opacity:${Math.min(1, count / 5)}"></div>
                            <span style="font-size:9px;color:var(--text-secondary)">${day}</span>
                        </div>
                    `).join('')}
                </div>
            </div>

            <!-- Top Files -->
            <div style="margin-bottom:16px">
                <h4 style="font-size:13px;font-weight:600;margin-bottom:8px">${APP.lang==='id'?'File Terbesar':'Top Files'}</h4>
                ${topFiles.map((f, i) => {
                    const type = getFileType(f.name, f.mime);
                    const icon = getFileIcon(type);
                    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
                        <span style="color:var(--text-secondary);width:16px">${i + 1}</span>
                        <i class="fas ${icon.icon}" style="color:${icon.color};width:14px"></i>
                        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
                        <span style="color:var(--text-secondary)">${formatSize(f.size)}</span>
                    </div>`;
                }).join('')}
            </div>

            <div style="display:flex;justify-content:flex-end">
                <button class="btn btn-secondary" onclick="closeModal()">${t('close')}</button>
            </div>
        </div>`);
}

document.addEventListener('keydown', (e) => {
    const hash = location.hash || '#/';
    if (hash === '#/' && !hash.startsWith('#/dashboard')) return;
    
    // Escape: close modals, panels, context menu
    if (e.key === 'Escape') {
        closeContextMenu();
        closeModal();
        closeDetailPanel();
        if (APP.batchMode) { APP.batchMode = false; renderFileList(); }
    }
    
    // Only handle keyboard nav in file list
    if (!document.getElementById('file-list-container')) return;
    
    const files = getFilteredFiles();
    if (files.length === 0) return;
    
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const currentIdx = APP.lastSelectedIndex;
        const nextIdx = e.key === 'ArrowDown' ? Math.min(currentIdx + 1, files.length - 1) : Math.max(currentIdx - 1, 0);
        if (files[nextIdx]) {
            openDetailPanel(files[nextIdx].id);
            APP.lastSelectedIndex = nextIdx;
        }
    }
    
    if (e.key === 'Enter' && APP.lastSelectedIndex >= 0 && files[APP.lastSelectedIndex]) {
        openPreview(files[APP.lastSelectedIndex].id);
    }
    
    // Ctrl+A: select all
    if (e.key === 'a' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        APP.batchMode = true;
        files.forEach(f => APP.selectedFiles.add(f.id));
        renderFileList();
    }
    
    // Delete
    if (e.key === 'Delete' && APP.selectedFiles.size > 0) {
        bulkDelete();
    }
});

// ===== AUTO PURGE TRASH (F82) =====
async function autoPurgeTrash() {
    if (APP.settings.trashPurgeDays <= 0) return;
    const cutoff = Date.now() - APP.settings.trashPurgeDays * 86400000;
    // Get trashed files from IndexedDB (they may not be in APP.files)
    let toDelete;
    try {
        const allDbFiles = await dbGetAll('files');
        toDelete = allDbFiles.filter(f => f.trashed && f.trashedAt && f.trashedAt < cutoff);
    } catch(e) { toDelete = []; }
    for (const f of toDelete) {
        await deleteFileDB(f.id);
    }
    if (toDelete.length > 0) {
        // Also remove from APP.files if they're still there
        APP.files = APP.files.filter(f => !(toDelete.find(d => d.id === f.id)));
        showToast(`${toDelete.length} ${APP.lang==='id'?'file dihapus permanen':'files permanently deleted'}`, 'info');
    }
}

    }

// ===== Google Drive Provider =====
class GoogleDriveProvider extends StorageProvider {
    constructor() { super('gdrive', 'Google Drive', 'fa-google', '#4285f4'); }

    async connect() {
        const isId = APP.lang === 'id';
        try {
            const resp = await fetch('/api/gdrive/config');
            const cfg = await resp.json();
            if (!cfg.configured) {
                showToast(isId ? 'Google Drive belum dikonfigurasi. Tambahkan GOOGLE_CLIENT_ID di Vercel env.' : 'Google Drive not configured. Add GOOGLE_CLIENT_ID to Vercel env.', 'warning', 5000);
                return;
            }
            const width = 500, height = 600;
            const left = (screen.width - width) / 2, top = (screen.height - height) / 2;
            window.open('/api/gdrive/auth', 'gdrive_auth', `width=${width},height=${height},left=${left},top=${top},scrollbars=yes`);
            const handler = async (event) => {
                if (event.data && event.data.type === 'gdrive_connected') {
                    window.removeEventListener('message', handler);
                    const account = event.data.account;
                    const existing = APP.gdriveAccounts.find(a => a.email === account.email);
                    if (existing) {
                        Object.assign(existing, { accessToken: account.accessToken, refreshToken: account.refreshToken, tokenExpiresAt: Date.now() + (account.expiresIn || 3600) * 1000, quota: account.quota, status: 'connected', lastSync: Date.now() });
                        await dbPut('gdrive_accounts', existing);
                    } else {
                        const newAccount = { id: genId(), providerId: 'gdrive', email: account.email, name: account.name || account.email.split('@')[0], accessToken: account.accessToken, refreshToken: account.refreshToken, tokenExpiresAt: Date.now() + (account.expiresIn || 3600) * 1000, quota: account.quota, status: 'connected', connectedAt: Date.now(), lastSync: Date.now() };
                        APP.gdriveAccounts.push(newAccount);
                        await dbPut('gdrive_accounts', newAccount);
                    }
                    showToast(isId ? `Google Drive ${account.email} terhubung!` : `Google Drive ${account.email} connected!`, 'success');
                    logActivity('upload', isId ? `Akun Google Drive ${account.email} terhubung` : `Google Drive ${account.email} connected`);
                    if (location.hash === '#/storage') renderStorageManagement();
                }
                if (event.data && event.data.type === 'gdrive_error') {
                    window.removeEventListener('message', handler);
                    showToast(event.data.error || 'Google Drive connection failed', 'error');
                }
            };
            window.addEventListener('message', handler);
            setTimeout(() => window.removeEventListener('message', handler), 300000);
        } catch (e) { showToast(isId ? 'Gagal menghubungkan Google Drive' : 'Failed to connect Google Drive', 'error'); }
    }

    async disconnect(accountId) {
        const isId = APP.lang === 'id';
        const idx = APP.gdriveAccounts.findIndex(a => a.id === accountId);
        if (idx === -1) return;
        const account = APP.gdriveAccounts[idx];
        await dbDelete('gdrive_accounts', accountId);
        APP.gdriveAccounts.splice(idx, 1);
        showToast(isId ? `Google Drive ${account.email} terputus` : `Google Drive ${account.email} disconnected`, 'info');
        if (location.hash === '#/storage') renderStorageManagement();
    }

    async refreshAccount(accountId) {
        const isId = APP.lang === 'id';
        const account = APP.gdriveAccounts.find(a => a.id === accountId);
        if (!account) return;
        try {
            const resp = await fetch('/api/gdrive/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refreshToken: account.refreshToken }) });
            const data = await resp.json();
            if (data.ok) {
                account.accessToken = data.accessToken;
                account.tokenExpiresAt = Date.now() + (data.expiresIn || 3600) * 1000;
                try {
                    const quotaResp = await fetch('/api/gdrive/proxy', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ accessToken: account.accessToken, method: 'GET', path: '/drive/v3/about?fields=storageQuota' }) });
                    const qd = await quotaResp.json();
                    if (qd.ok && qd.data && qd.data.storageQuota) account.quota = qd.data.storageQuota;
                } catch(e) {}
                account.status = 'connected'; account.lastSync = Date.now();
                await dbPut('gdrive_accounts', account);
                showToast(isId ? `Akun ${account.email} diperbarui` : `Account ${account.email} refreshed`, 'success');
            } else {
                account.status = 'expired'; await dbPut('gdrive_accounts', account);
                showToast(isId ? 'Token kedaluwarsa. Hubungkan ulang.' : 'Token expired. Please reconnect.', 'warning');
            }
        } catch (e) {
            account.status = 'expired'; await dbPut('gdrive_accounts', account);
            showToast(isId ? 'Gagal memperbarui akun' : 'Failed to refresh account', 'error');
        }
        if (location.hash === '#/storage') renderStorageManagement();
    }

    async getAccessToken(accountId) {
        const account = APP.gdriveAccounts.find(a => a.id === accountId);
        if (!account) return null;
        if (account.tokenExpiresAt && Date.now() > account.tokenExpiresAt - 60000) await this.refreshAccount(accountId);
        return account.accessToken;
    }

    async upload(accountId, file, metadata = {}) {
        const accessToken = await this.getAccessToken(accountId);
        if (!accessToken) throw new Error('Invalid token');
        const formData = new FormData();
        formData.append('accessToken', accessToken);
        formData.append('file', file);
        if (metadata.parentFolderId) formData.append('parentFolderId', metadata.parentFolderId);
        const resp = await fetch('/api/gdrive/upload', { method: 'POST', body: formData });
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || 'Upload failed');
        return { driveFileId: data.driveFileId, driveFileName: data.driveFileName, provider: 'gdrive', providerAccountId: accountId };
    }

    async download(accountId, fileId) {
        const accessToken = await this.getAccessToken(accountId);
        if (!accessToken) throw new Error('Invalid token');
        const resp = await fetch(`/api/gdrive/download?accessToken=${encodeURIComponent(accessToken)}&fileId=${encodeURIComponent(fileId)}`);
        if (!resp.ok) throw new Error('Download failed');
        return resp;
    }
}

// ===== SMART STORAGE ALLOCATION =====
function selectBestDrive(fileSize) {
    const accounts = APP.gdriveAccounts.filter(a => {
        if (a.status !== 'connected' || !a.quota) return false;
        const limit = parseInt(a.quota.limit) || 15 * 1024 * 1024 * 1024;
        const usage = parseInt(a.quota.usage) || 0;
        return (limit - usage) > fileSize;
    });
    if (accounts.length === 0) return null;
    accounts.sort((a, b) => {
        const availA = (parseInt(a.quota.limit) || 15*1073741824) - (parseInt(a.quota.usage) || 0);
        const availB = (parseInt(b.quota.limit) || 15*1073741824) - (parseInt(b.quota.usage) || 0);
        return availB - availA;
    });
    return accounts[0];
}

function getGDriveTotalStats() {
    const accounts = APP.gdriveAccounts.filter(a => a.status === 'connected');
    let totalLimit = 0, totalUsage = 0;
    accounts.forEach(a => {
        if (a.quota) { totalLimit += parseInt(a.quota.limit) || 0; totalUsage += parseInt(a.quota.usage) || 0; }
        else { totalLimit += 15 * 1024 * 1024 * 1024; }
    });
    return { totalLimit, totalUsage, totalAvailable: totalLimit - totalUsage, accountCount: accounts.length };
}

function formatStorageBytes(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes < 1099511627776) return (bytes / 1073741824).toFixed(2) + ' GB';
    return (bytes / 1099511627776).toFixed(2) + ' TB';
}

// ===== STORAGE CHARTS (Canvas-based) =====
function drawStorageDonutChart(accounts, stats) {
    const canvas = document.getElementById('storage-donut-chart');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const displayW = Math.max(1, Math.floor(rect.width));
    const displayH = Math.max(1, Math.floor(rect.height));
    const dpr = window.devicePixelRatio || 1;
    canvas.width = displayW * dpr; canvas.height = displayH * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = displayW, h = displayH, cx = w / 2, cy = h / 2;
    const radius = Math.max(10, Math.min(w, h) / 2 - 16), innerRadius = radius * 0.6;
    const colors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ec4899', '#06b6d4'];
    ctx.clearRect(0, 0, w, h);
    if (accounts.length === 0 || stats.totalUsage === 0) {
        ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.arc(cx, cy, innerRadius, 0, Math.PI * 2, true);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-secondary').trim() || '#f1f5f9'; ctx.fill();
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#64748b';
        ctx.font = '12px Space Grotesk, sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(APP.lang === 'id' ? 'Belum ada data' : 'No data yet', cx, cy + 4); return;
    }
    let startAngle = -Math.PI / 2;
    accounts.forEach((a, i) => {
        if (a.status !== 'connected' || !a.quota) return;
        const usage = parseInt(a.quota.usage) || 0;
        const sliceAngle = (usage / stats.totalUsage) * Math.PI * 2;
        ctx.beginPath(); ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle);
        ctx.arc(cx, cy, innerRadius, startAngle + sliceAngle, startAngle, true); ctx.closePath();
        ctx.fillStyle = colors[i % colors.length]; ctx.fill(); startAngle += sliceAngle;
    });
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#0f172a';
    const subColor = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#64748b';
    ctx.fillStyle = textColor; ctx.font = 'bold 14px JetBrains Mono, monospace'; ctx.textAlign = 'center';
    ctx.fillText(formatStorageBytes(stats.totalUsage), cx, cy - 2);
    ctx.fillStyle = subColor; ctx.font = '9px Space Grotesk, sans-serif';
    ctx.fillText(APP.lang === 'id' ? 'terpakai' : 'used', cx, cy + 12);
}

function drawStorageBarChart(accounts) {
    const canvas = document.getElementById('storage-bar-chart');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const displayW = Math.max(1, Math.floor(rect.width));
    const displayH = Math.max(1, Math.floor(rect.height));
    const dpr = window.devicePixelRatio || 1;
    canvas.width = displayW * dpr; canvas.height = displayH * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = displayW, h = displayH;
    ctx.clearRect(0, 0, w, h);
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#64748b';
    const borderColor = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#e2e8f0';
    const barColors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ec4899', '#06b6d4'];
    if (accounts.length === 0) {
        ctx.fillStyle = textColor; ctx.font = '12px Space Grotesk, sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(APP.lang === 'id' ? 'Hubungkan akun untuk melihat chart' : 'Connect accounts to see chart', w / 2, h / 2); return;
    }
    const padding = { top: 10, right: 10, bottom: 30, left: 10 };
    const chartW = w - padding.left - padding.right, chartH = h - padding.top - padding.bottom;
    const barWidth = Math.min(30, chartW / accounts.length - 8);
    const barGap = (chartW - barWidth * accounts.length) / (accounts.length + 1);
    let maxVal = 0;
    accounts.forEach(a => { const l = parseInt(a.quota?.limit) || 15 * 1073741824; if (l > maxVal) maxVal = l; });
    if (maxVal === 0) maxVal = 15 * 1073741824;
    accounts.forEach((a, i) => {
        const limit = parseInt(a.quota?.limit) || 15 * 1073741824, usage = parseInt(a.quota?.usage) || 0;
        const x = padding.left + barGap + i * (barWidth + barGap);
        const limitH = (limit / maxVal) * chartH, usageH = (usage / maxVal) * chartH;
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-secondary').trim() || '#f1f5f9';
        ctx.beginPath(); ctx.roundRect(x, padding.top + chartH - limitH, barWidth, limitH, [4, 4, 0, 0]); ctx.fill();
        ctx.fillStyle = barColors[i % barColors.length];
        ctx.beginPath(); ctx.roundRect(x, padding.top + chartH - usageH, barWidth, usageH, [4, 4, 0, 0]); ctx.fill();
        ctx.fillStyle = textColor; ctx.font = '8px Space Grotesk, sans-serif'; ctx.textAlign = 'center';
        const label = a.email ? a.email.split('@')[0] : 'Drive ' + (i + 1);
        ctx.fillText(label.length > 6 ? label.slice(0, 5) + '..' : label, x + barWidth / 2, h - padding.bottom + 12);
    });
}

// ===== SMART UPLOAD WITH GDRIVE FALLBACK =====
async function executeUploadToGDrive(file, folderId) {
    const isId = APP.lang === 'id';
    const bestDrive = selectBestDrive(file.size);
    if (!bestDrive) return null; // Fallback to Telegram
    APP.activeUploads++; updateGlobalProgress();
    try {
        const result = await APP.storageProviders.gdrive.upload(bestDrive.id, file, { parentFolderId: null });
        const fileType = getFileType(file.name, file.type);
        const autoTag = getAutoTagColor(fileType);
        const fid = folderId || APP.currentFolder;
        const effectiveFolderId = ['all', 'recent', 'favorites', 'trash', 'shared', 'encrypted'].includes(fid) ? null : fid;
        const existing = APP.files.filter(f => f.name === file.name && f.folderId === effectiveFolderId && !f.trashed);
        const version = existing.length + 1;
        const meta = { id: genId(), name: file.name, size: file.size, mime: file.type || 'application/octet-stream', fileId: result.driveFileId, filePath: '', messageId: null, botIndex: '0', chatId: '', folderId: effectiveFolderId, uploadedAt: Date.now(), pinned: false, starred: false, trashed: false, encrypted: false, version, tag: autoTag, caption: '', shareCount: 0, storageProvider: 'gdrive', providerAccountId: bestDrive.id, driveFileId: result.driveFileId };
        await saveFile(meta); APP.files.push(meta);
        if (bestDrive.quota) { bestDrive.quota.usage = (parseInt(bestDrive.quota.usage) || 0) + file.size; await dbPut('gdrive_accounts', bestDrive); }
        showToast(`${file.name} → Google Drive (${bestDrive.email.split('@')[0]})`, 'success');
        logActivity('upload', `${isId ? 'Mengunggah' : 'Uploaded'} ${file.name} → GDrive`);
        sendNotification('Ridgebox', `${file.name} uploaded to Google Drive`);
        triggerWebhook('file.uploaded', { fileId: meta.id, fileName: meta.name, fileSize: meta.size, storageProvider: 'gdrive' });
        checkStorageWarning(); updateUploadPreviewProgress(file.name, 100);
        const suz = document.getElementById('smart-upload-zone');
        if (suz && !suz.classList.contains('minimized')) suz.classList.add('minimized');
        APP.activeUploads--; updateGlobalProgress(); return meta;
    } catch (e) { APP.activeUploads--; updateGlobalProgress(); showToast(`Google Drive upload failed: ${e.message}`, 'error'); return null; }
}

    } else {

}

// ===== GDRIVE SYNC — List and import files from Google Drive =====
async function syncGDriveAccount(accountId) {
    const isId = APP.lang === 'id';
    const account = APP.gdriveAccounts.find(a => a.id === accountId);
    if (!account || account.status !== 'connected') {
        showToast(isId ? 'Akun tidak terhubung' : 'Account not connected', 'warning');
        return;
    }
    showToast(isId ? 'Menyinkronkan file dari Google Drive...' : 'Syncing files from Google Drive...', 'info');
    try {
        const accessToken = await APP.storageProviders.gdrive.getAccessToken(accountId);
        if (!accessToken) { showToast(isId ? 'Gagal memperoleh token' : 'Failed to get token', 'error'); return; }
        // List files from Google Drive (not in trash, max 100)
        const listResp = await fetch('/api/gdrive/proxy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ accessToken, method: 'GET', path: '/drive/v3/files', params: { pageSize: '100', fields: 'files(id,name,mimeType,size,modifiedTime)', q: "trashed = false and 'me' in owners" } })
        });
        const listData = await listResp.json();
        if (!listData.ok || !listData.data?.files) {
            showToast(isId ? 'Gagal mengambil daftar file' : 'Failed to list files', 'error');
            return;
        }
        const driveFiles = listData.data.files;
        let importedCount = 0;
        for (const df of driveFiles) {
            // Skip if already imported
            if (APP.files.some(f => f.driveFileId === df.id && !f.trashed)) continue;
            // Skip Google Docs/Sheets/Slides (they have no real size and need export)
            if (df.mimeType && df.mimeType.startsWith('application/vnd.google-apps')) continue;
            const meta = {
                id: genId(),
                name: df.name || 'Unnamed',
                size: parseInt(df.size) || 0,
                mime: df.mimeType || 'application/octet-stream',
                fileId: null,
                filePath: '',
                messageId: null,
                botIndex: '0',
                chatId: '',
                folderId: null,
                uploadedAt: df.modifiedTime ? new Date(df.modifiedTime).getTime() : Date.now(),
                pinned: false,
                starred: false,
                trashed: false,
                encrypted: false,
                version: 1,
                tag: getAutoTagColor(getFileType(df.name, df.mimeType)),
                caption: '',
                shareCount: 0,
                storageProvider: 'gdrive',
                providerAccountId: accountId,
                driveFileId: df.id,
                syncedAt: Date.now()
            };
            await saveFile(meta);
            APP.files.push(meta);
            importedCount++;
        }
        // Update last sync time
        account.lastSync = Date.now();
        await dbPut('gdrive_accounts', account);
        if (importedCount > 0) {
            showToast(isId ? `${importedCount} file berhasil disinkronkan dari Google Drive` : `${importedCount} files synced from Google Drive`, 'success');
            logActivity('upload', isId ? `Sinkronisasi ${importedCount} file dari ${account.email}` : `Synced ${importedCount} files from ${account.email}`);
        } else {
            showToast(isId ? 'Semua file sudah tersinkronisasi' : 'All files already synced', 'info');
        }
        if (location.hash === '#/storage') renderStorageManagement();
        else renderFileList();
    } catch (e) {
        showToast(isId ? 'Gagal menyinkronkan: ' + e.message : 'Sync failed: ' + e.message, 'error');
    }
}

// Upload to specific drive (from manual selection)
async function executeUploadToSpecificDrive(accountId, file) {
    if (!file) { closeModal(); return; }
    closeModal();
    const isId = APP.lang === 'id';
    APP.activeUploads++; updateGlobalProgress();
    try {
        const result = await APP.storageProviders.gdrive.upload(accountId, file, { parentFolderId: null });
        const account = APP.gdriveAccounts.find(a => a.id === accountId);
        const fileType = getFileType(file.name, file.type);
        const autoTag = getAutoTagColor(fileType);
        const fid = APP.currentFolder;
        const effectiveFolderId = ['all', 'recent', 'favorites', 'trash', 'shared', 'encrypted'].includes(fid) ? null : fid;
        const existing = APP.files.filter(f => f.name === file.name && f.folderId === effectiveFolderId && !f.trashed);
        const version = existing.length + 1;
        const meta = { id: genId(), name: file.name, size: file.size, mime: file.type || 'application/octet-stream', fileId: result.driveFileId, filePath: '', messageId: null, botIndex: '0', chatId: '', folderId: effectiveFolderId, uploadedAt: Date.now(), pinned: false, starred: false, trashed: false, encrypted: false, version, tag: autoTag, caption: '', shareCount: 0, storageProvider: 'gdrive', providerAccountId: accountId, driveFileId: result.driveFileId };
        await saveFile(meta); APP.files.push(meta);
        if (account?.quota) { account.quota.usage = (parseInt(account.quota.usage) || 0) + file.size; await dbPut('gdrive_accounts', account); }
        showToast(`${file.name} → Google Drive (${account?.email?.split('@')[0] || 'Drive'})`, 'success');
        logActivity('upload', `${isId ? 'Mengunggah' : 'Uploaded'} ${file.name} → GDrive (${account?.email || 'manual'})`);
        APP.activeUploads--; updateGlobalProgress();
        const suz = document.getElementById('smart-upload-zone');
        if (suz && !suz.classList.contains('minimized')) suz.classList.add('minimized');
        renderFileList();
    } catch (e) { APP.activeUploads--; updateGlobalProgress(); showToast(`Upload failed: ${e.message}`, 'error'); }
}

// Upload to Telegram directly (from drive selection modal)
async function executeUploadToTelegramDirect(file) {
    if (!file) { closeModal(); return; }
    closeModal();
    // Delegate to existing upload flow
    await executeUpload(file);
}


async function init() {
    try {
        // Load theme
        APP.theme = localStorage.getItem('rb_theme') || 'light';
        APP.lang = localStorage.getItem('rb_lang') || 'id';
        applyTheme();
        applyLangDir();
        loadAccentColor();
        applyViewMode();

        // Load data from IndexedDB
        await loadAllData();

        // Init Google Drive config
        initGDriveConfig();

        // Fetch bot config + Supabase config
        try {
            const resp = await fetch('/api/config');
            const data = await resp.json();
            if (data.ok && data.bots && data.bots.length > 0) {
                APP.bots = data.bots;
                APP.settings.proxyMode = data.proxyMode !== false;
                APP.connected = true;
            }
            // Load Supabase config from server
            if (data.supabaseUrl && data.supabaseAnonKey) {
                window.__supabaseConfig = { url: data.supabaseUrl, anonKey: data.supabaseAnonKey };
            }
        } catch (e) {
            console.warn('Config fetch failed:', e);
            APP.connected = navigator.onLine;
        }

        // Init Supabase Auth
        initSupabaseAuth();

        // If auth not required (no Supabase), proceed normally
        if (!isAuthRequired()) {
            APP.authReady = true;
        }

        // Update connection status
        updateConnectionStatus();
        window.addEventListener('online', () => { APP.connected = true; updateConnectionStatus(); showToast(t('connectionOk'), 'success', 2000); });
        window.addEventListener('offline', () => { APP.connected = false; updateConnectionStatus(); showToast(t('connectionOff'), 'warning', 2000); });

        // Auto purge trash
        await autoPurgeTrash();

        // Feature 6: Clear old thumbnails
        await clearOldThumbnails();

        // Feature 1: Init auto-lock
        initAutoLock();

        // Feature 5: Init notifications
        initNotifications();

        // Feature 4: Check pending uploads
        await checkPendingUploads();

        // Route (skip if auth is still initializing - it will call checkUrlRouting when ready)
        if (APP.authReady) checkUrlRouting();
        window.addEventListener('hashchange', checkUrlRouting);

        // Onboarding (F95) - show on first dashboard visit
        if (!APP.onboardingDone && location.hash === '#/dashboard') {
            setTimeout(startOnboarding, 500);
        }

        // Register service worker with auto-update
        if ('serviceWorker' in navigator) {
            try {
                const reg = await navigator.serviceWorker.register('sw.js');
                // Force check for updates immediately
                reg.update();
                // Check for SW updates every 30 seconds
                setInterval(() => reg.update(), 30000);
                // When new SW activates, reload to get latest code
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'activated') {
                            // New service worker activated — reload for latest code
                            location.reload();
                        }
                    });
                });
            } catch(e) { console.warn('SW registration failed:', e); }
        }

        // Load type filter options
        APP.filterType = 'all';

    } catch (err) {
        console.error('Init error:', err);
        showToast('Initialization error: ' + err.message, 'error');
    }
}

// Safe init wrapper (error handling pattern)
function safeInit() {
    try {
        init().catch(err => {
            console.error('Async init error:', err);
            showToast('Startup error: ' + err.message, 'error');
        });
    } catch (err) {
        console.error('Sync init error:', err);
        showToast('Critical error: ' + err.message, 'error');
    }
}

// --- Smart Upload Zone ---
let _pasteListenerAdded = false;
function setupSmartUploadZone() {
    const zone = document.getElementById('smart-upload-zone');
    if (!zone) return;
    let dragCounter = 0;
    zone.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        zone.classList.add('drag-active');
    });
    zone.addEventListener('dragover', (e) => {
        e.preventDefault();
    });
    zone.addEventListener('dragleave', (e) => {
        dragCounter--;
        if (dragCounter <= 0) { dragCounter = 0; zone.classList.remove('drag-active'); }
    });
    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        zone.classList.remove('drag-active');
        if (e.dataTransfer.files.length > 0) {
            showUploadPreview(e.dataTransfer.files);
            handleFileSelect(e.dataTransfer.files);
        }
    });
    // Paste from clipboard (add only once)
    if (!_pasteListenerAdded) {
        _pasteListenerAdded = true;
        document.addEventListener('paste', (e) => {
            // Only handle paste when dashboard is visible and no input is focused
            if (location.hash !== '#/dashboard') return;
            if (e.target.closest('input,textarea,[contenteditable]')) return;
            const items = e.clipboardData?.items;
            if (!items) return;
            const files = [];
            for (let i = 0; i < items.length; i++) {
                if (items[i].kind === 'file') {
                    const f = items[i].getAsFile();
                    if (f) files.push(f);
                }
            }
            if (files.length > 0) {
                e.preventDefault();
                showUploadPreview(files);
                handleFileSelect(files);
            }
        });
    }
}

// --- Dashboard Analytics (Enhanced) ---
function renderDashboardAnalytics() {
    const isId = APP.lang === 'id';
    const activeFiles = APP.files.filter(f => !f.trashed);
    const totalUsed = activeFiles.reduce((sum, f) => sum + (f.size || 0), 0);
    const maxStorage = getStorageLimitBytes();
    const usedPercent = maxStorage > 0 ? Math.min((totalUsed / maxStorage) * 100, 100) : 0;

    // Total Downloads from shares
    const totalDownloads = APP.shares.reduce((sum, s) => sum + (s.downloadCount || 0), 0);

    // Total Shares
    const totalShares = APP.shares.length;

    // Storage Growth: compare current week vs last week
    const now = Date.now();
    const thisWeekStart = now - 7 * 86400000;
    const lastWeekStart = now - 14 * 86400000;
    const thisWeekStorage = activeFiles.filter(f => f.uploadedAt >= thisWeekStart).reduce((sum, f) => sum + (f.size || 0), 0);
    const lastWeekStorage = activeFiles.filter(f => f.uploadedAt >= lastWeekStart && f.uploadedAt < thisWeekStart).reduce((sum, f) => sum + (f.size || 0), 0);
    const growthDiff = lastWeekStorage > 0 ? ((thisWeekStorage - lastWeekStorage) / lastWeekStorage * 100) : (thisWeekStorage > 0 ? 100 : 0);
    const growthUp = growthDiff >= 0;

    // Most Downloaded Files (top 5)
    const filesWithDl = activeFiles.map(f => {
        const shares = APP.shares.filter(s => s.fileId === f.id);
        const dlCount = shares.reduce((sum, s) => sum + (s.downloadCount || 0), 0);
        return { id: f.id, name: f.name, size: f.size, mime: f.mime, totalDownloads: dlCount };
    }).sort((a, b) => b.totalDownloads - a.totalDownloads).slice(0, 5);

    // Recent Uploads (last 5)
    const recentUploads = [...activeFiles].sort((a, b) => (b.uploadedAt || 0) - (a.uploadedAt || 0)).slice(0, 5);

    // Breakdown by type
    const typeMap = {
        image: { label: isId ? 'Foto' : 'Photos', color: '#10b981', size: 0 },
        video: { label: isId ? 'Video' : 'Videos', color: '#ef4444', size: 0 },
        audio: { label: isId ? 'Audio' : 'Audio', color: '#8b5cf6', size: 0 },
        document: { label: isId ? 'Dokumen' : 'Documents', color: '#3b82f6', size: 0 },
        other: { label: isId ? 'Lainnya' : 'Others', color: '#64748b', size: 0 }
    };
    const docTypes = ['document','pdf','spreadsheet','presentation','text','code'];
    activeFiles.forEach(f => {
        const fType = getFileType(f.name, f.mime);
        if (fType === 'image') typeMap.image.size += (f.size || 0);
        else if (fType === 'video') typeMap.video.size += (f.size || 0);
        else if (fType === 'audio') typeMap.audio.size += (f.size || 0);
        else if (docTypes.includes(fType)) typeMap.document.size += (f.size || 0);
        else typeMap.other.size += (f.size || 0);
    });

    // SVG ring (bigger)
    const r = 52, c = 2 * Math.PI * r;
    const offset = c - (usedPercent / 100) * c;
    const usedGB = (totalUsed / (1024*1024*1024)).toFixed(2);
    const level = usedPercent > 90 ? '#ef4444' : usedPercent > 75 ? '#f97316' : usedPercent > 50 ? '#f59e0b' : 'var(--accent)';
    const ringColor = level;

    let breakdownHtml = Object.values(typeMap).map(t => {
        const pct = totalUsed > 0 ? ((t.size / totalUsed) * 100).toFixed(1) : '0.0';
        return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0">
            <div style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
            <div style="flex:1;font-size:12px;color:var(--text)">${t.label}</div>
            <div style="font-size:11px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace">${formatSize(t.size)}</div>
            <div style="font-size:11px;color:var(--text-secondary);width:40px;text-align:right">${pct}%</div>
        </div>`;
    }).join('');

    // Most downloaded mini-list
    const mostDownloadedHtml = filesWithDl.filter(f => f.totalDownloads > 0).length > 0
        ? filesWithDl.filter(f => f.totalDownloads > 0).map(f => {

// --- Storage Analytics Card ---
function renderStorageAnalyticsCard() {
    const files = APP.files.filter(f => !f.trashed);
    const totalUsed = files.reduce((sum, f) => sum + (f.size || 0), 0);
    const maxStorage = getStorageLimitBytes();
    const usedPercent = maxStorage > 0 ? Math.min((totalUsed / maxStorage) * 100, 100) : 0;

    // Calculate breakdown by type
    const typeMap = { image: { label: APP.lang==='id'?'Foto':'Photos', color: '#10b981', size: 0 },
        video: { label: APP.lang==='id'?'Video':'Videos', color: '#ef4444', size: 0 },
        audio: { label: APP.lang==='id'?'Audio':'Audio', color: '#8b5cf6', size: 0 },
        document: { label: APP.lang==='id'?'Dokumen':'Documents', color: '#3b82f6', size: 0 },
        other: { label: APP.lang==='id'?'Lainnya':'Others', color: '#64748b', size: 0 } };
    const docTypes = ['document','pdf','spreadsheet','presentation','text','code'];
    files.forEach(f => {
        const fType = getFileType(f.name, f.mime);
        if (fType === 'image') typeMap.image.size += (f.size || 0);
        else if (fType === 'video') typeMap.video.size += (f.size || 0);
        else if (fType === 'audio') typeMap.audio.size += (f.size || 0);
        else if (docTypes.includes(fType)) typeMap.document.size += (f.size || 0);
        else typeMap.other.size += (f.size || 0);
    });

    // SVG ring parameters
    const r = 40, c = 2 * Math.PI * r;
    const offset = c - (usedPercent / 100) * c;

    const usedGB = (totalUsed / (1024*1024*1024)).toFixed(2);
    const level = getStorageWarningLevel(totalUsed);
    const ringColor = level === 'red' ? '#ef4444' : level === 'orange' ? '#f97316' : level === 'yellow' ? '#f59e0b' : 'var(--accent)';

    let breakdownHtml = Object.values(typeMap).map(t => {
        const pct = totalUsed > 0 ? ((t.size / totalUsed) * 100).toFixed(1) : '0.0';
        return `<div class="storage-breakdown-item">
            <div class="storage-breakdown-dot" style="background:${t.color}"></div>
            <div class="storage-breakdown-label">${t.label}</div>
            <div class="storage-breakdown-pct">${pct}%</div>
        </div>`;
    }).join('');

    const botCount = Math.max(APP.bots.length || 1, 1);
    return `<div class="dash-card-title"><i class="fas fa-chart-pie"></i> ${APP.lang==='id'?'Penyimpanan':'Storage'}</div>
        <div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px">${botCount} bot · 2 GB/bot = ${formatSize(maxStorage)}</div>
        <div class="storage-ring-wrap">
            <svg class="storage-ring-svg" viewBox="0 0 100 100">
                <circle class="storage-ring-bg" cx="50" cy="50" r="${r}"/>
                <circle class="storage-ring-fill" cx="50" cy="50" r="${r}"
                    stroke-dasharray="${c}" stroke-dashoffset="${c}"
                    data-target-offset="${offset}" style="stroke-dashoffset:${c};stroke:${ringColor}"/>
                <text class="storage-ring-center" x="50" y="46" fill="var(--text)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">${usedGB} GB</text>
                <text class="storage-ring-center" x="50" y="58" fill="var(--text-secondary)" font-size="7" font-family="Space Grotesk,sans-serif">/ ${formatSize(maxStorage)}</text>
            </svg>
            <div class="storage-breakdown">${breakdownHtml}</div>
        </div>`;
}

// Animate storage ring on load

    const fill = document.querySelector('#storage-analytics-card .storage-ring-fill');

// --- Weekly Summary Card ---
function renderWeeklySummaryCard() {
    const files = APP.files.filter(f => !f.trashed);
    const now = Date.now();
    const weekAgo = now - 7 * 24 * 60 * 60 * 1000;
    const weekFiles = files.filter(f => f.uploadedAt && f.uploadedAt >= weekAgo);
    const uploadedCount = weekFiles.length;
    const weekStorage = weekFiles.reduce((s, f) => s + (f.size || 0), 0);
    const weekShared = weekFiles.filter(f => f.shareCount > 0).length;

    // Most active day
    const dayNames = APP.lang === 'id'
        ? ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu']
        : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dayCounts = {};
    weekFiles.forEach(f => {
        if (f.uploadedAt) {
            const day = new Date(f.uploadedAt).getDay();
            dayCounts[day] = (dayCounts[day] || 0) + 1;
        }
    });
    let mostActiveDay = '-';
    let maxDayCount = 0;
    for (const [day, count] of Object.entries(dayCounts)) {
        if (count > maxDayCount) { maxDayCount = count; mostActiveDay = dayNames[parseInt(day)]; }
    }

    return `<div class="dash-card-title"><i class="fas fa-calendar-week"></i> ${APP.lang==='id'?'Minggu Ini':'This Week'}</div>
        <div class="weekly-stat-grid">
            <div class="weekly-stat">
                <div class="weekly-stat-val">${uploadedCount}</div>
                <div class="weekly-stat-label">${APP.lang==='id'?'File Diunggah':'Files Uploaded'}</div>
            </div>
            <div class="weekly-stat">
                <div class="weekly-stat-val">${formatSize(weekStorage)}</div>
                <div class="weekly-stat-label">${APP.lang==='id'?'Penyimpanan':'Storage Used'}</div>
            </div>
            <div class="weekly-stat">
                <div class="weekly-stat-val">${weekShared}</div>
                <div class="weekly-stat-label">${APP.lang==='id'?'Dibagikan':'Shared'}</div>
            </div>
            <div class="weekly-stat">

// --- Activity Timeline ---
// _activityCache is stored in APP._activityCache (initialized in APP object)

async function logActivity(type, description) {
    const entry = {
        key: 'activityLog',
        log: [] // Will be replaced
    };
    try {
        const existing = await dbGet('settings', 'activityLog');
        const log = existing ? (existing.log || []) : [];
        log.unshift({
            type,
            description,
            timestamp: Date.now()
        });
        // Keep only last 50 entries
        if (log.length > 50) log.length = 50;
        entry.log = log;
        await dbPut('settings', entry);
        APP._activityCache = log;
        // Update activity timeline if visible
        refreshActivityUI();
    } catch(e) {
        console.warn('logActivity error:', e);
        // Fallback to memory-only
        if (!APP._activityCache) APP._activityCache = [];
        APP._activityCache.unshift({ type, description, timestamp: Date.now() });
        if (APP._activityCache.length > 50) APP._activityCache.length = 50;
        refreshActivityUI();
    }
}

async function loadActivityLog() {
    if (APP._activityCache) return APP._activityCache;
    try {
        const data = await dbGet('settings', 'activityLog');
        APP._activityCache = data ? (data.log || []) : [];
    } catch(e) {
        APP._activityCache = [];
    }
    return APP._activityCache;
}

function refreshActivityUI() {
    const cardTL = document.getElementById('activity-card');
    if (cardTL) {
        const inner = cardTL.querySelector('.activity-timeline');
        if (inner) inner.innerHTML = renderActivityItems();
    }
}

function renderActivityTimeline() {
    return `<div class="dash-card-title"><i class="fas fa-clock-rotate-left"></i> ${APP.lang==='id'?'Aktivitas Terbaru':'Recent Activity'}</div>
        <div class="activity-timeline">${renderActivityItems()}</div>`;
}

function renderActivityItems() {
    const log = APP._activityCache || [];
    const last20 = log.slice(0, 20);
    if (last20.length === 0) {
        return `<div style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:12px">${APP.lang==='id'?'Belum ada aktivitas':'No activity yet'}</div>`;
    }
    const typeConfig = {
        upload: { icon: 'fa-cloud-arrow-up', color: '#10b981' },
        download: { icon: 'fa-download', color: '#3b82f6' },
        share: { icon: 'fa-share-alt', color: '#8b5cf6' },
        delete: { icon: 'fa-trash', color: '#ef4444' },
        rename: { icon: 'fa-pen', color: '#f59e0b' },
        move: { icon: 'fa-arrows-alt', color: '#06b6d4' }
    };
    return last20.map(a => {
        const cfg = typeConfig[a.type] || typeConfig.move;
        return `<div class="activity-item">
            <div class="activity-icon" style="background:${cfg.color}15;color:${cfg.color}"><i class="fas ${cfg.icon}"></i></div>
            <div class="activity-body">
                <div class="activity-desc">${a.description}</div>
                <div class="activity-time">${timeAgo(a.timestamp)}</div>
            </div>
        </div>`;
    }).join('');
}

function timeAgo(ts) {
    if (!ts) return '';
    const diff = Date.now() - ts;
    if (diff < 60000) return APP.lang === 'id' ? 'Baru saja' : 'Just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + (APP.lang === 'id' ? 'm lalu' : 'm ago');
    if (diff < 86400000) return Math.floor(diff / 3600000) + (APP.lang === 'id' ? 'j lalu' : 'h ago');
    if (diff < 604800000) return Math.floor(diff / 86400000) + (APP.lang === 'id' ? 'h lalu' : 'd ago');
    return new Date(ts).toLocaleDateString(APP.lang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'short' });
}

document.addEventListener('keydown', (e) => {
    const inInput = !!e.target.closest('input,textarea,select');
    // G-then-X sequence (navigation)
    if (APP.gSequence) {
        APP.gSequence = false;
        if (!inInput) {
            if (e.key === 'd') { selectFolder('all'); return; }
            if (e.key === 'a') { selectFolder('all'); return; }
            if (e.key === 't') { selectFolder('trash'); return; }
        }
        return;
    }
    // Toggle shortcuts panel
    if ((e.key === '?' || (e.ctrlKey && e.key === '/')) && !inInput) {
        e.preventDefault();
        openShortcutsPanel();
        return;
    }
    if (e.key === 'Escape') {
        closeModal();
        closeDetailPanel();
        closeContextMenu();
        APP.gSequence = false;
        return;
    }
    if (inInput) return;
    // File actions
    if (e.key === 'n' || e.key === 'N') { triggerUpload(); return; }
    if (e.key === 'f' || e.key === 'F') { createFolderDialog(); return; }
    if (e.key === '/') { e.preventDefault(); const s = document.querySelector('.search-premium input'); if (s) s.focus(); return; }
    if (e.key === 'g' || e.key === 'G') { APP.gSequence = true; setTimeout(() => { APP.gSequence = false; }, 1000); return; }
    if (e.key === 'v' || e.key === 'V') {
        const views = ['list','grid','categories'];
        const idx = views.indexOf(APP.currentView);
        APP.currentView = views[(idx + 1) % views.length];
        renderFileList();
        return;
    }
    if (e.key === 'b' || e.key === 'B') { APP.batchMode = !APP.batchMode; renderFileList(); return; }
    if (e.key === 'd' || e.key === 'D') { toggleTheme(); return; }
    // Actions on selected file
    if (APP.selectedFiles.size === 1) {
        const fileId = [...APP.selectedFiles][0];
        if (e.key === 'Delete') { moveToTrash(fileId); return; }
        if (e.key === 'e' || e.key === 'E') { startRename(fileId); return; }
        if (e.key === 's' || e.key === 'S') { toggleStar(fileId); return; }
    }
    // Legacy: u for upload
    if (e.key === 'u' || e.key === 'U') { triggerUpload(); return; }
});

function renderCarousel() {
    const recentFiles = [...APP.files].filter(f => !f.trashed).sort((a, b) => (b.uploadedAt || 0) - (a.uploadedAt || 0)).slice(0, 8);
    if (recentFiles.length === 0) return '';

    const cards = recentFiles.map(f => {
        const type = getFileType(f.name, f.mime);
        const icon = getFileIcon(type);
        const name = f.name.length > 16 ? f.name.substring(0, 14) + '…' : f.name;
        return `<div class="carousel-card" onclick="openDetailPanel('${f.id}')" title="${f.name}">

            <div class="cc-name">${name}</div>
            <div class="cc-date">${formatDate(f.uploadedAt)}</div>
        </div>`;
    }).join('');

    return `<div class="carousel-wrap" id="carousel-wrap"
        onmouseenter="pauseCarousel()" onmouseleave="resumeCarousel()"
        ontouchstart="pauseCarousel()" ontouchend="resumeCarousel()">
        <button class="carousel-nav prev" onclick="scrollCarousel(-1)"><i class="fas fa-chevron-left"></i></button>
        <div class="carousel-track" id="carousel-track">${cards}</div>
        <button class="carousel-nav next" onclick="scrollCarousel(1)"><i class="fas fa-chevron-right"></i></button>
        <div class="carousel-dots" id="carousel-dots">${recentFiles.map((_, i) => `<span class="carousel-dot ${i === 0 ? 'active' : ''}" data-idx="${i}"></span>`).join('')}</div>
    </div>`;
}

function scrollCarousel(dir) {
    const track = document.getElementById('carousel-track');
    if (!track) return;
    const cardW = 150; // card width + gap
    track.scrollBy({ left: dir * cardW * 2, behavior: 'smooth' });
}

function pauseCarousel() {
    if (APP.carouselTimer) { clearInterval(APP.carouselTimer); APP.carouselTimer = null; }
}

function resumeCarousel() {
    startCarouselAutoScroll();
}

function startCarouselAutoScroll() {
    if (APP.carouselTimer) clearInterval(APP.carouselTimer);
    APP.carouselTimer = setInterval(() => {
        const track = document.getElementById('carousel-track');
        if (!track) { clearInterval(APP.carouselTimer); return; }
        const maxScroll = track.scrollWidth - track.clientWidth;
        if (track.scrollLeft >= maxScroll - 10) {
            track.scrollTo({ left: 0, behavior: 'smooth' });
        } else {
            track.scrollBy({ left: 150, behavior: 'smooth' });
        }
        updateCarouselDots();
    }, 5000);
}

function updateCarouselDots() {
    const track = document.getElementById('carousel-track');
    const dots = document.querySelectorAll('#carousel-dots .carousel-dot');
    if (!track || !dots.length) return;
    const cardW = 150;
    const idx = Math.round(track.scrollLeft / cardW);
    dots.forEach((d, i) => d.classList.toggle('active', i === Math.min(idx, dots.length - 1)));
}
