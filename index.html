<style>
:root{--accent:#3b82f6;--accent-hover:#2563eb;--bg:#ffffff;--bg-secondary:#f8fafc;--bg-card:#ffffff;--text:#0f172a;--text-secondary:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 10px 40px rgba(0,0,0,.15);--radius:12px;--sidebar-w:260px;--header-h:60px;--transition:all .2s ease}
.dark{--bg:#0f172a;--bg-secondary:#1e293b;--bg-card:#1e293b;--text:#f1f5f9;--text-secondary:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 10px 40px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-secondary);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.font-mono{font-family:'JetBrains Mono',monospace}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--bg-secondary) 25%,var(--border) 50%,var(--bg-secondary) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.page-transition{animation:fadeIn .25s ease}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-content{background:var(--bg-card);border-radius:var(--radius);max-width:560px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:fadeIn .2s ease}
.detail-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100%;background:var(--bg-card);box-shadow:var(--shadow-lg);z-index:90;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto}
.detail-panel.open{transform:translateX(0)}
.sidebar-mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;display:none}
.sidebar-mobile-overlay.open{display:block}
.context-menu{position:fixed;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);z-index:200;min-width:200px;padding:4px;display:none}
.context-menu.open{display:block}
.context-menu-item{padding:8px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text);transition:var(--transition)}
.context-menu-item:hover{background:var(--bg-secondary)}
.context-menu-item.danger{color:#ef4444}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{padding:12px 16px;border-radius:8px;display:flex;align-items:center;gap:10px;font-size:14px;box-shadow:var(--shadow);animation:fadeIn .2s ease;cursor:pointer}
.toast.success{background:#10b981;color:#fff}
.toast.error{background:#ef4444;color:#fff}
.toast.info{background:var(--accent);color:#fff}
.toast.warning{background:#f59e0b;color:#fff}
.upload-progress-global{position:fixed;top:0;left:0;right:0;height:3px;z-index:400;background:transparent}
.upload-progress-global .bar{height:100%;background:var(--accent);transition:width .3s ease;border-radius:0 2px 2px 0}
.quick-actions-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 16px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);z-index:80;display:none}
.quick-actions-bar.visible{display:flex}
.scroll-progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:500;transition:width .1s linear}
.back-to-top{position:fixed;bottom:20px;left:20px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);z-index:80;border:none;font-size:16px;transition:var(--transition)}
.back-to-top.visible{display:flex}
.back-to-top:hover{background:var(--accent-hover);transform:scale(1.1)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.tag-dot{width:10px;height:10px;border-radius:50%;display:inline-block;cursor:pointer}
.file-grid-item{position:relative;border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:var(--transition);background:var(--bg-card)}
.file-grid-item:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.file-grid-item.selected{border-color:var(--accent);background:rgba(59,130,246,.08)}
.file-list-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.file-list-row:hover{background:var(--bg-secondary)}
.file-list-row.selected{background:rgba(59,130,246,.08)}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:var(--transition);font-size:14px;color:var(--text-secondary)}
.sidebar-item:hover,.sidebar-item.active{background:var(--bg-secondary);color:var(--text)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;border-radius:8px;font-weight:500;font-size:14px;cursor:pointer;border:none;transition:var(--transition);font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--bg-secondary);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--text-secondary)}.btn-ghost:hover{background:var(--bg-secondary)}
.btn-sm{padding:4px 10px;font-size:12px}
.input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;transition:var(--transition)}
.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.hero-gradient{background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 50%,#ec4899 100%)}
.card-hover{transition:var(--transition)}.card-hover:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);transition:var(--transition)}
.drop-zone.drag-over{border-color:var(--accent);background:rgba(59,130,246,.05)}
.waveform-bar{display:inline-block;width:3px;margin:0 1px;background:var(--accent);border-radius:2px;vertical-align:bottom;transition:height .1s ease}
.onboarding-highlight{position:relative;z-index:110;box-shadow:0 0 0 4px var(--accent),0 0 0 9999px rgba(0,0,0,.5);border-radius:8px}
.onboarding-tooltip{position:fixed;z-index:111;background:var(--bg-card);border-radius:var(--radius);padding:16px;max-width:320px;box-shadow:var(--shadow-lg)}
/* View Mode: Mobile */
body.view-mobile .sidebar-desktop{display:none!important}
body.view-mobile .detail-panel{width:100%!important;top:auto!important;bottom:0!important;left:0!important;right:0!important;height:70vh!important;border-radius:16px 16px 0 0!important;transform:translateY(100%)!important;box-shadow:0 -4px 24px rgba(0,0,0,.15)!important}
body.view-mobile .detail-panel.open{transform:translateY(0)!important}
body.view-mobile .modal-content{position:fixed!important;bottom:0!important;left:0!important;right:0!important;max-width:100%!important;width:100%!important;max-height:90vh!important;border-radius:16px 16px 0 0!important;animation:slideUp .25s ease!important}
body.view-mobile .modal-backdrop{align-items:flex-end!important}
body.view-mobile .toast-container{left:16px!important;right:16px!important;bottom:80px!important;max-width:none!important}
body.view-mobile .quick-actions-bar{bottom:16px!important;left:16px!important;right:16px!important;transform:none!important;width:auto!important}
body.view-mobile .file-list-row{min-height:56px;padding:12px 16px!important}
body.view-mobile .file-grid-item{padding:12px!important}
body.view-mobile .btn{min-height:36px}
body.view-mobile .back-to-top{bottom:80px!important;left:16px!important}
body.view-mobile .hide-mobile-small{display:none!important}
body.view-mobile .sidebar-mobile{position:fixed;left:0;top:0;bottom:0;width:280px;z-index:50;transform:translateX(-100%);transition:transform .3s ease}
body.view-mobile .sidebar-mobile.open{transform:translateX(0)}
body.view-mobile .toolbar-wrap{flex-wrap:wrap!important;gap:4px!important;padding:8px 12px!important}
body.view-mobile .toolbar-wrap .search-box{min-width:0!important;width:100%!important;order:-1}
body.view-mobile .toolbar-wrap select{font-size:11px!important;padding:4px 6px!important}
body.view-mobile .file-list-row .action-btns{display:none!important}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* View Mode: Desktop */
body.view-desktop .sidebar-mobile-toggle{display:none!important}
body.view-desktop .detail-panel{width:420px;max-width:100%;top:0;right:0;bottom:0;left:auto;height:auto;border-radius:0}
body.view-desktop .detail-panel.open{transform:translateX(0)}
/* Fallback: auto-detect */
@media(max-width:768px){body:not(.view-mobile):not(.view-desktop) .sidebar-desktop{display:none!important}body:not(.view-mobile):not(.view-desktop) .detail-panel{width:100%}}
@media(min-width:769px){body:not(.view-mobile):not(.view-desktop) .sidebar-mobile-toggle{display:none!important}}
</style>
</head>

// ===== INDEXEDDB (F15) =====
const DB_NAME = 'RidgeboxDB';
const DB_VERSION = 3;
let _db = null;

function openDB() {
    return new Promise((resolve, reject) => {
        if (_db) return resolve(_db);
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('files')) {
                const fs = db.createObjectStore('files', { keyPath: 'id' });
                fs.createIndex('folderId', 'folderId', { unique: false });
                fs.createIndex('name', 'name', { unique: false });
                fs.createIndex('trashed', 'trashed', { unique: false });
                fs.createIndex('starred', 'starred', { unique: false });
            }
            if (!db.objectStoreNames.contains('folders')) db.createObjectStore('folders', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('shares')) db.createObjectStore('shares', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
        };
        req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
        req.onerror = (e) => reject(e.target.error);
    });
}

async function dbGetAll(store) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function dbGet(store, key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function dbPut(store, data) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).put(data);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

async function dbDelete(store, key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

async function dbClear(store) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }

function formatSize(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDate(ts) {
    if (!ts) return '-';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return APP.lang === 'id' ? 'Baru saja' : 'Just now';
    if (diff < 3600000) return Math.floor(diff/60000) + (APP.lang === 'id' ? ' menit lalu' : ' min ago');
    if (diff < 86400000) return Math.floor(diff/3600000) + (APP.lang === 'id' ? ' jam lalu' : 'h ago');
    if (diff < 604800000) return Math.floor(diff/86400000) + (APP.lang === 'id' ? ' hari lalu' : 'd ago');
    return d.toLocaleDateString(APP.lang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'short', year: 'numeric' });
}

function getFileType(name, mime) {
    const ext = (name || '').split('.').pop().toLowerCase();
    if (mime) {
        if (mime.startsWith('image/')) return 'image';
        if (mime.startsWith('video/')) return 'video';
        if (mime.startsWith('audio/')) return 'audio';
        if (mime === 'application/pdf') return 'pdf';
        if (mime.includes('zip') || mime.includes('rar') || mime.includes('7z') || mime.includes('tar') || mime.includes('gz')) return 'archive';
        if (mime.includes('word') || mime.includes('document')) return 'document';
        if (mime.includes('sheet') || mime.includes('excel')) return 'spreadsheet';
        if (mime.includes('presentation') || mime.includes('powerpoint')) return 'presentation';
        if (mime.includes('text')) return 'text';
    }
    const imgExts = ['jpg','jpeg','png','gif','webp','svg','bmp','ico'];
    const vidExts = ['mp4','avi','mkv','mov','webm','flv','wmv'];
    const audExts = ['mp3','wav','ogg','flac','aac','m4a','wma'];
    const docExts = ['doc','docx','xls','xlsx','ppt','pptx','pdf','txt','rtf'];
    const codeExts = ['js','ts','py','java','c','cpp','h','css','html','jsx','tsx','json','xml','yaml','yml','md','sh','sql','go','rs','rb','php'];
    if (imgExts.includes(ext)) return 'image';
    if (vidExts.includes(ext)) return 'video';
    if (audExts.includes(ext)) return 'audio';
    if (ext === 'pdf') return 'pdf';
    if (['doc','docx'].includes(ext)) return 'document';
    if (['xls','xlsx'].includes(ext)) return 'spreadsheet';
    if (['ppt','pptx'].includes(ext)) return 'presentation';
    if (codeExts.includes(ext)) return 'code';
    if (['zip','rar','7z','tar','gz','bz2'].includes(ext)) return 'archive';
    return 'other';
}

async function hashPin(pin) { // F77: SHA-256 PIN hash
    const encoder = new TextEncoder();
    const data = encoder.encode(pin + '_ridgebox_salt_2024');
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ===== ENCRYPTION (F11) =====
async function encryptData(data, password) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt']);
    const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
    const result = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
    result.set(salt, 0);
    result.set(iv, salt.length);
    result.set(new Uint8Array(encrypted), salt.length + iv.length);
    return result;
}

async function decryptData(encData, password) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const salt = encData.slice(0, 16);
    const iv = encData.slice(16, 28);
    const data = encData.slice(28);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    return await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
}

// ===== TOAST (F13, F96) =====
const toastGroups = {};
function showToast(msg, type = 'info', duration = 4000) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const groupKey = msg.substring(0, 30) + type;
    if (toastGroups[groupKey]) {
        const existing = toastGroups[groupKey];
        const count = (parseInt(existing.dataset.count) || 1) + 1;
        existing.dataset.count = count;
        existing.querySelector('.toast-msg').textContent = msg + (count > 1 ? ` (${count}x)` : '');
        clearTimeout(existing._timer);
        existing._timer = setTimeout(() => { existing.remove(); delete toastGroups[groupKey]; }, duration);
        return;
    }
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.dataset.count = '1';
    const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
    el.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span class="toast-msg">${msg}</span>`;
    el._timer = setTimeout(() => { el.remove(); delete toastGroups[groupKey]; }, duration);
    el.onclick = () => { el.remove(); delete toastGroups[groupKey]; };
    container.appendChild(el);
    toastGroups[groupKey] = el;
}

    closeDetailPanel();
    closeContextMenu();

    if (hash === '#/' || hash === '') {
        renderHomepage();
    } else if (hash === '#/dashboard') {
        checkPinThenRender(() => renderDashboard());
    } else if (hash.startsWith('#/file/')) {
        const fileId = hash.replace('#/file/', '');
        checkPinThenRender(() => renderFileDetail(fileId));
    } else if (hash.startsWith('#/upload/')) {

    } else if (hash.startsWith('#/s/')) {
        const alias = hash.replace('#/s/', '');
        renderSharePortal(alias);
    } else {
        render404();
    }
}

    const inp = document.getElementById('pin-input');
    const errEl = document.getElementById('pin-error');
    if (!inp) return;
    const hashed = await hashPin(inp.value);
    if (hashed === APP.settings.pinLock) {
        document.getElementById('pin-lock-overlay').style.display = 'none';
        if (document.getElementById('pin-lock-overlay')._callback) {
            document.getElementById('pin-lock-overlay')._callback();

    } else {

        inp.value = '';
        inp.focus();
    }
}

function animateCounters() { // F69
    const counters = document.querySelectorAll('[data-count]');
    counters.forEach(el => {
        const target = el.dataset.count;
        if (target === 'unlimited') return;
        let current = 0;
        const step = Math.ceil(parseInt(target) / 40);
        const timer = setInterval(() => {
            current += step;
            if (current >= parseInt(target)) { current = parseInt(target); clearInterval(timer); }
            el.textContent = current.toLocaleString();
        }, 30);
    });
}

            : f.id === 'favorites' ? APP.files.filter(x => x.starred && !x.trashed).length
            : f.id === 'trash' ? APP.files.filter(x => x.trashed).length
            : APP.files.filter(x => x.folderId === f.id && !x.trashed).length;

// ===== SELECT FOLDER (integrated) =====
function selectFolder(folderId) {
    APP.currentFolder = folderId;
    APP.quickFilter = null;
    APP.selectedFiles.clear();
    APP.batchMode = false;
    // Update sidebar
    const sidebar = document.getElementById('sidebar-panel');
    if (sidebar) sidebar.innerHTML = renderSidebarHTML();
    renderBreadcrumb();
    renderQuickFilter();
    renderFileList();
    // Close mobile sidebar after selection
    if (APP.viewMode === 'mobile') toggleMobileSidebar(false);
}

// ===== BREADCRUMB (F74) =====
function renderBreadcrumb() {
    const bar = document.getElementById('breadcrumb-bar');
    if (!bar) return;
    let crumbs = [`<a href="#/dashboard" style="color:var(--accent);text-decoration:none"><i class="fas fa-home" style="font-size:12px"></i></a>`];
    const folder = APP.folders.find(f => f.id === APP.currentFolder);
    if (folder) {
        crumbs.push(`<span style="color:var(--text-secondary)">/</span> <span>${folder.name}</span>`);

    if (APP.quickFilter) {
        crumbs.push(`<span style="color:var(--text-secondary)">/</span> <span style="color:var(--accent)">${t(APP.quickFilter)}</span>`);

// ===== QUICK FILTER (F65) =====

// ===== FILE LIST (integrated with ALL enhancements) =====
function renderFileList() {
    const container = document.getElementById('file-list-container');
    if (!container) return;
    let files = getFilteredFiles();

    // Sort
    files.sort((a, b) => {
        // Pinned first
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        // Custom order
        const orderA = APP.customOrder[a.id] ?? 99999;
        const orderB = APP.customOrder[b.id] ?? 99999;
        if (orderA !== orderB) return orderA - orderB;
        // Sort field
        let cmp = 0;
        if (APP.sortBy === 'date') cmp = (b.uploadedAt || 0) - (a.uploadedAt || 0);
        else if (APP.sortBy === 'name') cmp = (a.name || '').localeCompare(b.name || '');
        else if (APP.sortBy === 'size') cmp = (b.size || 0) - (a.size || 0);
        return APP.sortOrder === 'asc' ? -cmp : cmp;
    });

    if (files.length === 0) {
        container.innerHTML = renderEmptyState();
        return;
    }

    if (APP.currentView === 'grid') {
        container.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
            ${files.map((f, i) => renderFileGridItem(f, i)).join('')}
        </div>`;
    } else {
        container.innerHTML = `
            <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                ${files.map((f, i) => renderFileListRow(f, i)).join('')}
            </div>`;
    }
    updateQuickActions();
}

function getFilteredFiles() {
    let files = [...APP.files];

    // Folder filter
    if (APP.currentFolder === 'all') {
        files = files.filter(f => !f.trashed);
    } else if (APP.currentFolder === 'recent') {
        files = files.filter(f => !f.trashed).sort((a, b) => (b.uploadedAt || 0) - (a.uploadedAt || 0)).slice(0, 20);
    } else if (APP.currentFolder === 'favorites') {
        files = files.filter(f => f.starred && !f.trashed);
    } else if (APP.currentFolder === 'trash') {
        files = files.filter(f => f.trashed);
    } else {
        files = files.filter(f => f.folderId === APP.currentFolder && !f.trashed);
    }

    // Quick filter (F65)
    if (APP.quickFilter === 'today') files = files.filter(f => isToday(f.uploadedAt));
    else if (APP.quickFilter === 'thisWeek') files = files.filter(f => isThisWeek(f.uploadedAt));
    else if (APP.quickFilter === 'large') files = files.filter(f => f.size > 10 * 1024 * 1024);
    else if (APP.quickFilter === 'pinned') files = files.filter(f => f.pinned);
    else if (APP.quickFilter === 'encrypted') files = files.filter(f => f.encrypted);

    // Type filter
    if (APP.filterType !== 'all') {
        files = files.filter(f => getFileType(f.name, f.mime) === APP.filterType);
    }

    // Deep search (F54)
    if (APP.searchQuery) {
        const q = APP.searchQuery.toLowerCase();
        files = files.filter(f =>
            (f.name || '').toLowerCase().includes(q) ||
            (f.caption || '').toLowerCase().includes(q) ||
            (f.folderId || '').toLowerCase().includes(q) ||
            getFileType(f.name, f.mime).includes(q)
        );
    }

    return files;
}

// ===== FILE CLICK HANDLER (F91 shift+click) =====
function handleFileClick(e, fileId, index) {
    if (APP.batchMode || e.shiftKey) {
        e.preventDefault();
        if (e.shiftKey && APP.lastSelectedIndex >= 0) {
            // F91: Range select
            const files = getFilteredFiles();
            const start = Math.min(APP.lastSelectedIndex, index);
            const end = Math.max(APP.lastSelectedIndex, index);
            for (let i = start; i <= end; i++) {
                if (files[i]) APP.selectedFiles.add(files[i].id);
            }
        } else {
            if (APP.selectedFiles.has(fileId)) APP.selectedFiles.delete(fileId);
            else APP.selectedFiles.add(fileId);
        }
        APP.lastSelectedIndex = index;
        renderFileList();
    } else if (e.detail === 2) {
        // Double click → preview
        openPreview(fileId);
    } else {
        // Single click → detail panel
        openDetailPanel(fileId);
    }
}

// ===== DRAG & DROP (F46, F86) =====
let draggedFileId = null;
function handleDragStart(e, fileId) {
    draggedFileId = fileId;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', fileId);
}
function handleFolderDrop(e, folderId) {
    e.preventDefault();
    if (!draggedFileId) return;
    moveFileToFolder(draggedFileId, folderId);
    draggedFileId = null;
}
function handleDragReorder(e, index) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}
function handleDropReorder(e, targetId) {
    e.preventDefault();
    if (!draggedFileId || draggedFileId === targetId) return;
    const targetIdx = APP.files.findIndex(f => f.id === targetId);
    if (targetIdx >= 0) {
        APP.customOrder[draggedFileId] = targetIdx;
        localStorage.setItem('rb_custom_order', JSON.stringify(APP.customOrder));
    }
    draggedFileId = null;
    renderFileList();
}
function setupDragDrop() {
    const zone = document.getElementById('drop-zone');
    const container = document.getElementById('file-list-container');
    if (!container) return;
    ['dragenter', 'dragover'].forEach(ev => {
        container.addEventListener(ev, (e) => {
            e.preventDefault();
            if (zone) zone.style.display = 'block';
            if (zone) zone.classList.add('drag-over');
        });
    });
    ['dragleave', 'drop'].forEach(ev => {
        container.addEventListener(ev, (e) => {
            if (e.target === container || !container.contains(e.relatedTarget)) {
                if (zone) zone.style.display = 'none';
                if (zone) zone.classList.remove('drag-over');
            }
        });
    });
    container.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
            handleFileSelect(e.dataTransfer.files);
        }
    });
}


// ===== UPLOAD (F3, F10, F11, F76, F79, F81, F89, F93, F103) =====
function triggerUpload() {

async function handleFileSelect(fileList) {

        await executeUpload(file);
    }
    const inp = document.getElementById('file-upload-input');

}

async function executeUpload(file, folderParam) {
    const bot = APP.bots[0];
    if (!bot) { showToast(t('uploadError') + ': No bot configured', 'error'); return; }

    APP.activeUploads++;
    updateGlobalProgress();

    try {
        let fileData = file;
        let fileName = file.name;
        let fileSize = file.size;
        let mimeType = file.type || 'application/octet-stream';
        let isEncrypted = false;

        // F11: Encrypt if enabled
        if (APP.settings.encryption) {
            const buffer = await file.arrayBuffer();
            const encData = await encryptData(buffer, 'ridgebox_' + bot.chatId);
            fileData = new Blob([encData], { type: 'application/octet-stream' });
            fileName += '.enc';
            isEncrypted = true;
        }

        // F81: Check for versioning (same name in same folder)
        const folderId = folderParam || APP.currentFolder;
        const existing = APP.files.filter(f => f.name === file.name && f.folderId === folderId && !f.trashed);
        const version = existing.length + 1;

        // F76: Proxy mode vs direct
        let result;
        if (APP.settings.proxyMode !== false) {
            // Upload via server proxy
            const formData = new FormData();
            formData.append('document', fileData, fileName);
            formData.append('bot_index', bot.index);
            if (folderParam) formData.append('chat_id', bot.chatId);

            const resp = await fetch('/api/upload', { method: 'POST', body: formData });
            result = await resp.json();
        } else {
            // Direct upload to Telegram
            const formData = new FormData();
            formData.append('chat_id', bot.chatId);
            formData.append('document', fileData, fileName);
            const resp = await fetch(`https://api.telegram.org/bot${bot.token}/sendDocument`, { method: 'POST', body: formData });
            result = await resp.json();
        }

        if (result.ok || (result.result && result.result.message_id)) {
            const msg = result.result;
            const doc = msg.document || msg.photo?.[msg.photo.length - 1] || msg.video || msg.audio || msg.animation;
            const fileId = doc?.file_id || genId();
            const filePath = doc?.file_path || '';

            // F103: Auto-tag by file type
            const fileType = getFileType(fileName, mimeType);
            const autoTag = getAutoTagColor(fileType);

            const meta = {
                id: genId(),
                name: file.name,
                size: fileSize,
                mime: mimeType,
                fileId: fileId,
                filePath: filePath,
                messageId: msg.message_id || null,
                botIndex: bot.index || '0',
                chatId: bot.chatId,
                folderId: folderId === 'all' || folderId === 'recent' || folderId === 'favorites' || folderId === 'trash' ? null : folderId,
                uploadedAt: Date.now(),
                pinned: false,
                starred: false,
                trashed: false,
                encrypted: isEncrypted,
                version: version,
                tag: autoTag,
                caption: '',
                shareCount: 0
            };

            await saveFile(meta);
            APP.files.push(meta);
            showToast(t('uploaded'), 'success');
            sendNotification('Ridgebox', `${file.name} ${t('uploaded').toLowerCase()}`);
            renderFileList();
            const sidebar = document.getElementById('sidebar-panel');
            if (sidebar) sidebar.innerHTML = renderSidebarHTML();
        } else {
            showToast(t('uploadError') + ': ' + (result.description || 'Unknown error'), 'error');
        }
    } catch (err) {
        showToast(t('uploadError') + ': ' + err.message, 'error');
    } finally {
        APP.activeUploads--;
        updateGlobalProgress();
    }
}

function updateGlobalProgress() { // F93
    const bar = document.getElementById('global-progress-bar');
    if (!bar) return;
    if (APP.activeUploads === 0) {
        bar.style.width = '0';
    } else {
        bar.style.width = Math.min(90, APP.activeUploads * 30) + '%';
        setTimeout(() => { if (APP.activeUploads === 0) bar.style.width = '0'; }, 1000);
    }
}

let cameraStream = null;
let mediaRecorder = null;
let recordingChunks = [];

async function startCamera() {
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
        const video = document.getElementById('camera-preview');
        if (video) video.srcObject = cameraStream;
    } catch (err) {
        showToast('Camera error: ' + err.message, 'error');
    }
}

function closeCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
}

function capturePhoto() {
    const video = document.getElementById('camera-preview');
    const canvas = document.getElementById('camera-canvas');
    if (!video || !canvas) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(async (blob) => {
        const file = new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
        await executeUpload(file);
        closeCamera();
        closeModal();
    }, 'image/jpeg');
}

function toggleRecording() {
    const btn = document.getElementById('record-btn');
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        recordingChunks = [];
        const video = document.getElementById('camera-preview');
        const stream = video?.srcObject;
        if (!stream) return;
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordingChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            const blob = new Blob(recordingChunks, { type: 'video/webm' });
            const file = new File([blob], `video_${Date.now()}.webm`, { type: 'video/webm' });
            await executeUpload(file);
            closeCamera();
            closeModal();
        };
        mediaRecorder.start();
        if (btn) btn.innerHTML = `<i class="fas fa-stop"></i> ${t('stopRecording')}`;
    } else {
        mediaRecorder.stop();
        if (btn) btn.innerHTML = `<i class="fas fa-video"></i> ${t('startRecording')}`;
    }
}

// ===== DOWNLOAD =====
async function downloadFile(fileId) {
    const file = APP.files.find(f => f.id === fileId);
    if (!file) return;
    try {
        let url;
        if (APP.settings.proxyMode !== false) {
            url = `/api/download?path=${encodeURIComponent(file.filePath)}&bot_index=${file.botIndex}`;
        } else {
            url = `https://api.telegram.org/file/bot${APP.bots[0]?.token}/${file.filePath}`;
        }
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Download failed');
        let blob = await resp.blob();
        if (file.encrypted) {
            try {
                const encData = new Uint8Array(await blob.arrayBuffer());
                const decData = await decryptData(encData, 'ridgebox_' + file.chatId);
                blob = new Blob([decData]);
            } catch(e) { console.warn('Decrypt failed, returning raw file'); }
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file.name;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast(t('download') + ' ✓', 'success');
    } catch (err) {
        showToast('Download error: ' + err.message, 'error');
    }
}

async function bulkDownloadZip() { // F83
    if (typeof JSZip === 'undefined') { showToast('JSZip not loaded', 'error'); return; }
    const zip = new JSZip();
    let count = 0;
    for (const id of APP.selectedFiles) {
        const file = APP.files.find(f => f.id === id);
        if (!file) continue;
        try {
            const url = APP.settings.proxyMode !== false
                ? `/api/download?path=${encodeURIComponent(file.filePath)}&bot_index=${file.botIndex}`
                : `https://api.telegram.org/file/bot${APP.bots[0]?.token}/${file.filePath}`;
            const resp = await fetch(url);
            if (resp.ok) {
                const blob = await resp.blob();
                zip.file(file.name, blob);
                count++;
            }
        } catch(e) { console.warn('Skip file', file.name); }
    }
    if (count > 0) {
        const content = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `ridgebox_${Date.now()}.zip`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast(`${count} files → ZIP`, 'success');
    }
    APP.selectedFiles.clear();
    renderFileList();
}

async function createShareLink(fileId) {
    const password = document.getElementById('share-password')?.value || '';
    const expiry = parseInt(document.getElementById('share-expiry')?.value || '0');
    const selfDestruct = document.getElementById('share-selfdestruct')?.checked || false;
    const alias = document.getElementById('share-alias')?.value.trim() || genId().substring(0, 8);
    const share = {
        id: genId(),
        fileId: fileId,
        alias: alias,
        password: password ? await hashPin(password) : '',
        expiry: expiry > 0 ? Date.now() + expiry * 3600000 : 0,
        selfDestruct: selfDestruct,
        clicks: 0,
        lastAccess: null,
        createdAt: Date.now()
    };
    await saveShare(share);
    APP.shares.push(share);
    const file = APP.files.find(f => f.id === fileId);
    if (file) { file.shareCount = (file.shareCount || 0) + 1; await saveFile(file); }
    const url = `${location.origin}${location.pathname}#/s/${alias}`;
    closeModal();
    openShareModal(fileId);
    copyShareLink(url);
    showToast(t('shareCreated'), 'success');
}

function copyShareLink(url) {
    navigator.clipboard.writeText(url).then(() => showToast(t('linkCopied'), 'success')).catch(() => showToast(t('linkCopied'), 'info'));
}

async function verifySharePassword(shareId) {
    const share = APP.shares.find(s => s.id === shareId);
    if (!share) return;
    const input = document.getElementById('share-pw-input');
    const errEl = document.getElementById('share-pw-error');
    if (!input) return;
    const hashed = await hashPin(input.value);
    if (hashed === share.password) {
        const file = APP.files.find(f => f.id === share.fileId);
        if (file) renderShareDownload(share, file);
    } else {
        if (errEl) errEl.style.display = 'block';
        input.value = '';
    }
}

                </div>
            </div>

            <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);display:flex;justify-content:space-between">

            </div>

}

async function fetchCodePreview(file, url) {
    try {
        const resp = await fetch(url);
        const text = await resp.text();
        const container = document.getElementById('code-preview');
        if (!container) return;
        if (file.name.endsWith('.md')) {
            // F100: Simple markdown rendering
            container.innerHTML = renderMarkdown(text);
            container.style.fontFamily = "'Space Grotesk', sans-serif";
        } else {
            container.textContent = text.substring(0, 50000);
        }
    } catch (e) {
        const container = document.getElementById('code-preview');
        if (container) container.textContent = 'Failed to load preview';
    }
}

function renderMarkdown(md) { // F100
    let html = md
        .replace(/^### (.+)$/gm, '<h3 style="font-size:16px;font-weight:600;margin:12px 0 4px">$1</h3>')
        .replace(/^## (.+)$/gm, '<h2 style="font-size:18px;font-weight:700;margin:16px 0 6px">$1</h2>')
        .replace(/^# (.+)$/gm, '<h1 style="font-size:22px;font-weight:700;margin:20px 0 8px">$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code style="background:var(--bg);padding:2px 4px;border-radius:3px;font-family:JetBrains Mono,monospace;font-size:12px">$1</code>')
        .replace(/^- (.+)$/gm, '<li style="margin-left:16px">$1</li>')
        .replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid var(--accent);padding-left:12px;color:var(--text-secondary)">$1</blockquote>')
        .replace(/\n/g, '<br>');
    return html;
}

function generateWaveform(audioEl) { // F63
    const container = document.getElementById('waveform-container');
    if (!container || !audioEl) return;
    const barCount = 50;
    container.innerHTML = '';
    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'waveform-bar';
        bar.style.height = Math.random() * 40 + 10 + 'px';
        container.appendChild(bar);
    }
    // Animate waveform on play
    audioEl.addEventListener('play', () => {
        const bars = container.querySelectorAll('.waveform-bar');
        const animate = () => {
            if (audioEl.paused) return;
            bars.forEach(bar => { bar.style.height = Math.random() * 50 + 5 + 'px'; });
            requestAnimationFrame(animate);
        };
        animate();
    });
}

async function updateSetting(key, value) {

}

async function setPinLock() {
    const input = document.getElementById('setting-pin');
    if (!input || !input.value) return;
    if (input.value.length < 4) { showToast(APP.lang==='id'?'PIN minimal 4 digit':'PIN must be at least 4 digits', 'warning'); return; }
    APP.settings.pinLock = await hashPin(input.value);
    await saveSetting('pinLock', APP.settings.pinLock);
    showToast(t('save') + ' ✓', 'success');
    input.value = '';
}

async function removePinLock() {
    APP.settings.pinLock = '';
    await saveSetting('pinLock', '');
    showToast(APP.lang==='id'?'PIN dihapus':'PIN removed', 'info');
    openSettings();
}

async function createCollaborativeFolder() { // F104
    const name = prompt(APP.lang==='id'?'Nama folder kolaboratif:':'Collaborative folder name:');
    if (!name) return;
    const shareToken = genId();
    const folder = { id: genId(), name, icon: 'fa-users', system: false, shareToken };
    await saveFolder(folder);
    APP.folders.push(folder);
    const shareUrl = `${location.origin}${location.pathname}#/upload/${shareToken}`;
    closeModal();
    copyShareLink(shareUrl);
    showToast(t('shareCreated'), 'success');
    const sidebar = document.getElementById('sidebar-panel');
    if (sidebar) sidebar.innerHTML = renderSidebarHTML();
}

function scheduleUpload() { // F80
    const timeInput = document.getElementById('scheduled-time');
    if (!timeInput || !timeInput.value) return;
    const scheduledTime = new Date(timeInput.value).getTime();
    if (scheduledTime <= Date.now()) { showToast(APP.lang==='id'?'Waktu harus di masa depan':'Time must be in the future', 'warning'); return; }
    const delay = scheduledTime - Date.now();
    const timerId = setTimeout(() => {
        showToast(APP.lang==='id'?'Unggah terjadwal siap!':'Scheduled upload ready!', 'info');
        sendNotification('Ridgebox', APP.lang==='id'?'Unggah terjadwal siap':'Scheduled upload ready');
    }, delay);
    APP.scheduledUploads.push({ id: genId(), time: scheduledTime, timerId });
    localStorage.setItem('rb_scheduled', JSON.stringify(APP.scheduledUploads.map(s => ({ id: s.id, time: s.time }))));
    showToast(t('scheduledUpload') + ' ✓', 'success');
}

function restoreScheduledUploads() { // F80
    try {
        const saved = JSON.parse(localStorage.getItem('rb_scheduled') || '[]');
        saved.forEach(s => {
            const delay = s.time - Date.now();
            if (delay > 0) {
                const timerId = setTimeout(() => {
                    showToast(APP.lang==='id'?'Unggah terjadwal siap!':'Scheduled upload ready!', 'info');
                }, delay);
                APP.scheduledUploads.push({ id: s.id, time: s.time, timerId });
            }
        });
    } catch(e) {}
}

// ===== ONBOARDING (F95) =====
const onboardingSteps = [
    { target: null, title: 'step1Title', desc: 'step1Desc', icon: 'fa-cloud-arrow-up' },
    { target: null, title: 'step2Title', desc: 'step2Desc', icon: 'fa-folder-tree' },

    { target: null, title: 'step4Title', desc: 'step4Desc', icon: 'fa-users' }
];
let onboardingStep = 0;

function startOnboarding() {
    onboardingStep = 0;
    showOnboardingStep();
}

function showOnboardingStep() {
    const overlay = document.getElementById('onboarding-overlay');
    if (!overlay) return;
    const step = onboardingSteps[onboardingStep];
    const isLast = onboardingStep === onboardingSteps.length - 1;
    overlay.style.display = 'block';
    overlay.innerHTML = `
        <div style="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:110" onclick="if(event.target===this)skipOnboarding()">
            <div class="onboarding-tooltip" style="text-align:center">
                <div style="width:64px;height:64px;border-radius:16px;background:rgba(59,130,246,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                    <i class="fas ${step.icon}" style="font-size:28px;color:var(--accent)"></i>
                </div>
                <h3 style="font-size:18px;font-weight:600;margin-bottom:8px">${t(step.title)}</h3>
                <p style="font-size:14px;color:var(--text-secondary);margin-bottom:20px">${t(step.desc)}</p>
                <div style="display:flex;justify-content:center;gap:6px;margin-bottom:16px">
                    ${onboardingSteps.map((_, i) => `<div style="width:8px;height:8px;border-radius:50%;background:${i === onboardingStep ? 'var(--accent)' : 'var(--border)'}"></div>`).join('')}
                </div>
                <div style="display:flex;gap:8px;justify-content:center">
                    <button class="btn btn-ghost" onclick="skipOnboarding()">${t('skip')}</button>
                    ${!isLast ? `<button class="btn btn-primary" onclick="onboardingStep++;showOnboardingStep()">${t('nextStep')} <i class="fas fa-arrow-right"></i></button>` : `<button class="btn btn-primary" onclick="finishOnboarding()">${t('done')} <i class="fas fa-check"></i></button>`}
                </div>
            </div>
        </div>`;
}

function skipOnboarding() {
    finishOnboarding();
}

function finishOnboarding() {
    const overlay = document.getElementById('onboarding-overlay');
    if (overlay) overlay.style.display = 'none';
    APP.onboardingDone = true;
    localStorage.setItem('rb_onboarding', '1');
}

// ===== KEYBOARD NAVIGATION (F99) =====
document.addEventListener('keydown', (e) => {
    const hash = location.hash || '#/';
    if (hash === '#/' && !hash.startsWith('#/dashboard')) return;
    
    // Escape: close modals, panels, context menu
    if (e.key === 'Escape') {
        closeContextMenu();
        closeModal();
        closeDetailPanel();
        if (APP.batchMode) { APP.batchMode = false; renderFileList(); }
    }
    
    // Only handle keyboard nav in file list
    if (!document.getElementById('file-list-container')) return;
    
    const files = getFilteredFiles();
    if (files.length === 0) return;
    
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const currentIdx = APP.lastSelectedIndex;
        const nextIdx = e.key === 'ArrowDown' ? Math.min(currentIdx + 1, files.length - 1) : Math.max(currentIdx - 1, 0);
        if (files[nextIdx]) {
            openDetailPanel(files[nextIdx].id);
            APP.lastSelectedIndex = nextIdx;
        }
    }
    
    if (e.key === 'Enter' && APP.lastSelectedIndex >= 0 && files[APP.lastSelectedIndex]) {
        openPreview(files[APP.lastSelectedIndex].id);
    }
    
    // Ctrl+A: select all
    if (e.key === 'a' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        APP.batchMode = true;
        files.forEach(f => APP.selectedFiles.add(f.id));
        renderFileList();
    }
    
    // Delete
    if (e.key === 'Delete' && APP.selectedFiles.size > 0) {
        bulkDelete();
    }
});

async function autoPurgeTrash() {
    if (APP.settings.trashPurgeDays <= 0) return;
    const cutoff = Date.now() - APP.settings.trashPurgeDays * 86400000;
    const toDelete = APP.files.filter(f => f.trashed && f.trashedAt && f.trashedAt < cutoff);
    for (const f of toDelete) {
        await deleteFileDB(f.id);
    }
    if (toDelete.length > 0) {
        APP.files = APP.files.filter(f => !(f.trashed && f.trashedAt && f.trashedAt < cutoff));
        showToast(`${toDelete.length} ${APP.lang==='id'?'file dihapus permanen':'files permanently deleted'}`, 'info');
    }
}


// ===== FILE PREVIEW TOOLTIP IN GRID (F84) =====
let tooltipTimeout = null;
document.addEventListener('mouseover', (e) => {
    const item = e.target.closest('.file-grid-item');
    if (!item) return;
    tooltipTimeout = setTimeout(() => {
        const fileId = item.querySelector('[onclick]')?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
        if (!fileId) return;
        const file = APP.files.find(f => f.id === fileId);
        if (!file) return;
        const type = getFileType(file.name, file.mime);
        const icon = getFileIcon(type);
        let tooltip = document.getElementById('grid-tooltip');
        if (!tooltip) {
            tooltip = document.createElement('div');
            tooltip.id = 'grid-tooltip';
            tooltip.style.cssText = 'position:fixed;z-index:150;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;box-shadow:var(--shadow-lg);pointer-events:none;max-width:200px';
            document.body.appendChild(tooltip);
        }
        tooltip.innerHTML = `<strong style="display:block;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</strong>
            <span style="color:var(--text-secondary)">${formatSize(file.size)} · ${type} · ${formatDate(file.uploadedAt)}</span>`;
        const rect = item.getBoundingClientRect();
        tooltip.style.left = Math.min(rect.left, window.innerWidth - 220) + 'px';
        tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';
        tooltip.style.display = 'block';
    }, 500);
});
document.addEventListener('mouseout', (e) => {
    if (e.target.closest('.file-grid-item')) {
        clearTimeout(tooltipTimeout);
        const tooltip = document.getElementById('grid-tooltip');
        if (tooltip) tooltip.style.display = 'none';
    }
});

// ===== QR CODE for share links =====
function showQRCode(url) {
    openModal(`
        <div style="padding:24px;text-align:center">
            <h3 style="font-size:18px;font-weight:600;margin-bottom:16px"><i class="fas fa-qrcode" style="color:var(--accent)"></i> ${t('qrCode')}</h3>
            <canvas id="qr-canvas" style="margin:0 auto"></canvas>
            <p style="font-size:12px;color:var(--text-secondary);margin-top:12px;word-break:break-all">${url}</p>
            <button class="btn btn-secondary" style="margin-top:12px" onclick="closeModal()">${t('close')}</button>
        </div>`);
    setTimeout(() => {
        const canvas = document.getElementById('qr-canvas');
        if (canvas && typeof QRious !== 'undefined') {
            new QRious({ element: canvas, value: url, size: 200, foreground: getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#0f172a', background: 'transparent' });
        }
    }, 100);
}

// ===== INITIALIZATION =====
async function init() {
    try {
        // Load theme
        APP.theme = localStorage.getItem('rb_theme') || 'light';
        APP.lang = localStorage.getItem('rb_lang') || 'id';
        applyTheme();
        applyViewMode();

        // Load data from IndexedDB
        await loadAllData();

        // Fetch bot config
        try {
            const resp = await fetch('/api/config');
            const data = await resp.json();
            if (data.ok && data.bots && data.bots.length > 0) {
                APP.bots = data.bots;
                APP.settings.proxyMode = data.proxyMode !== false;
                APP.connected = true;
            }
        } catch (e) {
            console.warn('Config fetch failed:', e);
            APP.connected = navigator.onLine;
        }

        // Update connection status
        updateConnectionStatus();
        window.addEventListener('online', () => { APP.connected = true; updateConnectionStatus(); showToast(t('connectionOk'), 'success', 2000); });
        window.addEventListener('offline', () => { APP.connected = false; updateConnectionStatus(); showToast(t('connectionOff'), 'warning', 2000); });

        // Auto purge trash
        await autoPurgeTrash();

        // Route
        checkUrlRouting();
        window.addEventListener('hashchange', checkUrlRouting);

        // Onboarding (F95) - show on first dashboard visit
        if (!APP.onboardingDone && location.hash === '#/dashboard') {
            setTimeout(startOnboarding, 500);
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            try {
                await navigator.serviceWorker.register('sw.js');
            } catch(e) { console.warn('SW registration failed:', e); }
        }

        // Load type filter options
        APP.filterType = 'all';

    } catch (err) {
        console.error('Init error:', err);
        showToast('Initialization error: ' + err.message, 'error');
    }
}

// Safe init wrapper (error handling pattern)
function safeInit() {
    try {
        init().catch(err => {
            console.error('Async init error:', err);
            showToast('Startup error: ' + err.message, 'error');
        });
    } catch (err) {
        console.error('Sync init error:', err);
        showToast('Critical error: ' + err.message, 'error');
    }
}

// Start the app
safeInit();
</script>
